<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>WoodBClean — Remote Camp Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0f1628;--navy-mid:#1a2540;--navy-soft:#25314f;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#9a812f;
  --paper:#f7f6f2;--card:#fff;--cream:#efece4;--text:#1a1a2e;--mid:#4a4a6a;--light:#8a8aa2;--faint:#b8b8c8;
  --line:rgba(15,22,40,.1);--line2:rgba(15,22,40,.05);--success:#1b8a54;--sbg:#e3f6ec;--warn:#9a6a12;--wbg:#fbf1d9;
  --danger:#a32d2d;--dbg:#fbe9e9;--info:#1d5a8a;--ibg:#e5f0f9;
  --sidebar-w:288px;--r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--paper);color:var(--text);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.serif{font-family:'DM Serif Display',serif}
#splash{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;transition:opacity .6s,visibility .6s;padding:20px}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.sp-logo{width:104px;height:104px;border-radius:50%;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:glow 2.6s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(201,168,76,.4),0 0 0 14px rgba(201,168,76,.08)}50%{box-shadow:0 0 0 2px rgba(201,168,76,.7),0 0 0 24px rgba(201,168,76,.14)}}
.sp-logo span{font-family:'DM Serif Display',serif;font-size:50px;color:var(--navy)}
#splash h1{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px;text-align:center}
#splash .sp-sub{color:rgba(255,255,255,.42);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:30px;text-align:center}
.sp-fields{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;margin-bottom:16px}
.sp-input{padding:13px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:inherit;width:100%;outline:none;transition:border-color .2s}
.sp-input::placeholder{color:rgba(255,255,255,.42)}
.sp-input:focus{border-color:rgba(201,168,76,.6)}
.sp-btn{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;max-width:320px;transition:background .2s}
.sp-btn:hover{background:var(--gold-light)}
.sp-btn:disabled{opacity:.6;cursor:wait}
.sp-hint{color:rgba(255,255,255,.4);font-size:12.5px;margin-top:18px;text-align:center;max-width:340px;line-height:1.6}
.sp-hint a{color:var(--gold-light);text-decoration:none;font-weight:600}
#authMsg{color:#e8a0a0;display:block;margin-top:8px;min-height:16px}
#app{display:none;min-height:100vh}
#app.show{display:block}
.topbar{background:var(--navy);color:#fff;height:60px;display:flex;align-items:center;padding:0 22px;position:sticky;top:0;z-index:200;gap:14px}
.tb-logo{width:38px;height:38px;border-radius:50%;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-logo span{font-family:'DM Serif Display',serif;font-size:19px;color:var(--navy)}
.tb-title{flex:1}
.tb-title h1{font-family:'DM Serif Display',serif;font-size:16px;letter-spacing:.02em;line-height:1.1}
.tb-title .sub{font-size:10.5px;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase}
.tb-user{display:flex;align-items:center;gap:12px;font-size:13px}
.tb-xp{text-align:right}
.tb-xp .n{font-size:16px;font-weight:700;color:var(--gold);line-height:1}
.tb-xp .l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy-soft);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--gold-light)}
.tb-logout{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.tb-logout:hover{background:rgba(255,255,255,.08)}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:var(--sidebar-w);background:var(--navy-mid);border-right:1px solid rgba(255,255,255,.06);flex-shrink:0;overflow-y:auto;position:sticky;top:60px;height:calc(100vh - 60px)}
.sb-section{padding:16px 14px 8px;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 16px;margin:1px 8px;border-radius:10px;cursor:pointer;transition:background .15s;color:rgba(255,255,255,.7)}
.sb-item:hover{background:rgba(255,255,255,.05)}
.sb-item.active{background:rgba(201,168,76,.14);color:#fff}
.sb-item.active .sb-ico{background:var(--gold);color:var(--navy)}
.sb-ico{width:30px;height:30px;border-radius:8px;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:rgba(255,255,255,.6);font-family:'DM Serif Display',serif}
.sb-item.done .sb-ico{background:var(--success);color:#fff}
.sb-txt{flex:1;min-width:0}
.sb-txt .t{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-txt .s{font-size:10.5px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-check{font-size:14px;color:var(--success)}
.main{flex:1;min-width:0;overflow-x:hidden}
.main-inner{max-width:820px;margin:0 auto;padding:28px 32px 60px}
.dash-hero{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border-radius:var(--r);padding:28px 30px;margin-bottom:22px}
.dash-hero h2{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:6px}
.dash-hero p{color:rgba(255,255,255,.75);font-size:14.5px;max-width:560px;line-height:1.6}
.dash-progwrap{margin-top:20px}
.dash-progbar{height:8px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden}
.dash-progfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));width:0%;transition:width .6s;border-radius:5px}
.dash-progmeta{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:rgba(255,255,255,.6)}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.dash-stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.dash-stat .n{font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy);line-height:1}
.dash-stat .l{font-size:11.5px;color:var(--mid);text-transform:uppercase;letter-spacing:.04em;margin-top:5px}
.dash-stat.gold .n{color:var(--gold-dim)}
.dash-sectionlabel{font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy);margin:24px 0 12px}
.dash-modlist{display:flex;flex-direction:column;gap:8px}
.dash-modcard{background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s}
.dash-modcard:hover{border-color:var(--gold);transform:translateX(2px)}
.dash-modcard .dm-num{width:36px;height:36px;border-radius:9px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;flex-shrink:0}
.dash-modcard.done .dm-num{background:var(--success)}
.dash-modcard .dm-info{flex:1;min-width:0}
.dash-modcard .dm-info .t{font-size:14px;font-weight:600}
.dash-modcard .dm-info .s{font-size:12px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-modcard .dm-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.dm-status.done{background:var(--sbg);color:var(--success)}
.dm-status.todo{background:var(--cream);color:var(--mid)}
.mod-view{display:none}
.mod-view.active{display:block}
.mod-header .crumb{font-size:11.5px;font-weight:600;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.mod-header h2{font-family:'DM Serif Display',serif;font-size:27px;color:var(--navy);line-height:1.15;margin-bottom:8px}
.mod-header .lead{font-size:15px;color:var(--mid);line-height:1.6;max-width:620px}
.tabbar{display:flex;gap:4px;flex-wrap:wrap;margin:22px 0 20px;border-bottom:1px solid var(--line)}
.tab{padding:9px 15px;font-size:13px;font-weight:500;cursor:pointer;color:var(--mid);border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.15s;border-radius:6px 6px 0 0}
.tab:hover{color:var(--navy);background:var(--cream)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.tab.special{color:var(--gold-dim)}
.tabpane{display:none;animation:fade .25s}
.tabpane.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.tabpane h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy);margin:20px 0 10px;line-height:1.2}
.tabpane h3:first-child{margin-top:4px}
.tabpane h4{font-size:14px;font-weight:600;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.tabpane p{font-size:14.5px;color:var(--text);margin-bottom:12px;line-height:1.65}
.tabpane ul,.tabpane ol{margin:0 0 14px 22px}
.tabpane li{font-size:14.5px;margin-bottom:7px;line-height:1.55}
.tabpane strong{color:var(--navy);font-weight:600}
.quote{border-left:3px solid var(--gold);padding:6px 0 6px 18px;margin:16px 0;font-style:italic;color:var(--mid);font-size:15px;line-height:1.6}
.quote .who{display:block;font-style:normal;font-size:12.5px;color:var(--gold-dim);font-weight:600;margin-top:6px}
.callout{border-radius:var(--rs);padding:14px 16px 14px 48px;margin:16px 0;font-size:13.5px;line-height:1.6;position:relative}
.callout .ci{position:absolute;left:14px;top:14px;font-size:20px}
.callout .ct{font-weight:700;display:block;margin-bottom:3px}
.callout.why{background:var(--wbg);color:#6b4d12}.callout.why .ct{color:var(--warn)}
.callout.key{background:var(--sbg);color:#125a37}.callout.key .ct{color:var(--success)}
.callout.warn{background:var(--dbg);color:#6e1d1d}.callout.warn .ct{color:var(--danger)}
.callout.info{background:var(--ibg);color:#123f5e}.callout.info .ct{color:var(--info)}
.step{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.step-b{flex:1;padding-top:2px}
.step-b .st{font-weight:600;color:var(--navy);font-size:14.5px;margin-bottom:2px}
.step-b p{margin-bottom:0;font-size:14px}
.symgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.symcard{background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:14px;text-align:center}
.symcard .sy{font-size:30px;margin-bottom:6px}
.symcard .sn{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px}
.symcard .sd{font-size:11.5px;color:var(--mid);line-height:1.4}
.vidref{background:var(--navy);color:#fff;border-radius:var(--rs);padding:14px 16px;margin:16px 0;display:flex;align-items:center;gap:14px}
.vidref .vi{width:44px;height:44px;border-radius:10px;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.vidref .vt{flex:1}
.vidref .vt .vtt{font-weight:600;font-size:14px}
.vidref .vt .vts{font-size:12px;color:rgba(255,255,255,.6)}
.reflect{background:var(--cream);border-radius:var(--rs);padding:16px;margin-top:12px}
.reflect label{display:block;font-size:13.5px;font-weight:600;color:var(--navy);margin-bottom:8px}
.reflect textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-family:inherit;font-size:14px;resize:vertical;min-height:80px;outline:none}
.reflect textarea:focus{border-color:var(--gold)}
.checkitem{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
.checkitem input{margin-top:2px;width:17px;height:17px;accent-color:var(--success);flex-shrink:0}
.checkitem span{font-size:14px;line-height:1.5}
.checkitem.checked span{color:var(--mid);text-decoration:line-through}
.quiz{background:var(--cream);border-radius:var(--rs);padding:18px;margin-top:8px}
.quiz-q{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:13px}
.quiz-opt{display:block;padding:12px 15px;background:var(--card);border:1.5px solid var(--line);border-radius:9px;margin-bottom:9px;font-size:14px;cursor:pointer;transition:.12s}
.quiz-opt:hover{border-color:var(--navy)}
.quiz-opt.correct{border-color:var(--success);background:var(--sbg)}
.quiz-opt.wrong{border-color:var(--danger);background:var(--dbg)}
.complete-bar{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.complete-note{font-size:12.5px;color:var(--mid);flex:1;min-width:200px}
.btn-complete{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:13px 26px;font-size:14.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn-complete:hover:not(:disabled){background:var(--navy-mid)}
.btn-complete:disabled{background:var(--faint);cursor:not-allowed}
.btn-complete.done{background:var(--success)}
.btn-next{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:13px 22px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-next:hover{background:var(--gold-light)}
.cert-block{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border-radius:var(--r);padding:30px;text-align:center;margin-top:20px}
.cert-block .cc{width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}
.cert-block h3{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.cert-block p{color:rgba(255,255,255,.72);font-size:13.5px;max-width:440px;margin:0 auto 14px}
.cert-block input{border:none;border-radius:9px;padding:12px 15px;font-size:15px;text-align:center;width:100%;max-width:300px;font-family:inherit}
.cert-out{margin-top:14px;font-size:13px;color:var(--gold-light);line-height:1.5}
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px}
@media(max-width:840px){.menu-toggle{display:block}.sidebar{position:fixed;left:0;top:60px;z-index:150;transform:translateX(-100%);transition:transform .25s;box-shadow:4px 0 24px rgba(0,0,0,.2)}.sidebar.open{transform:translateX(0)}.main-inner{padding:20px 18px 50px}.dash-stats{grid-template-columns:1fr}.dash-hero h2{font-size:22px}.mod-header h2{font-size:22px}}
.sb-overlay{display:none;position:fixed;inset:0;top:60px;background:rgba(0,0,0,.4);z-index:140}
.sb-overlay.show{display:block}
@media(min-width:841px){.sb-overlay{display:none!important}}

.refcard{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--rs);padding:13px 15px;margin:14px 0}
.ref-ico{width:34px;height:34px;border-radius:8px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ref-body{flex:1;min-width:0}
.ref-title{font-weight:600;font-size:14px;color:var(--navy)}
.ref-src{font-size:11.5px;color:var(--gold-dim);font-weight:600;margin:1px 0 4px}
.ref-desc{font-size:13px;color:var(--mid);line-height:1.5;margin-bottom:6px}
.ref-link{font-size:12.5px;color:var(--info);font-weight:600;text-decoration:none}
.ref-link:hover{text-decoration:underline}
.diagram-wrap{background:var(--cream);border-radius:var(--rs);padding:10px;margin:14px 0}
.diagram-cap{font-size:11.5px;color:var(--mid);text-align:center;margin-top:4px;font-style:italic}

.scenario{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--info,#2980b9);border-radius:var(--rs);padding:16px 18px;margin:12px 0}
.scenario-q{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:14px}
.scenario-btn,.recall-btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.scenario-btn:hover,.recall-btn:hover{background:var(--navy-soft,#1a2540)}
.scenario-btn.revealed,.recall-btn.revealed{background:var(--gold);color:var(--navy)}
.scenario-a{margin-top:14px;padding:14px 16px;background:var(--cream,#f7f6f2);border-radius:8px;font-size:14px;line-height:1.65;color:var(--text);border-left:3px solid var(--gold)}
.recall{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.recall-item{background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:13px 15px}
.recall-q{font-size:14.5px;font-weight:600;color:var(--navy);margin-bottom:9px}
.recall-btn{padding:6px 13px;font-size:12px}
.recall-a{margin-top:10px;padding:11px 14px;background:var(--cream,#f7f6f2);border-radius:7px;font-size:13.5px;line-height:1.6;color:var(--text);border-left:3px solid var(--gold)}
</style>
</head>

 {
  "id": 1,
  "cat": "Foundations",
  "title": "Welcome & Who We Are",
  "sub": "Our story",
  "lead": "Before you clean a single room, you need to understand what WoodBClean is, why it exists, and what it means to represent this business on a remote site. This is the foundation everything else is built on.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>You're not just taking a job</h3>\n      <p>When you put on a WoodBClean uniform, you're making a promise to hundreds of workers who live where you clean. They come off 12-hour shifts trusting that their room is clean and their food is safe. That trust is the whole business.</p>\n      <p>Here's why understanding the story matters to <strong>you</strong>: people who know <em>why</em> the standard exists hold it even when they're tired, even when no one's watching. People who don't, cut corners — and get found out. This module is what turns \"a cleaning job\" into \"being part of something that has a name and a reputation.\"</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">Check yourself</span>Ask yourself before reading on: when you've done a job well that no one checked — how did that feel versus doing a job badly that no one checked? That feeling is what WoodBClean runs on.</div>"
   },
   {
    "name": "Our story",
    "html": "\n      <h3>How WoodBClean started</h3>\n      <p>Bonnie Wood built this business from her own name — and from a genuine frustration with the way cleaning was being done. She was meeting every kind of client a cleaning business could dream of, and hearing the same complaints over and over: cleaners who showed up late, did half the job, or didn't show at all. People cleaning fast because it was quick cash, leaving clients with a mess to deal with themselves.</p>\n      <p>Bonnie knew she could do it differently. So she did.</p>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">The promise in the name</span>\"WoodBClean — because it would be clean if you got WoodBClean.\" That's not just a tagline. It's a promise. Every job, every door, every room, we're making that promise to someone.</div>\n      <p>On a remote camp, that promise is to the workforce who live there. When you do your job well, they rest well and work safely. That's why the standard never drops — not on room 1, not on room 30.</p>\n      <div class=\"quote\">The very most important element to being a cleaner at WoodBClean is common sense. See something that needs fixing? Fix it. Don't walk past a problem because it wasn't on the list.<span class=\"who\">— Bonnie</span></div>"
   },
   {
    "name": "Values & standards",
    "html": "\n      <h3>What we stand for</h3>\n      <p>We are not a volume business. We don't win by doing more jobs than anyone else. We win by being the operation clients trust, refer, and renew. On a camp, that reputation is built by <em>you</em> — every room, every meal, every shift.</p>\n      <h4>Our four core values</h4>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Standards never drop</div><p>No matter how tight the turnaround or how tired you are. The tired-and-still-perfect room is the whole point.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Common sense first</div><p>See a problem, fix it or report it. A checklist can't cover everything — your judgement fills the gap.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Respect</div><p>For the workers who live here, for each other, and for the site and its rules.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Honesty</div><p>We record what we do, and we do what we record. No fudging a checklist you didn't complete.</p></div></div>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">The WoodBClean difference</span>Other operators throw people in and hope. We train you, support you, and give you a path. That's why we can be the best camp operation on site — our people are trained, not just hired. You're proof of that.</div>"
   },
   {
    "name": "Our clients",
    "html": "\n      <h3>Who we're serving on site</h3>\n      <p>On this contract, WoodBClean runs the cleaning and catering for a remote mining camp operated in partnership with CGC (Closure Group Civil). \"CGC\" is our client — the civil and earthmoving business whose workforce lives in the camp.</p>\n      <p>We service the whole camp population — the miners, machinery operators and civil crews who live on site while they work. They're not our employees, but they're the people we look after every single day. A clean donga and a good meal are the two biggest things within our control that keep that workforce healthy, rested and safe.</p>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">CGC holds ISO accreditation</span>Our client is ISO-accredited (formal quality, safety and environmental certification). Because of that, the way we work — our records, our standards, our safety — reflects on their accreditation. Doing things properly doesn't just protect our reputation, it protects theirs. That's a big part of why they chose us.</div>"
   },
   {
    "name": "On-site conduct",
    "html": "\n      <h3>Representing WoodBClean around the clock</h3>\n      <p>A camp is different from a normal job. You don't clock off and go home to a separate life — you live where you work, alongside the people you serve. How you conduct yourself matters 24/7, not just on shift.</p>\n      <h4>What's expected</h4>\n      <ul><li>Professional, respectful, reliable — every shift, no exceptions</li><li>Follow every site rule and every WoodBClean policy</li><li>No gossip, no drama — in a closed community it spreads fast and poisons the camp</li><li>Represent the business well even off-shift — in the mess, the gym, the rec room</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Zero tolerance</span>Harassment, bullying, violence, or turning up unfit for work (drugs or alcohol) means instant removal from site. A camp is a shared home for hundreds of people — everyone's safety depends on everyone's conduct. This isn't negotiable and it isn't only about you.</div>"
   },
   {
    "name": "Key handling",
    "html": "\n      <h3>Access is a serious trust</h3>\n      <p>You'll hold access to workers' rooms and to camp facilities. Think about what that means: you can walk into the private space of someone who isn't there. That's a level of trust most jobs never give you.</p>\n      <ul><li>Never share your access, keys or swipe card with anyone — not even a workmate \"just this once\"</li><li>Never enter a room for any reason other than the scheduled service</li><li>Report a lost key or access card <strong>immediately</strong> — not at the end of shift</li><li>Respect residents' privacy and belongings absolutely</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Residents' belongings</span>Workers leave personal items — cash, phones, medication — in their rooms. Never touch, move, or go through anything that isn't part of the clean. If you find something concerning (a hazard, something illegal, someone unwell), report it to your supervisor — don't handle it yourself.</div>"
   },
   {
    "name": "Non-solicitation",
    "html": "\n      <h3>Non-solicitation — and why it protects YOU</h3>\n      <p>While you work with WoodBClean, you don't approach WoodBClean's clients to set up private work, and you don't take WoodBClean-type work \"on the side\" with them. Most people hear \"non-solicitation\" and think it only protects the business. It protects you just as much.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">Here's the part people miss</span>If you built your own private client base from WoodBClean clients and something went wrong on a job — a chemical damage claim, an injury, a dispute — you'd have <strong>none</strong> of WoodBClean's insurance or legal backing. You'd be personally exposed. Operating through WoodBClean means you're covered. The policy isn't a leash — it's a shield.</div>"
   },
   {
    "name": "Common sense",
    "html": "\n      <h3>The most important skill you'll use</h3>\n      <p>Bonnie says it plainly: the most important element of being a WoodBClean cleaner is common sense. Here's why that's not just a nice saying — a checklist can't predict everything. A camp throws up situations no procedure ever wrote down.</p>\n      <ul><li>See something that needs fixing? Fix it, or report it. Don't wait to be told.</li><li>Don't walk past a problem because it \"wasn't on the list.\"</li><li>If something feels wrong or unsafe, stop and ask. Every time.</li><li>Always think about the person who'll walk back into that room.</li></ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">The test</span>When you're not sure what to do, ask: \"What would I want if this were my room, my meal, my safety?\" That question answers most of them.</div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You're cleaning a donga and you notice the smoke detector on the ceiling has been unclipped and the battery taken out — probably by a worker annoyed at it beeping. It's not on your cleaning checklist. What do you do?",
    "answer": "You report it immediately — this is exactly what 'common sense first' means. A disabled smoke detector in a room full of sleeping workers is a serious safety risk. It's not on your checklist because no checklist can list everything; your judgement is the control. Don't just clean around it and move on. Flag it to your supervisor so it gets fixed and the worker gets a gentle reminder about why it matters."
   },

 {
  "id": 2,
  "cat": "Foundations",
  "title": "Your Role & Responsibilities",
  "sub": "Employment",
  "lead": "What your engagement with WoodBClean actually means — your employment, your pay, the tickets you must hold, your rights, and your obligations. Knowing this protects you and sets you up to succeed.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Know where you stand</h3>\n      <p>A lot of workers never really understand their own employment — how they're paid, what they're entitled to, what protects them. That leaves them vulnerable. This module makes sure you know exactly where you stand, so no one can take advantage of you and so you understand your own obligations.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Understanding your rights means you can speak up if something's wrong. Understanding your obligations means you never get caught out. Both protect your job and your pay.</div>"
   },
   {
    "name": "My role",
    "html": "\n      <h3>You are a WoodBClean employee</h3>\n      <p>On this camp, every WoodBClean team member is engaged as an <strong>employee</strong> — either permanent or casual. WoodBClean is your employer. You're covered by the Fair Work Act 2009, the National Employment Standards (the minimum entitlements every employee gets), and WHS (Work Health and Safety) law.</p>\n      <p>That means WoodBClean has real obligations to <em>you</em>: paying your wages, providing PPE (personal protective equipment), covering you under workers compensation, and giving you a safe place to work. In return, you follow our policies, maintain our standards, and represent WoodBClean professionally on every shift.</p>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">One team, one standard</span>Whether you're permanent or casual, you're a WoodBClean employee held to the same standard of quality, professionalism and care. The difference between permanent and casual is how you're rostered and paid — never how well you're expected to do the job.</div>"
   },
   {
    "name": "Wages & entitlements",
    "html": "\n      <h3>How you're paid on a camp</h3>\n      <p>Remote camp work is paid <strong>above the award</strong> (the legal minimum pay rate for the job), reflecting the demands of the roster and the location. Your engagement letter sets out your exact rate, roster and entitlements — read it, and ask if anything isn't clear.</p>\n      <h4>What your pay includes</h4>\n      <ul><li>An above-award base rate reflecting remote conditions</li><li>Penalty rates for weekend, night and public holiday work</li><li>A remote or district allowance per your agreement</li><li>Superannuation at 12%, paid on top of your wages</li><li>For permanent employees: paid leave entitlements under the NES</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Trained, not just hired</span>WoodBClean pays fairly and invests in training and a progression path. We'd rather pay a bit more for people who are set up to succeed than run a revolving door of untrained casuals. Your training is part of your value — and part of why you're paid what you are.</div>"
   },
   {
    "name": "Tickets you need",
    "html": "\n      <h3>Certifications you must hold</h3>\n      <p>Every worker on a mine site must hold current \"tickets\" (certifications), checked and recorded before you can be deployed. Missing or expired tickets mean you can't go to site — so keep them current.</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">White Card (CPCWHS1001)</div><p>The general construction induction. Required to work anywhere near construction or maintenance areas.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Standard 11 Mining Induction</div><p>Required for most Queensland mining sites. This is the mining-specific safety induction — non-negotiable for site access.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Current First Aid (and CPR)</div><p>Because help can be far away on a remote site, first aid capability matters more here than anywhere.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Manual Handling</div><p>Safe lifting and movement — protects you from the most common camp injury: your back.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Pre-employment medical + D&A screen</div><p>Includes a drug and alcohol screen. Confirms you're fit for the physical demands of remote work.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">6</div><div class=\"step-b\"><div class=\"st\">Police check</div><p>Standard for working in a live-in community with access to people's rooms.</p></div></div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">No ticket, no site</span>An expired First Aid or a missing Standard 11 means you cannot be deployed — full stop. Give WoodBClean copies before mobilisation and tell us before anything expires.</div>"
   },
   {
    "name": "Your rights",
    "html": "\n      <h3>Your rights at work</h3>\n      <p>WoodBClean has legal obligations to you, and you have rights you can rely on:</p>\n      <ul><li>The right to a <strong>safe work environment</strong></li><li>The right to <strong>stop work if something is unsafe</strong> — and not be punished for it</li><li>The right to <strong>raise concerns without retaliation</strong></li><li>The right to correct pay, PPE, and (for employees) insurance cover</li><li>Protection under the Fair Work Act and WHS law</li></ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Speaking up is protected</span>If something is unsafe, unfair, or wrong, you're legally protected when you raise it. WoodBClean wants to hear it — a problem raised is a problem we can fix.</div>"
   },
   {
    "name": "Respect & privacy",
    "html": "\n      <h3>A respectful, private workplace</h3>\n      <p>Camp life is a closed community, which makes respect and privacy even more important than in a normal workplace.</p>\n      <h4>Respect</h4>\n      <p>WoodBClean has zero tolerance for bullying, harassment or discrimination — from anyone, toward anyone. Treat workmates, residents and site staff with respect. Respect cultural differences and shared spaces. Report bullying or harassment to your supervisor or Bonnie.</p>\n      <h4>Privacy</h4>\n      <p>You'll see residents' rooms and belongings and may handle client information. All of it is confidential under the Privacy Act and WoodBClean policy. Never photograph residents' belongings except to flag a genuine issue. Never post anything about residents or the site on social media. Keep everything you see confidential.</p>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "Your supervisor asks you to start a shift, but you realise your First Aid certificate expired last week and you haven't renewed it. You don't want to make a fuss or lose the shift. What's the right thing to do?",
    "answer": "Tell your supervisor straight away, before you start. An expired ticket isn't a small thing to hide — if something happened and it came out that your certification had lapsed, it could expose you, WoodBClean, and the client. Being upfront protects everyone, including you. WoodBClean would far rather sort out a renewal than have you working uncertified. Honesty is one of our core values for exactly this reason."
   },

 {
  "id": 3,
  "cat": "Foundations",
  "title": "Administration & How We Work",
  "sub": "Roster · Comms · Pay",
  "lead": "How things actually run day to day on camp — how your roster and jobs are allocated, how we communicate, how your time is recorded, how you're paid, and what to do when something goes wrong. Getting these right keeps you paid correctly and the operation running smoothly.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>The admin IS part of the job</h3>\n      <p>On a camp, the difference between a smooth swing and a stressful one often comes down to the admin — knowing your roster, communicating properly, and recording your time correctly. Get these right and you're paid correctly, trusted with more, and never caught out. Get them wrong and it creates problems for you and everyone around you.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Your time records are your pay. Your communication is your reputation. The people who nail the admin are the ones who get the good rosters and move up. This module protects your money and your standing.</div>"
   },
   {
    "name": "Roster & jobs",
    "html": "\n      <h3>How your roster and work are allocated</h3>\n      <p>On camp you work to a set <strong>roster</strong> (your swing — e.g. your on/off cycle), and within each shift your supervisor allocates specific areas or tasks — which dongas, which ablution blocks, kitchen duties, laundry.</p>\n      <h4>When you're given your work for the shift</h4>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Confirm you've got it</div><p>Acknowledge your allocation promptly — don't leave your supervisor unsure whether you've seen it.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Review the details</div><p>Which areas, any special instructions, any rooms flagged for maintenance or deep clean. Ask questions before you start, not halfway through.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Check your gear and stock</div><p>Confirm your trolley, chemicals and linen are ready. Flag anything missing to your supervisor before you begin.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Start on time</div><p>The flip schedule is tight — a late start pushes everything back. If something's holding you up, tell your supervisor immediately.</p></div></div>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">More training = more scope</span>As you complete training and prove your standard, you'll be trusted with a wider range of work — kitchen, specialist cleaning, team-lead duties. Your progress opens doors.</div>"
   },
   {
    "name": "Communication",
    "html": "\n      <h3>The WoodBClean communication system</h3>\n      <p>Clear, prompt communication is a core expectation. Here's how it works on camp:</p>\n      <ul><li><strong>Your supervisor and the camp comms channel</strong> (WhatsApp/Teams as set up on your site) — for daily allocations, updates and photos</li><li><strong>Urgent matters</strong> — contact your supervisor directly, straight away</li><li><strong>Formal matters</strong> (pay queries, agreements, leave) — through the proper channel to Bonnie/office</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Never go around the system</span>Never communicate directly with the client (CGC) or camp management about job changes, problems or complaints. If something comes up, tell your supervisor — they'll handle it or escalate to Bonnie. Going around the chain creates confusion and risk.</div>\n      <h4>Response expectations</h4>\n      <ul><li>On-shift messages — respond promptly; your phone must be accessible on shift</li><li>Roster/allocation messages — acknowledge in good time</li><li>After hours on your off-swing — genuine emergencies will be called, not messaged</li></ul>"
   },
   {
    "name": "Time & photos",
    "html": "\n      <h3>Recording your time and work</h3>\n      <p>Your records are both your timesheet and the proof the work was done. On camp this typically means logging your shift and documenting completed areas per your site's system.</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Log on / sign in for your shift</div><p>Per your camp's system — this starts your time record.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Photograph completed work</div><p>Completed rooms and areas, per the site standard, before you sign them off. Timestamps are your official completion record.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Sign off / log off</div><p>Record your areas complete and your shift finished.</p></div></div>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Your records are your pay</span>Missing sign-ins or missing completion records mean missing time and missing proof. Do them every shift, without fail — it protects your pay and it's the evidence that stands up in an audit.</div>"
   },
   {
    "name": "Wages & payslips",
    "html": "\n      <h3>Your pay</h3>\n      <p>You're paid per your engagement agreement — above-award, with the penalties and allowances that apply to remote camp work (covered in Module 2). A few things to stay on top of:</p>\n      <ul><li><strong>Payslip every pay period</strong> — check it every single time. If anything looks wrong, contact the office/Bonnie immediately.</li><li><strong>Superannuation</strong> — paid at the legislated rate (12%) into your nominated fund. Confirm your fund details are correct.</li><li><strong>Keep your details current</strong> — bank, super, tax, emergency contact. Out-of-date details cause pay problems.</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Check, don't assume</span>Always check your payslip against the hours and penalties you actually worked. Payroll errors happen; catching them early is easy, fixing them late is a hassle. This is your money — stay across it.</div>"
   },
   {
    "name": "Sick & leave",
    "html": "\n      <h3>If you're unavailable or unwell</h3>\n      <p>On a camp, your absence affects the whole team's workload and the flip schedule — so communication matters even more than usual.</p>\n      <ul><li><strong>If you're unwell</strong> — notify your supervisor as early as possible. Never work a food or high-hygiene role while sick (see Module 8).</li><li><strong>Sick leave</strong> — per the NES for permanent employees; a medical certificate may be required for longer absences.</li><li><strong>Planned leave / unavailability</strong> — request it through the proper channel, in advance, so your roster can be covered.</li><li><strong>Compassionate leave</strong> — available per your entitlements for the death or serious illness of an immediate family member.</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Tell someone early</span>On a remote roster, an unexplained no-show is a serious problem — the team is short and the work still has to happen. If you can't work, let your supervisor know as early as you possibly can.</div>"
   },
   {
    "name": "Problems on site",
    "html": "\n      <h3>When something goes wrong</h3>\n      <p>Things happen. What matters is that you handle them the right way — calmly, honestly, and through the proper channel.</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Accidental damage</div><p>Stop. Photograph it immediately. Report it to your supervisor straight away — before it's noticed by anyone else. Don't try to hide it or fix it yourself, and don't offer to pay for it.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">You feel unsafe or uncomfortable</div><p>Remove yourself from the situation calmly and contact your supervisor immediately. You always have the right to feel safe at work.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Equipment breakdown</div><p>Report it immediately — don't improvise with unsuitable gear. Your supervisor will sort a replacement or a workaround.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">A conflict or complaint</div><p>Don't handle it directly with the client or management. Tell your supervisor — they'll manage it or escalate to Bonnie.</p></div></div>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Honesty always wins</span>WoodBClean would far rather hear about a problem early and honestly than discover a hidden one later. Reporting a mistake straight away is exactly what a professional does — and it's one of our core values.</div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "While vacuuming a donga, the vacuum catches the corner of the bedside table and chips it. No one saw, and it's a small chip you could probably turn to the wall so it's not noticed. What do you do?",
    "answer": "Stop and photograph it immediately, then report it to your supervisor straight away — before anyone else notices. Hiding damage, even a small chip, is exactly the wrong move: if it's found later it looks deliberate and it damages trust in you and WoodBClean. Accidents happen and WoodBClean expects them to be reported honestly; you won't be in trouble for an accident handled properly. Don't offer to pay for it and don't try to disguise it. Honest reporting is a core value and it protects you."
   },

 {
  "id": 4,
  "cat": "Safety & Compliance",
  "title": "Site Induction & Working Under the Mine's Rules",
  "sub": "WHS · ISO 45001",
  "lead": "On a mine site you don't run your own safety system — you work inside the mine's. This module explains how that works, what you must do before you start, and the safety documents that keep you alive.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>This is the module that keeps you alive</h3>\n      <p>A mine site is one of the more hazardous workplaces in the country — heavy vehicles, dust, machinery, remote location. The safety rules exist because people have been hurt or killed when they weren't followed. This isn't box-ticking. Understanding how the site's safety system works, and your place in it, is genuinely what gets you home at the end of your swing.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Every rule here traces back to someone, somewhere, getting hurt. Learn them properly and you protect yourself — and the workmates who are relying on you to know them too.</div>"
   },
   {
    "name": "The mine's system",
    "html": "\n      <h3>You work under the mine's rules</h3>\n      <p>Under the WHS Act and the WHS (Mines) Regulations, the mine operator and principal contractor hold the legal duty of care over <em>everyone</em> on site — including you, even though you work for WoodBClean. That means WoodBClean integrates into <strong>their</strong> safety management system. We don't run a separate one in isolation.</p>\n      <p>In practice: you follow the site's rules, the site's signage, the site's procedures. When there's any conflict, the site's safety rules win.</p>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">No induction, no access</span>You cannot start any work — even cleaning a donga — until you've completed the site-specific induction. There are no exceptions to this, ever. Turning up and starting without it is a serious breach.</div>"
   },
   {
    "name": "PHMPs",
    "html": "\n      <h3>Principal Hazard Management Plans</h3>\n      <p>A mine has <strong>PHMPs — Principal Hazard Management Plans</strong>. These are the formal, written controls for the biggest risks on site: heavy vehicle movement, dust, hazardous materials, ground stability, and more. Each one sets out how that hazard is managed and what everyone must do.</p>\n      <p>You must know the PHMPs that apply to <em>your</em> work areas and follow them exactly.</p>\n      <ul><li>Know which PHMPs affect your zone (your induction covers this)</li><li>Never enter a plant area or restricted zone unless you're inducted and authorised for it</li><li>Follow all site signage and hazard controls without exception</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Why they matter to a cleaner</span>You might think PHMPs are for the miners, not the cleaner. But you move around the site — near roads, near plant, near vehicles. The vehicle-movement PHMP, for example, is exactly what stops you being hit by a haul truck that can't see you.</div>"
   },
   {
    "name": "Emergencies",
    "html": "\n      <h3>Learn this before you need it</h3>\n      <p>In an emergency there is no time to read a manual. You need this automatic, from day one:</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Alarms</div><p>Know the site's emergency alarms and what each one means.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Muster points</div><p>Know your muster points (where to gather) and evacuation routes. Walk them on your first day so they're automatic.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Raising the alarm</div><p>Know how to raise the alarm and who to call if you're the one who finds a problem.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Medical & first aid</div><p>Know where the medical facility and first aid points are. On a remote site this knowledge saves lives.</p></div></div>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Day-one habit</span>On your first day, physically walk your muster route from your main work areas. Muscle memory beats a map when the alarm actually goes off.</div>"
   },
   {
    "name": "JSAs & SWMS",
    "html": "\n      <h3>Job Safety Analysis & Safe Work Method Statements</h3>\n      <p>Before a new or higher-risk task, WoodBClean prepares a <strong>JSA (Job Safety Analysis)</strong> or <strong>SWMS (Safe Work Method Statement)</strong>. These are simple documents that break a task into steps, identify the hazards in each, and set out the controls. Read it, understand it, sign it, follow it.</p>\n      <ul><li>Never start a new or unfamiliar task without knowing its JSA or SWMS</li><li>If conditions change partway through, <strong>stop and reassess</strong> — the document assumed the original conditions</li><li>Your input makes them better — if a control isn't working in the real world, say so</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Plain version</span>A JSA/SWMS is just \"here's the job, here's what could hurt you doing it, here's how we stop that.\" Signing it means you've read it and you'll work that way. It's not paperwork for its own sake — it's the thinking that stops the injury.</div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You arrive for your first shift on site. Your supervisor is short-staffed and says 'we'll sort your site induction out tomorrow, just get started on the dongas today.' What do you do?",
    "answer": "You don't start. No induction, no site access — there are no exceptions, even when someone senior tells you it's fine and even when they're under pressure. Working uninducted means you don't know the emergency procedures, the muster points, or the PHMPs that keep you safe, and it's a serious breach that exposes you, WoodBClean and the mine. Politely insist the induction comes first. A good supervisor will respect that — and if they don't, that's exactly the kind of thing to raise with Bonnie."
   },

 {
  "id": 5,
  "cat": "Safety & Compliance",
  "title": "Chemical Safety",
  "sub": "WHS · Chemicals",
  "lead": "Every product you use is a chemical, and on a camp you use them in volume. Understanding hazards, reading safety data, correct dilution, and what you must never mix is both a legal requirement and your first line of personal protection.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Chemicals can hurt you — and others</h3>\n      <p>Cleaning chemicals are powerful. Used correctly they're safe and effective. Used wrongly they can burn your skin, damage your lungs, create toxic gas, or poison the environment you're cleaning. On a camp, hundreds of people breathe the air and use the surfaces you clean — so getting this right protects far more than just you.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>The single most common serious cleaning injury is a chemical burn or a bad reaction from mixing products. Everything in this module is about making sure that never happens to you.</div>"
   },
   {
    "name": "Hazard symbols",
    "html": "\n      <h3>The 9 GHS hazard symbols — know every one</h3>\n      <p>GHS (the Globally Harmonised System) puts a standard set of symbols on every chemical, so you can read the danger at a glance — in any language. Learn all nine. These are your instant warning.</p>\n      <div class=\"symgrid\">\n        <div class=\"symcard\"><div class=\"sy\">🔥</div><div class=\"sn\">Flammable</div><div class=\"sd\">Keep away from heat, sparks, open flames</div></div>\n        <div class=\"symcard\"><div class=\"sy\">💀</div><div class=\"sn\">Toxic</div><div class=\"sd\">Serious harm if swallowed, inhaled or absorbed</div></div>\n        <div class=\"symcard\"><div class=\"sy\">❗</div><div class=\"sn\">Harmful / Irritant</div><div class=\"sd\">Skin/eye irritation, respiratory issues</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🧪</div><div class=\"sn\">Corrosive</div><div class=\"sd\">Burns skin and eyes — rinse immediately</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🌿</div><div class=\"sn\">Environmental</div><div class=\"sd\">Harmful to waterways and marine life</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🫁</div><div class=\"sn\">Health hazard</div><div class=\"sd\">Respiratory or long-term health effects</div></div>\n        <div class=\"symcard\"><div class=\"sy\">💥</div><div class=\"sn\">Explosive</div><div class=\"sd\">Risk of explosion under certain conditions</div></div>\n        <div class=\"symcard\"><div class=\"sy\">⭕</div><div class=\"sn\">Oxidising</div><div class=\"sd\">May intensify fire — keep from flammables</div></div>\n        <div class=\"symcard\"><div class=\"sy\">⛽</div><div class=\"sn\">Compressed gas</div><div class=\"sd\">Gas under pressure — risk if heated</div></div>\n      </div>"
   },
   {
    "name": "SDS sheets",
    "html": "\n      <h3>Safety Data Sheets</h3>\n      <p>Every chemical comes with an <strong>SDS (Safety Data Sheet)</strong> — a standard document that tells you its hazards, how to handle it safely, what PPE to wear, and exactly what to do in a spill or if you're exposed.</p>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Read before first use</span>Read the SDS for every product before you use it for the first time. It takes two minutes and it's where you learn the one thing about that product that could hurt you. All Clean Like A Pro SDS documents are at cleanlikeapro.com.au/pages/sds</div>${REF:sds}"
   },
   {
    "name": "Our products",
    "html": "\n      <h3>Why organic and Australian-made</h3>\n      <p>WoodBClean uses the <strong>Clean Like A Pro</strong> range — Australian-owned, Australian-made, created by professional cleaners who had the same frustrations we did. There's a real reason for this, not just marketing.</p>\n      <p>Conventional cleaning products are petrochemical-based (made from crude-oil derivatives). They work, but they leave residue on surfaces, they go down drains into waterways, and they sit in the air where people live. On a camp, hundreds of people breathe that air and use those surfaces every day.</p>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Part of looking after people</span>Using products that are powerful enough to do the job but safe for the people living in the space is part of the trust we're given. It's also part of our environmental compliance on a sensitive remote site.</div>"
   },
   {
    "name": "Dilution",
    "html": "\n      <h3>Correct dilution — more is not better</h3>\n      <p>Over-concentrated product is one of the most common mistakes, and it causes real problems: it wastes money, it can damage surfaces, and it leaves a residue that actually makes things dirtier faster.</p>\n      <ul><li>Use the correct measure for the product — don't eyeball it or \"add a bit extra for good measure\"</li><li>Label diluted bottles clearly</li><li>Mix fresh as needed rather than leaving diluted product sitting for weeks</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">The residue trap</span>Too much product = sticky residue = surfaces attract dirt faster = the room looks dirty sooner. Correct dilution isn't just cheaper, it keeps the clean lasting longer.</div>"
   },
   {
    "name": "Never mix",
    "html": "\n      <h3>Never mix chemicals</h3>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">This can kill</span>Mixing chemicals — especially anything containing bleach with anything containing ammonia or acid — can create toxic gas that can seriously injure or kill you in an enclosed space like a bathroom. Never mix products. Never combine what's in two bottles to make something \"stronger.\"</div>\n      <p>Two hard rules that go with this:</p>\n      <ul><li><strong>Never decant into an unlabelled bottle.</strong> A bottle you can't identify at a glance is a hazard to everyone on camp.</li><li><strong>If it's not labelled, it doesn't get used.</strong> Report it so it can be identified or safely disposed of.</li></ul>"
   },
   {
    "name": "Spill response",
    "html": "\n      <h3>If you cause or find a spill</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Contain it</div><p>Stop it spreading — especially away from drains and bare ground. Use a spill kit if there's one.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Report it</div><p>Tell your supervisor immediately. Don't try to hide a spill.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Clean up per the SDS</div><p>Use the method and PPE the Safety Data Sheet specifies for that product — not a guess.</p></div></div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Never into drains or ground</span>Never pour, wash or let chemicals run into drains or onto the ground. On a sensitive remote site this breaches environmental compliance and can contaminate water — a serious issue that can threaten the whole operation.</div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "A toilet is heavily stained and the normal product isn't shifting it. There's a bottle of bleach-based cleaner and a bottle of a stronger acidic descaler on the trolley. You think mixing them might finally cut through the stain. What do you do?",
    "answer": "You never mix them — combining a bleach product with an acid can release chlorine gas, which in a small enclosed ensuite can seriously injure or kill you within minutes. Instead: use one product correctly, give it proper dwell time, and use physical scrubbing. If a stain genuinely won't shift, report it — it may be a maintenance issue (like a cracked or worn surface) rather than a cleaning one. No stain is worth your life."
   },
   {

    "name": "Check yourself",
    "title": "Cover the screen and answer from memory",

      "q": "What does an SDS tell you, and when must you read it?",

 {
  "id": 6,
  "cat": "Safety & Compliance",
  "title": "Site Driving & Vehicles",
  "sub": "Mine-site vehicles",
  "lead": "Driving on and around a mine site is one of the highest-risk things anyone does there — light vehicles share roads with enormous heavy machinery. This module covers the site vehicle rules that keep you alive, plus transporting chemicals and what to do in an incident.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Vehicle interaction is a top killer on mine sites</h3>\n      <p>Across the mining industry, vehicle incidents — especially light vehicles interacting with heavy machinery — are one of the leading causes of serious injury and death. A haul truck driver physically cannot see a light vehicle right beside or behind them. On a camp, you may drive between accommodation, facilities and work areas. Knowing the rules isn't a formality; it's survival.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>The single most important thing to internalise: heavy vehicles cannot see you and cannot stop quickly. Everything in this module flows from that. Learn it and you protect your own life every time you get behind the wheel on site.</div>"
   },
   {
    "name": "Site vehicle rules",
    "html": "\n      <h3>Driving on a mine site</h3><div class=\"diagram-wrap\">${DIAG:giveWay}</div>\n      <p>Mine sites have strict, non-negotiable traffic rules, set out in the site's traffic management plan and covered in your induction. The core ones:</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Give way to heavy vehicles — always</div><p>Light vehicles ALWAYS give way to heavy machinery. Assume they cannot see you. Never pull in front of, beside, or behind a haul truck or dozer.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Obey site speed limits</div><p>Site limits are often lower than road limits and strictly enforced. Speeding on a mine site is a serious breach that can remove you from site.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Lights on, follow signage</div><p>Headlights on as required, follow all site signage, designated light-vehicle routes, and no-go zones.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Positive communication</div><p>Where required, make radio contact or use positive-communication protocols before approaching heavy-vehicle areas. Never assume — confirm.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Park safely</div><p>Park only in designated areas, wheels chocked / park brake on as required, nose-out where the site requires it. Never block access or emergency routes.</p></div></div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">The blind spot rule</span>A haul truck has huge blind spots — a light vehicle can be completely invisible to the operator. If you can't see the operator's eyes (or mirrors), assume they can't see you. Stay well back and well clear.</div>"
   },
   {
    "name": "Pre-start checks",
    "html": "\n      <h3>Check the vehicle before every drive</h3>\n      <p>A quick pre-start check before you drive any site vehicle catches problems before they become incidents:</p>\n      <ul><li><strong>Tyres</strong> — condition and pressure look right</li><li><strong>Lights & indicators</strong> — all working (critical on a dusty site)</li><li><strong>Windscreen & mirrors</strong> — clean, clear, adjusted</li><li><strong>Fluids & fuel</strong> — no obvious leaks, enough fuel</li><li><strong>Two-way radio</strong> — working and on the right channel, if required</li><li><strong>Seatbelt & horn</strong> — working</li></ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Log it if required</span>Many sites require a pre-start checklist to be completed and recorded. If yours does, fill it in honestly every time — it's a safety record and an audit record. If anything fails the check, report it and don't drive the vehicle.</div>"
   },
   {
    "name": "Transporting chemicals",
    "html": "\n      <h3>Carrying chemicals in a vehicle</h3>\n      <p>You may need to move cleaning chemicals between areas. Done wrong, a spill in a vehicle is dangerous.</p>\n      <ul><li>Only transport chemicals in <strong>properly sealed, labelled containers</strong></li><li>Secure them so they can't tip, roll or fall during driving</li><li>Keep them <strong>separated</strong> — never let incompatible chemicals travel where a leak could let them mix</li><li>Ventilate — don't drive with fumes building up in an enclosed cab</li><li>Carry the relevant SDS knowledge; know what to do if one spills</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">A spill in a moving vehicle</span>If a chemical spills while you're driving, pull over safely, ventilate, and follow the spill response from Module 4. Never keep driving through fumes. Report it immediately.</div>"
   },
   {
    "name": "Fatigue & fitness",
    "html": "\n      <h3>Never drive impaired or exhausted</h3>\n      <p>On long rosters, fatigue is a genuine driving hazard — it slows reactions as much as alcohol does.</p>\n      <ul><li><strong>Never drive fatigued</strong> — if you're too tired to drive safely, don't. Contact your supervisor.</li><li><strong>Zero tolerance for drugs and alcohol</strong> — driving under the influence on a mine site means instant removal and is potentially criminal.</li><li><strong>No handheld phone use</strong> — illegal and dangerous. Pull over safely if you must take a call.</li><li><strong>Plan the trip</strong> — know your route and conditions before you set off.</li></ul>${REF:driving}"
   },
   {
    "name": "If there's an incident",
    "html": "\n      <h3>Accidents & incidents</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Make it safe</div><p>Stop, secure the vehicle, check for injuries. Your safety and others' comes first.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Raise the alarm</div><p>Call for help / medical if anyone's hurt, per site emergency procedures.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Report immediately</div><p>Notify your supervisor and follow the site's incident process. Even a minor bump on a mine site must be reported.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Don't move on quietly</div><p>Never leave the scene of even a minor incident without reporting it — that's a serious breach.</p></div></div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You're driving a light vehicle to the far accommodation block and a loaded haul truck is approaching an intersection ahead of you. You have right of way by normal road rules and you're running a bit late. What do you do?",
    "answer": "You give way to the haul truck — always, regardless of normal road rules. On a mine site, light vehicles give way to heavy vehicles every time, because the truck operator very likely cannot see you and cannot stop a loaded truck quickly even if they could. 'Right of way' from public roads does not apply here; the site traffic rules and the blind-spot reality do. Being late is never a reason to assert right of way against a machine that can't see you and would win. Wait, stay well clear, and let it through."

 {
  "id": 7,
  "cat": "Core Skills",
  "title": "Core Cleaning Principles",
  "sub": "Universal rules",
  "lead": "The universal rules that apply to every WoodBClean job, whatever you're cleaning. Master these five and everything else — dongas, ablutions, the kitchen — becomes faster and easier, because the thinking is already done.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Learn the rules once, use them everywhere</h3>\n      <p>Every specific task on camp — a donga, an ablution block, the mess — is built on the same handful of universal principles. If you learn these five rules properly now, you're not memorising a dozen separate procedures later. You're applying the same thinking to each new space.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Cleaners who understand the <em>why</em> behind these rules work faster and make fewer mistakes than cleaners who just follow steps. This is the module that makes you good, not just competent.</div>"
   },
   {
    "name": "The 5 rules",
    "html": "\n      <h3>The 5 rules for every WoodBClean job</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Read the environment first</div><p>Walk the space before you touch anything. Note what's broken, unusual, or needs flagging. Thirty seconds of looking saves you from cleaning around a problem you should have reported.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Vacuum first — always</div><p>Before any product or wet cloth touches a surface, vacuum. Wet cleaning first turns dust into smeared grime and undoes your work. Dry debris comes up first, every time.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Top to bottom, back to front</div><p>High surfaces first, floors last — gravity pulls debris down, so working downward means you never re-dirty. Start at the back of the room and work toward the door, so you never walk on what you've cleaned.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Door shut = room complete</div><p>A closed door means done to standard. An open door means work in progress. Don't re-enter a finished room and re-contaminate it.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Photos before you leave</div><p>Record completed work per the site's system before you leave — your timestamped record and your protection if any question ever comes up.</p></div></div>"
   },
   {
    "name": "Why sequence matters",
    "html": "\n      <h3>The logic behind the order</h3>\n      <p>The sequence isn't arbitrary — it's physics. Understanding it means you'll never get it wrong:</p>\n      <h4>Why top to bottom</h4>\n      <p>Gravity means dust and debris fall down. If you clean the floor first and the shelves second, everything you knock off the shelves lands on your clean floor. Work downward and you only clean each surface once.</p>\n      <h4>Why back to front</h4>\n      <p>If you start at the door and work inward, you have to walk back out across everything you've cleaned — re-dirtying the floor and re-contaminating surfaces. Start at the back and back yourself out, and you never touch clean areas again.</p>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">The payoff</span>Get the sequence right and you clean each surface once. Get it wrong and you clean some things two or three times. Sequence is what makes you both faster AND more thorough — not one or the other.</div>"
   },
   {
    "name": "Colour coding",
    "html": "\n      <h3>Colour-coded cloths — non-negotiable</h3><div class=\"diagram-wrap\">${DIAG:colourCode}</div>\n      <p>The colour system exists to stop cross-contamination between dirty and clean areas. Each colour is locked to a zone:</p>\n      <div class=\"symgrid\">\n        <div class=\"symcard\"><div class=\"sy\">🔴</div><div class=\"sn\">Red</div><div class=\"sd\">Toilets & sanitary areas only</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🔵</div><div class=\"sn\">Blue</div><div class=\"sd\">General surfaces</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🟡</div><div class=\"sn\">Yellow</div><div class=\"sd\">Kitchen & food areas</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🟢</div><div class=\"sn\">Green</div><div class=\"sd\">Where used, per site standard</div></div>\n      </div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Never cross them</span>A cloth that touched a toilet must never touch a basin or a bench. Crossing colours transfers bacteria like E. coli between surfaces. On a camp, that's how a gastro outbreak starts — and one outbreak can put dozens of workers out and threaten the contract.</div>"
   },
   {
    "name": "Dwell time",
    "html": "\n      <h3>Let the product do the work</h3>\n      <p>Disinfectants and cleaners need <strong>dwell time</strong> — time sitting on the surface to actually kill bacteria and break down grime. Spraying and instantly wiping is one of the most common mistakes, and it means the surface looks wiped but isn't disinfected.</p>\n      <ul><li>Apply the product</li><li>Leave it the time the label specifies (usually a few minutes)</li><li>Then wipe or scrub</li></ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Turn dwell time into speed</span>The smart move: apply product to the toilet and shower first, then do other tasks while it dwells, and come back. You're not standing around waiting — you're working elsewhere while the chemistry does its job. This is the single biggest time-saver in the trade.</div>"
   },
   {
    "name": "Photo documentation",
    "html": "\n      <h3>Photograph to flag, and to prove</h3>\n      <h4>On arrival</h4>\n      <p>You don't photograph everything. Photograph only if you find something to flag — pre-existing damage, personal items left behind, mould, unusual or extreme conditions. Send it to your supervisor before you start, so there's a record it was already like that.</p>\n      <h4>On completion</h4>\n      <p>Photograph the finished work per the site's system before you leave — not from your car, not later from your room. The timestamp is your completion record and your protection if any dispute ever arises about whether a room was done or done properly.</p>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Your protection</span>Photos aren't about surveillance — they're your evidence. If a worker complains a room wasn't cleaned, your timestamped photo settles it instantly. It protects you far more than it checks up on you.</div>"
   },
   {
    "name": "Common fail points",
    "html": "\n      <h3>Where quality slips — check yourself against these</h3>\n      <p>These are the eleven most common places a clean falls short. Knowing them is how you avoid them:</p>\n      <ul><li>Skipping the vacuum-first rule</li><li>Cleaning floors before high surfaces</li><li>Crossing cloth colours</li><li>Not letting product dwell</li><li>Missing skirtings, sills, switches, handles</li><li>Poor bathroom detail (grout, drains, under the rim)</li><li>Streaky mirrors and glass</li><li>Not restocking amenities</li><li>Leaving hair in drains</li><li>Cleaning around a problem instead of reporting it</li><li>Leaving before photos are done</li></ul>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You're rushing and you spray disinfectant on a bathroom bench, wipe it straight away, and move on — it looks clean and shiny. Have you disinfected it?",
    "answer": "No. It looks clean but it isn't disinfected, because you didn't give the product its dwell time. Disinfectant needs those few minutes on the surface to actually kill bacteria — wiping it off immediately just spreads it around and removes it before it's worked. The fix isn't to slow down; it's to sequence smart: spray it, go do something else (the toilet, the shower), then come back and wipe once it's dwelled. Same time, proper result."
   },
