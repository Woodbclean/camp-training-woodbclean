      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Showers</div><p>Clear all hair from drains, scrub walls and floors, treat any mould, and check for slip hazards. Showers are a top complaint and a slip risk.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">Basins & mirrors</div><p>BLUE cloths. Wipe and polish streak-free. Clean the taps — high-touch points.</p></div></div>
      <div class="step"><div class="step-n">5</div><div class="step-b"><div class="st">Restock</div><p>Toilet paper, soap, paper towel. Running out between services is a guaranteed complaint.</p></div></div>
      <div class="step"><div class="step-n">6</div><div class="step-b"><div class="st">Floors & log</div><p>Disinfect and mop last, working out toward the door. Then sign the check sheet on the door.</p></div></div>`},
    {name:"Check sheets", html:`
      <h3>Sign every single service</h3>
      <p>Every ablution block has a check sheet on the door. You sign it every time you service the block. This isn't bureaucracy — it does three real jobs:</p>
      <ul><li><strong>Proves frequency</strong> — that the block is being cleaned as often as required (a health and ISO requirement)</li><li><strong>Protects you</strong> — it's your record that you did the job, at that time</li><li><strong>Coordinates the team</strong> — the next person can see when it was last done</li></ul>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">The record IS the compliance</span>When an auditor or the client checks whether ablutions are serviced to standard, the check sheet is the evidence. No signature = no proof it happened = a compliance gap. Your signature is part of the quality system.</div>`},
    {type:"scenario", name:"Real scenario", scenario:"You're servicing an ablution block and you're almost done, but you notice one shower drain is still partly blocked with hair and draining slowly. Clearing it properly means getting your gloved hand in and it's unpleasant. The block otherwise looks spotless. Do you leave it?", answer:"No — you clear it properly. A slow drain means standing water, which is a slip hazard and a breeding ground for bacteria and mould. 'Otherwise spotless' doesn't count if the one thing you skipped is the health risk. Glove up, clear it fully, and disinfect. Then sign the sheet honestly. The unpleasant two minutes is exactly the part of the job that protects the workforce — and it's what separates a WoodBClean clean from a 'looks fine' clean."},
    {type:"recall", name:"Check yourself", title:"Cover the screen and answer from memory", items:[
      {q:"Why is an ablution block higher-risk than a donga?", a:"It's shared by many workers, so poor cleaning spreads illness to lots of people fast."},
      {q:"What colour cloth for the toilets and urinals?", a:"Red only."},
      {q:"What's the number-one thing to clear in a shower, and why?", a:"Hair from the drain — it causes standing water, slip hazards, and bacteria."},
      {q:"What are the three jobs the check sheet does?", a:"Proves cleaning frequency, protects you with a record, and coordinates the team."}
    ]},
    {type:"reflect", name:"✏️ Reflections", prompt:"Why is signing the ablution check sheet important — for the camp, for the compliance system, and for you personally? Write it in your own words."},
    {type:"checklist", name:"Checklist", items:["I understand why ablution blocks are the highest-hygiene job","I know the ablution routine in order","I will use red cloths for toilets and urinals only","I'll clear shower drains fully every time","I will sign the check sheet every single service"]},
    {type:"quiz", name:"Quiz", q:"Why are shared ablution blocks the highest-hygiene job on camp?", opts:["They're the biggest","They're shared and high-traffic, so poor cleaning spreads illness fast","They have the most mirrors"], correct:1}
  ]
},
{
  id:8, cat:"Camp Operations", title:"The Camp Kitchen & Food Safety", sub:"Catering · HACCP",
  lead:"The mess feeds the whole workforce — often 130+ people, three meals a day plus crib lunches. It runs to a strict food-safety standard because on a remote site, a food-poisoning outbreak could shut the whole operation down. This is serious, and this module makes you safe in it.",
  tabs:[
    {name:"Why this matters", html:`
      <h3>Food safety is life and death here</h3>
      <p>In a restaurant, a food safety slip might make a few people unwell. On a remote camp feeding 130+ people from one kitchen, a slip can put a huge chunk of the workforce down at once — with no quick hospital nearby. Food safety on a camp isn't a formality. It's one of the most consequential things WoodBClean does.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">What's in it for you</span>Good food is also one of the biggest factors in whether workers are happy and stay — the research on remote camps is clear about it. When you keep the kitchen safe and the food good, you're directly protecting people's health AND the camp's morale.</div>`},
    {name:"The mess", html:`
      <h3>The heart of the camp</h3>
      <p>The camp kitchen — the "mess" — feeds everyone on site. Breakfast, lunch, dinner, plus packed "crib" lunches for workers to take on shift. After a hard shift, a good hot meal is one of the few real comforts, and its quality directly affects morale, wellbeing, and whether people stay on.</p>
      <p>That makes the kitchen one of the most important operations WoodBClean runs — and one of the most tightly controlled, because of the food-safety stakes.</p>`},
    {name:"HACCP basics", html:`
      <h3>What HACCP is and why it matters</h3>
      <p><strong>HACCP (Hazard Analysis and Critical Control Points)</strong> is the food-safety system that keeps 130+ people from getting sick. It's not complicated in principle — it identifies the points where food can become dangerous and puts a control at each one.</p>
      <h4>The critical controls</h4>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Temperature</div><p>Cold food stays below 5°C, hot food above 60°C. Record temperatures.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Separation</div><p>Raw and ready-to-eat food never cross — separate boards, surfaces, storage.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Hygiene</div><p>Handwashing, clean uniforms, and never working while sick.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">Traceability</div><p>Label and date everything; first in, first out.</p></div></div>`},
    {name:"The danger zone", html:`
      <h3>5°C to 60°C — the danger zone</h3>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Where bacteria multiply fast</span>Between 5°C and 60°C, bacteria in food multiply rapidly. This is THE danger zone. Cold food must stay below 5°C. Hot food must stay above 60°C. Food sitting in between — on a bench, in a warmer that's not hot enough — is growing bacteria every minute.</p></div>
      <p>This is why we record temperatures: not to fill in a form, but because a temperature log is the proof that food never sat in the danger zone. It's a HACCP requirement and it's the single most important food-safety control on camp.</p>`},
    {name:"Kitchen cleaning", html:`
      <h3>Kitchen cleaning standard</h3>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Clean as you go</div><p>Never let dirty gear pile up. Wipe surfaces between tasks — it's faster and safer than a big clean-up at the end.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Yellow zone only</div><p>YELLOW cloths for kitchen and food areas — never a cloth that's been used anywhere else. This is the colour code that stops bathroom bacteria reaching food.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Sanitise surfaces</div><p>Clean then sanitise prep surfaces, always between raw and ready-to-eat use. Cleaning removes dirt; sanitising kills bacteria — you need both.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">Equipment daily</div><p>Ovens, cooktops, fryers, grills — degrease and clean daily, following the SDS for the degreaser.</p></div></div>
      <div class="step"><div class="step-n">5</div><div class="step-b"><div class="st">Floors & drains</div><p>Degrease floors and clear drains — grease build-up is both a slip hazard and a pest attractant.</p></div></div>
      <div class="step"><div class="step-n">6</div><div class="step-b"><div class="st">Cool room & storage</div><p>Keep clean, organised, labelled and dated. First in, first out — older stock used first.</p></div></div>`},
    {name:"Never work sick", html:`
      <h3>If you're unwell, stay out</h3>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Report it — don't push through</span>A stomach bug passed from your hands into camp food could put the entire workforce down. If you're unwell — especially with any stomach or gut symptoms — you report it and you stay out of the kitchen and away from food. Never push through a sickness in a food role.</div>
      <p>This is one of those places where "toughing it out" is exactly the wrong instinct. On a camp, one sick food handler can become a hundred sick workers. Reporting it is the responsible, professional thing — and it's expected.</p>`},
    {type:"scenario", name:"Real scenario", scenario:"During a busy meal service, a tray of cooked meat has been sitting out on the pass for over an hour because service ran long. It still looks and smells fine. The next crib order needs meat. Do you use it?", answer:"No. 'Looks and smells fine' is exactly the trap — dangerous bacteria don't change how food looks or smells. Cooked meat sitting on the pass has almost certainly been in the 5–60°C danger zone for over an hour, long enough for bacteria to multiply to unsafe levels. It gets discarded, and fresh hot food is used. On a camp, serving that tray to save time could put dozens of workers down. When in doubt, temperature and time win over how it looks — every time."},
    {type:"recall", name:"Check yourself", title:"Cover the screen and answer from memory", items:[
      {q:"What is the food-safety temperature danger zone?", a:"5°C to 60°C — where bacteria multiply fast."},
      {q:"Where must cold food and hot food each be kept?", a:"Cold below 5°C, hot above 60°C."},
      {q:"What colour cloth for kitchen and food areas, and why?", a:"Yellow only — it stops bacteria from other areas reaching food."},
      {q:"Why do we record food temperatures?", a:"It's the proof food never sat in the danger zone — a HACCP requirement."},
      {q:"You wake up with a stomach bug on a kitchen shift. What do you do?", a:"Report it and stay out of the kitchen — never handle food while sick."}
    ]},
    {type:"reflect", name:"✏️ Reflections", prompt:"Explain the food-safety danger zone in your own words, and give one specific example of how you'd keep food out of it during a busy meal service."},
    {type:"checklist", name:"Checklist", items:["I understand why food safety is critical on a remote camp","I know the HACCP critical controls","I know the temperature danger zone is 5–60°C","I know yellow cloths are kitchen-only","I understand clean vs sanitise","I will never handle food while sick"]},
    {type:"quiz", name:"Quiz", q:"What is the food-safety temperature danger zone?", opts:["0–5°C","5–60°C","60–100°C"], correct:1}
  ]
},
{
  id:9, cat:"Camp Operations", title:"Laundry, Waste & Environmental Care", sub:"Operations · ISO 14001",
  lead:"Beyond dongas and the mess, a camp needs laundry, waste management and environmental care — each with its own standard, and all of it under environmental rules because a remote camp sits in a sensitive location.",
  tabs:[
    {name:"Why this matters", html:`
      <h3>The jobs that keep everything else working</h3>
      <p>Laundry, waste and environmental care are easy to treat as afterthoughts — but they're the systems that keep the whole camp hygienic, legal and running. Get laundry wrong and you undo every room clean. Get waste wrong and you attract pests and breach environmental rules. Get environmental care wrong and you can threaten the whole operation's licence to be there.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">What's in it for you</span>These are the jobs where small daily choices add up to big consequences. Doing them right is quiet, unglamorous, and exactly the kind of thing that marks out a professional from someone just going through the motions.</div>`},
    {name:"Laundry", html:`
      <h3>Camp laundry</h3>
      <p>You'll wash, dry and fold linen and towels to a schedule that keeps up with room turnovers. The single most important rule:</p>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Clean and dirty never mix</span>Keep clean and dirty linen strictly separated at all times — separate areas, separate trolleys, separate handling. If clean linen touches dirty, or shares a trolley, you've cross-contaminated it and undone the hygiene of every room it goes into. This is the one rule that matters most in laundry.</div>
      <ul><li>Bagged dirty linen goes straight to the dirty side — never set down in a clean area</li><li>Wash at the correct temperature for hygiene</li><li>Fold and store clean linen only in clean, covered areas</li></ul>`},
    {name:"Waste", html:`
      <h3>Waste segregation</h3>
      <p>Segregate waste correctly and follow the site's system exactly. A camp typically separates:</p>
      <ul><li><strong>General waste</strong></li><li><strong>Recycling</strong></li><li><strong>Food / organic waste</strong> — must be managed tightly to avoid pests</li><li><strong>Hazardous waste</strong> — per strict site rules</li></ul>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">Why segregation matters here</span>On a remote site, waste can't just be carted off daily like in a city. It's stored and managed on site, so getting the streams right prevents pests, contamination and environmental breaches. Putting the wrong thing in the wrong bin has bigger consequences here than at home.</div>`},
    {name:"Environmental care", html:`
      <h3>A sensitive environment</h3>
      <p>A remote camp sits in a sensitive natural environment, governed by the Environmental Protection Act and the site's own environmental controls. How we handle waste, chemicals and water is part of our <strong>ISO 14001-aligned</strong> environmental compliance (the environmental management standard).</p>
      <div class="callout key"><span class="ci">✓</span><span class="ct">Small choices add up</span>Correct dilution so you use less chemical. No spills to ground or drains. Correct waste streams. Conserving water. Reporting leaks. None of these is dramatic on its own — but together they're what keeps WoodBClean and the client environmentally compliant, and what protects the country the camp sits on.</div>`},
    {name:"Water", html:`
      <h3>Water is precious here</h3>
      <p>On a remote site, water is a limited, carefully managed resource — often trucked in or drawn from a controlled supply, with wastewater tightly regulated. Don't waste it.</p>
      <ul><li>Don't leave taps running while you work</li><li>Report leaks and running toilets immediately — both for conservation and because a leak can signal a bigger problem</li><li>Use the right amount of water for the job, not more</li></ul>`},
    {type:"scenario", name:"Real scenario", scenario:"You're doing laundry and you're behind. There's a small pile of clean folded towels on the bench, and you need that bench space, so you're tempted to just rest the next bag of dirty linen next to them for a moment while you sort things out. Is that okay?", answer:"No — even 'for a moment' breaks the one rule that matters most in laundry. Dirty linen carries bacteria from bathrooms and beds; the moment it shares space with clean towels, those towels are contaminated and can't go into a fresh room. Being behind is never a reason to cross clean and dirty. Move the clean towels to the clean side first, or find other space for the dirty bag. Keeping the two strictly separated is non-negotiable, busy or not."},
    {type:"recall", name:"Check yourself", title:"Cover the screen and answer from memory", items:[
      {q:"What's the one rule that matters most in the laundry?", a:"Clean and dirty linen never mix — strictly separated at all times."},
      {q:"Name two waste streams a camp separates.", a:"General, recycling, food/organic, hazardous (any two)."},
      {q:"Why does waste segregation matter more on a remote site than at home?", a:"Waste is stored and managed on site, so wrong streams cause pests, contamination and environmental breaches."},
      {q:"Name two small daily choices that support environmental compliance.", a:"Correct dilution, no spills to ground/drains, correct waste streams, conserving water, reporting leaks (any two)."}
    ]},
    {type:"reflect", name:"✏️ Reflections", prompt:"Give two examples of small daily choices you'll make that add up to WoodBClean's environmental compliance on a remote camp."},
    {type:"checklist", name:"Checklist", items:["I will keep clean and dirty linen strictly separated, always","I understand correct waste segregation and why it matters here","I understand our environmental responsibility (ISO 14001-aligned)","I will conserve water and report leaks immediately"]},
    {type:"quiz", name:"Quiz", q:"In the camp laundry, clean and dirty linen should be:", opts:["Mixed to save time when busy","Kept strictly separated at all times","Stored together"], correct:1}
  ]
},
{
  id:10, cat:"People & Standards", title:"Living Remote & Your Wellbeing", sub:"Wellbeing · Conduct",
  lead:"Remote camp life is demanding — long rosters, away from home, living where you work. Looking after yourself and each other keeps the camp a good place to be, and it's a genuine safety issue, not just a soft one.",
  tabs:[
    {name:"Why this matters", html:`
      <h3>Your wellbeing IS a safety issue</h3>
      <p>It's easy to think of wellbeing as separate from "real" safety like chemicals and machinery. It isn't. The research on remote and FIFO work is clear: tired, isolated, struggling workers have more accidents and more injuries. Looking after your mental and physical wellbeing is part of keeping yourself and others safe.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">What's in it for you</span>Camp rosters are hard on people. Knowing how to look after yourself — and spot when a mate is struggling — is what gets you through your swings well, not just survived. This module is genuinely for you.</div>`},
    {name:"The reality", html:`
      <h3>Camp life is intense — that's normal</h3>
      <p>Living where you work, on a long roster, away from family and friends, is genuinely demanding. The research (including the WA Health FIFO study) found that remote workers experience noticeably higher rates of psychological distress, isolation, and relationship strain than the general population. If you find it hard sometimes, that's not weakness — it's a normal response to a hard situation.</p>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">The FIFO Code of Practice</span>There's a formal Code of Practice for how remote camps should support worker mental health and wellbeing — it exists because this matters and because the industry has learned it the hard way. WoodBClean takes it seriously, because looking after our people is both right and smart.</div>`},
    {name:"Looking after yourself", html:`
      <h3>Practical wellbeing on a roster</h3>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Manage fatigue</div><p>Rest properly between shifts. Tiredness is a genuine safety risk — it slows reactions and clouds judgement. Sleep is part of the job.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Stay connected</div><p>Keep in touch with home during your off time. Isolation is one of the biggest pressures of camp life — a regular call home helps more than you'd think.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Use the facilities</div><p>Gym, rec areas, good food — they're there for a reason. Movement and routine protect your head as much as your body.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">Use the supports</div><p>EAP (Employee Assistance Program) and wellbeing services are confidential and free. Using them is a sign of good sense, not weakness.</p></div></div>`},
    {name:"Looking after each other", html:`
      <h3>Watch out for your mates</h3>
      <div class="callout key"><span class="ci">✓</span><span class="ct">This is part of the job</span>In a closed community, noticing when someone's struggling — going quiet, withdrawing, not eating, drinking more — and checking in on them isn't being nosy. It's part of how a camp keeps its people safe. A quiet "you alright, mate?" has genuinely saved lives on remote sites.</div>
      <p>You don't have to fix anything or be a counsellor. Just notice, check in, and if you're worried, tell a supervisor so the right support can reach them.</p>`},
    {name:"Conduct", html:`
      <h3>Respect in a shared home</h3>
      <p>A camp is hundreds of people living in close quarters, working all hours. That only works if everyone respects the shared space:</p>
      <ul><li>Respect fellow workers, cultural differences and shared spaces</li><li>Zero tolerance for harassment, bullying or violence</li><li>Keep noise and behaviour considerate — someone is always sleeping for the next shift</li><li>Represent WoodBClean well, on shift and off</li></ul>`},
    {type:"scenario", name:"Real scenario", scenario:"A workmate who's usually chatty has gone quiet over the last week. They've stopped coming to the mess for dinner, and you saw them sitting alone looking flat. It's not really your business, and you don't want to intrude. What do you do?", answer:"You check in — a simple, genuine 'hey, haven't seen you at dinner, you doing okay?' Withdrawing, not eating, and going flat are exactly the signs the research tells us to watch for on remote sites. You don't need to fix anything or push — just let them know someone noticed and cares. If they open up about really struggling, or you stay worried, quietly let a supervisor know so proper support can reach them. On a camp, looking out for each other isn't intruding — it's part of keeping everyone safe."},
    {type:"recall", name:"Check yourself", title:"Cover the screen and answer from memory", items:[
      {q:"Why is managing fatigue a safety issue, not just a comfort issue?", a:"Tiredness slows reactions and clouds judgement, causing more accidents and injuries."},
      {q:"Is finding camp life hard a sign of weakness?", a:"No — it's a normal response to a genuinely demanding situation."},
      {q:"What is the EAP, and what should you know about it?", a:"The Employee Assistance Program — confidential, free wellbeing support; using it is good sense."},
      {q:"What are some signs a workmate might be struggling?", a:"Going quiet, withdrawing, not eating, sitting alone, drinking more, seeming flat."},
      {q:"If you're worried about a mate, what can you do beyond checking in?", a:"Quietly tell a supervisor so proper support can reach them."}
    ]},
    {type:"reflect", name:"✏️ Reflections", prompt:"What are two specific things you'll do to look after your own wellbeing on a long remote roster, and one way you'll look out for a workmate?"},
    {type:"checklist", name:"Checklist", items:["I understand remote work affects mental health and safety","I know practical ways to look after my own wellbeing","I know the signs a workmate might be struggling and to check in","I understand conduct expectations in a shared community","I know EAP and supports are available, free and confidential"]},
    {type:"quiz", name:"Quiz", q:"Managing fatigue on a remote roster is:", opts:["Not important","Part of the job and a genuine safety issue","Only for night shift"], correct:1}
  ]
},
{
  id:11, cat:"People & Standards", title:"Reporting, Incidents & Speaking Up", sub:"WHS · ISO 45001",
  lead:"The most important safety tool on any site isn't a piece of equipment — it's your voice. Hazards, near misses, injuries, food issues, maintenance problems: you report them, every time. This module shows you how and why.",
  tabs:[
    {name:"Why this matters", html:`
      <h3>Your voice prevents the next injury</h3>
      <p>Almost every serious incident on a worksite was preceded by warning signs, near misses, or hazards that someone noticed but didn't report. Reporting is the single most powerful thing you can do for safety — it lets a problem get fixed before it hurts someone. On a remote site, where help is far away, prevention matters even more.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">What's in it for you</span>The workmate you protect by reporting a hazard today might be the one who reports the hazard that protects you tomorrow. A reporting culture is everyone watching everyone's back — including yours.</div>`},
    {name:"How reporting works", html:`
      <h3>Report it — every time</h3>
      <ul><li>Report hazards and near misses to your supervisor <strong>immediately</strong>, not at the end of shift</li><li>All incidents are recorded and investigated — not to blame anyone, but to prevent the next one</li><li>You will <strong>never be punished</strong> for raising a genuine safety concern</li><li>If you see something unsafe, you have the right to <strong>stop work</strong></li></ul>
      <div class="callout key"><span class="ci">✓</span><span class="ct">A near miss reported today...</span>...prevents an injury tomorrow. Reporting isn't dobbing or making a fuss — it's how everyone gets home safe at the end of their swing. A camp where people report freely is a camp where people don't get hurt.</div>`},
    {name:"The accountability gap", html:`
      <h3>Don't pass the buck</h3>
      <p>On badly-run camps, there's a pattern the industry calls the "accountability gap": the caterer blames maintenance, maintenance blames housekeeping, and the problem everyone can see never actually gets fixed because no one owns it.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">Why this is our edge</span>WoodBClean is different: if you see a problem, you own getting it reported — whatever "department" it belongs to. The single biggest hidden cost on a camp is problems everyone sees and no one owns. Being the operator who closes that gap is a big part of why clients keep us. You closing it, in the small everyday moments, IS the WoodBClean difference in action.</div>`},
    {name:"What to report", html:`
      <h3>When in doubt, report</h3>
      <p>You never get in trouble for reporting something that turned out to be minor. You can cause real harm by staying quiet about something that turned out to be serious. So when in doubt, report. That includes:</p>
      <ul><li>Any injury, however minor</li><li>Near misses — the things that <em>could</em> have hurt someone</li><li>Hazards — slip risks, faulty equipment, chemical issues, damaged fittings</li><li>Maintenance problems in rooms or facilities</li><li>Food safety concerns</li><li>A workmate you're worried about</li><li>Anything that just doesn't feel right</li></ul>`},
    {type:"scenario", name:"Real scenario", scenario:"You trip on a loose bit of decking outside a donga. You catch yourself, no harm done, and you're busy — it'd be easy to just carry on. But it's exactly the sort of thing someone could really hurt themselves on. What do you do?", answer:"You report it — this is a classic near miss, and near misses are gold for prevention. You weren't hurt this time, but the next person carrying a heavy laundry bag might not catch themselves. Reporting it means the decking gets fixed before it causes a real injury. This is exactly the 'when in doubt, report' principle, and it's the opposite of the accountability gap — you owning a hazard you spotted, even though it 'wasn't your job' and even though nothing actually happened to you."},
    {type:"recall", name:"Check yourself", title:"Cover the screen and answer from memory", items:[
      {q:"When should you report a hazard or near miss?", a:"Immediately — not at the end of shift."},
      {q:"Will you be punished for raising a genuine safety concern?", a:"No — never. You're protected, and WoodBClean wants to hear it."},
      {q:"What is the 'accountability gap'?", a:"When departments blame each other and a visible problem never gets fixed because no one owns it."},
      {q:"You have a near miss but no one was hurt. Report it or not?", a:"Report it — near misses are exactly what prevent the next real injury."},
      {q:"If you see something unsafe, what right do you have?", a:"The right to stop work."}
    ]},
    {type:"reflect", name:"✏️ Reflections", prompt:"Describe a situation on a camp where you'd stop work and report — and explain, in your own words, why speaking up protects everyone, including you."},
    {type:"checklist", name:"Checklist", items:["I know to report hazards and near misses immediately","I understand I won't be punished for raising safety concerns","I understand I can stop work if something is unsafe","I understand the accountability gap and will own reporting","I know the kinds of things to report, and that 'when in doubt, report'"]},
    {type:"quiz", name:"Quiz", q:"If you see something unsafe on camp, you can:", opts:["Keep working and hope","Stop work and report it","Wait until the end of your swing"], correct:1}
  ]
},
{
  id:12, cat:"People & Standards", title:"Quality, Audits & the WoodBClean Standard", sub:"Quality · ISO 9001",
  lead:"We don't just hope the work is good — we check it, measure it, and improve it. This is what sets WoodBClean apart from operators who throw people in and hope. This final module ties everything together: you are the standard.",
  tabs:[
    {name:"Why this matters", html:`
      <h3>This is what makes us the best — and why you were trained</h3>
      <p>Anyone can say they do good work. WoodBClean proves it, every day, with records and checks and measurable standards. That's the difference between us and the "go in and hope" operators — and it's why you've done this whole training program instead of just being handed a mop and pointed at a room.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">What's in it for you</span>Working to a real quality system makes you genuinely good at this — a professional, not just a pair of hands. That's worth more to you: better shifts, progression, a reputation that follows you. Trained people have options.</div>`},
    {name:"How we prove quality", html:`
      <h3>Measured, not hoped</h3>

// ===== AUTH =====
function toggleMode(){
  signupMode=!signupMode;
  document.getElementById('spName').style.display=signupMode?'block':'none';
  document.getElementById('authBtn').textContent=signupMode?'Create Account':'Log In';
  document.querySelector('.sp-hint').innerHTML=signupMode
    ? 'Already have an account? <a href="#" onclick="toggleMode();return false">Log in</a><span id="authMsg"></span>'
    : 'First time here? <a href="#" onclick="toggleMode();return false">Create your account</a><span id="authMsg"></span>';
}
function msg(t){const m=document.getElementById('authMsg');if(m)m.textContent=t;}
async function doAuth(){
  const email=document.getElementById('spEmail').value.trim();
  const pass=document.getElementById('spPass').value;
  if(!email||!pass){msg('Enter your email and password.');return;}
  document.getElementById('authBtn').disabled=true;
  try{
    if(signupMode){
      const name=document.getElementById('spName').value.trim();
      if(!name){msg('Enter your full name.');document.getElementById('authBtn').disabled=false;return;}
      const res=await supa.auth.signUp({email,password:pass});
      if(res.error){msg(res.error.message);document.getElementById('authBtn').disabled=false;return;}
      if(res.data.user){
        await supa.from('profiles').upsert({id:res.data.user.id,full_name:name,email,role:'camp',total_xp:0,xp_level:1});
        currentUser=res.data.user;window.userName=name;launchApp();
      } else {msg('Check your email to confirm, then log in.');document.getElementById('authBtn').disabled=false;}
    } else {
      const res=await supa.auth.signInWithPassword({email,password:pass});
      if(res.error){msg(res.error.message);document.getElementById('authBtn').disabled=false;return;}
      currentUser=res.data.user;
      const prof=await supa.from('profiles').select('full_name,total_xp').eq('id',currentUser.id).single();
      window.userName=prof.data?prof.data.full_name:email;
      xp=prof.data&&prof.data.total_xp?prof.data.total_xp:0;
      await loadProgress();launchApp();
    }
  }catch(e){msg('Something went wrong. Try again.');document.getElementById('authBtn').disabled=false;}
}
async function loadProgress(){
  if(!currentUser)return;
  const res=await supa.from('progress').select('week_number,completed').eq('user_id',currentUser.id);
  if(res.data)res.data.forEach(r=>{if(r.completed)completed.add(r.week_number);});
}

// ===== MODULE VIEW =====
function showModule(id){
  currentView=id;
  buildSidebar();
  closeSidebarMobile();
  const m=MODULES.find(x=>x.id===id);
  let html='<div class="mod-header"><div class="crumb">Module '+m.id+' · '+m.cat+'</div><h2>'+m.title+'</h2><div class="lead">'+m.lead+'</div></div>';
  // tabs
  html+='<div class="tabbar">';
  m.tabs.forEach((t,i)=>{
    const special=(t.type==='reflect'||t.type==='checklist'||t.type==='quiz');
    html+='<div class="tab'+(i===0?' active':'')+(special?' special':'')+'" onclick="switchTab(this,'+id+','+i+')">'+t.name+'</div>';
  });
  html+='</div>';
  // panes
  m.tabs.forEach((t,i)=>{
    html+='<div class="tabpane'+(i===0?' active':'')+'" data-pane="'+id+'-'+i+'">'+renderPane(t,m,i)+'</div>';
  });
  // complete bar
  const done=completed.has(id);
  const quizKey=id;
  html+='<div class="complete-bar"><div class="complete-note">'+(done?'✓ You\'ve completed this module.':'Work through the tabs and pass the quiz to complete this module.')+'</div>';
  html+='<div style="display:flex;gap:10px">';
  html+='<button class="btn-complete'+(done?' done':'')+'" id="completeBtn" '+(done||passedQuiz.has(quizKey)?'':'disabled')+' onclick="completeModule('+id+')">'+(done?'✓ Completed':'Mark complete')+'</button>';
  const next=MODULES.find(x=>x.id===id+1);
  if(next)html+='<button class="btn-next" onclick="showModule('+(id+1)+')">Next →</button>';
  html+='</div></div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);
}

function renderPane(t,m,i){
  if(t.type==='reflect'){
    return '<h3>Your reflection</h3><p>'+t.prompt+'</p><div class="reflect"><label>Take a moment to write your thoughts — this is for your own learning.</label><textarea placeholder="Type your reflection here..."></textarea></div>';
  }
  if(t.type==='checklist'){
    let h='<h3>Before you move on</h3><p>Tick each item to confirm your understanding:</p>';
    t.items.forEach((it,ci)=>{h+='<label class="checkitem" onclick="toggleCheck(this)"><input type="checkbox"><span>'+it+'</span></label>';});
    return h;
  }
  if(t.type==='quiz'){
    let h='<h3>Knowledge check</h3><div class="quiz"><div class="quiz-q">'+t.q+'</div>';
    t.opts.forEach((o,oi)=>{h+='<label class="quiz-opt" onclick="answerQuiz(this,'+oi+','+t.correct+','+m.id+')">'+o+'</label>';});
    h+='</div>';
    return h;
  }
  return t.html;
}

function switchTab(el,id,i){
  const inner=document.getElementById('mainInner');
  inner.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  inner.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('active'));
  inner.querySelector('[data-pane="'+id+'-'+i+'"]').classList.add('active');
}
function toggleCheck(el){
  const cb=el.querySelector('input');
  cb.checked=!cb.checked;
  el.classList.toggle('checked',cb.checked);
}
function answerQuiz(el,chosen,correct,modId){
  const opts=el.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.classList.remove('correct','wrong'));
  if(chosen===correct){
    el.classList.add('correct');
    passedQuiz.add(modId);
    const btn=document.getElementById('completeBtn');
    if(btn&&!completed.has(modId))btn.disabled=false;
  } else {
    el.classList.add('wrong');
    opts[correct].classList.add('correct');
  }
}

async function completeModule(id){
  if(completed.has(id)){return;}
  completed.add(id);
  xp+=100;
  document.getElementById('xpNum').textContent=xp;
  if(currentUser&&!window.isOwnerMode){
    try{
      await supa.from('progress').upsert({user_id:currentUser.id,week_number:id,completed:true,completed_at:new Date().toISOString()});
      await supa.from('profiles').update({total_xp:xp}).eq('id',currentUser.id);
    }catch(e){console.warn('save failed',e);}
  }
  // refresh module view to show completed state
  showModule(id);
}

let finalAnswers = {};
function showFinal(){
  if(completed.size!==MODULES.length){ showDashboard(); return; }
  currentView='final';
  buildSidebar();
  closeSidebarMobile();
  finalAnswers={};
  let html='<div class="mod-header"><div class="crumb">Assessment</div><h2>'+FINAL_ASSESSMENT.title+'</h2><div class="lead">'+FINAL_ASSESSMENT.intro+'</div></div>';
  html+='<div id="finalQs">';
  FINAL_ASSESSMENT.questions.forEach((q,qi)=>{
    html+='<div class="quiz" style="margin-bottom:12px" data-fq="'+qi+'"><div class="quiz-q">'+(qi+1)+'. '+q.q+'</div>';
    q.opts.forEach((o,oi)=>{
      html+='<label class="quiz-opt" onclick="pickFinal('+qi+','+oi+',this)">'+o+'</label>';
    });
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="complete-bar"><div class="complete-note">Answer all '+FINAL_ASSESSMENT.questions.length+' questions, then submit. You need '+FINAL_ASSESSMENT.passMark+' correct to pass.</div><button class="btn-complete" id="submitFinal" onclick="submitFinal()">Submit assessment</button></div>';
  html+='<div id="finalResult"></div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);

function pickFinal(qi,oi,el){
  finalAnswers[qi]=oi;
  const box=el.closest('.quiz');
  box.querySelectorAll('.quiz-opt').forEach(o=>o.style.outline='');
  el.style.outline='2px solid var(--navy)';
  el.style.outlineOffset='1px';
}
async function submitFinal(){
  const total=FINAL_ASSESSMENT.questions.length;
  if(Object.keys(finalAnswers).length<total){
    document.getElementById('finalResult').innerHTML='<div class="callout warn" style="margin-top:12px"><span class="ci">⚠️</span><span class="ct">Not finished</span>Please answer all '+total+' questions before submitting.</div>';
    document.getElementById('finalResult').scrollIntoView({behavior:'smooth'});
    return;
  }
  let score=0;
  FINAL_ASSESSMENT.questions.forEach((q,qi)=>{
    const box=document.querySelector('[data-fq="'+qi+'"]');
    const opts=box.querySelectorAll('.quiz-opt');
    opts.forEach((o,oi)=>{
      o.style.outline='';
      if(oi===q.correct) o.classList.add('correct');
      else if(finalAnswers[qi]===oi) o.classList.add('wrong');
    });
    if(finalAnswers[qi]===q.correct) score++;
  });
  finalScore=score;
  const passed=score>=FINAL_ASSESSMENT.passMark;
  finalPassed=passed;
  let res='';
  if(passed){
    res='<div class="callout key" style="margin-top:14px"><span class="ci">✓</span><span class="ct">Passed — '+score+' / '+total+'</span>Outstanding. You\'ve passed the final assessment and completed the full WoodBClean Remote Camp Training. Head to your dashboard to generate your completion certificate.</div><button class="btn-next" style="margin-top:6px" onclick="showDashboard()">Go to my certificate →</button>';
    if(currentUser && !window.isOwnerMode){
      try{
        await supa.from('progress').upsert({user_id:currentUser.id,week_number:99,completed:true,completed_at:new Date().toISOString()});
      }catch(e){console.warn('final save',e);}
    }
  } else {
    res='<div class="callout warn" style="margin-top:14px"><span class="ci">⚠️</span><span class="ct">'+score+' / '+total+' — not quite there</span>You need '+FINAL_ASSESSMENT.passMark+' to pass. The questions you missed are marked above — go back and revisit those modules, then try the assessment again. This is part of learning, not a failure.</div><button class="btn-next" style="margin-top:6px" onclick="showFinal()">Try again →</button>';
  }
  document.getElementById('finalResult').innerHTML=res;
  document.getElementById('submitFinal').disabled=true;
  buildSidebar();
  document.getElementById('finalResult').scrollIntoView({behavior:'smooth'});
}

    const prof=await supa.from('profiles').select('full_name,total_xp').eq('id',currentUser.id).single();
    window.userName=prof.data?prof.data.full_name:currentUser.email;
    xp=prof.data&&prof.data.total_xp?prof.data.total_xp:0;
    await loadProgress();launchApp();
  }
});

</script>
