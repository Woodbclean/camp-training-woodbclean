 {
  "id": 8,
  "cat": "Core Skills",
  "title": "Equipment & Products",
  "sub": "Your tools",
  "lead": "The right tool, used and cared for the right way, is what makes a professional clean possible. On camp, WoodBClean provides your equipment and products — this module makes sure you know how to use each one, why it works, and how to look after it.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Good tools, used well, protect your body and your standard</h3>\n      <p>Cleaning is physical work, day after day, on a long roster. The right equipment used the right way does two things: it produces a better clean, and it protects your body from the wear-and-tear injuries that end cleaning careers. Understanding your tools isn't optional detail — it's how you stay fast, effective, and uninjured across a whole swing.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>The backpack vacuum, correct mop technique, and safe lifting aren't just about the clean — they're about your back still working in ten years. WoodBClean provides good gear specifically to reduce your injury risk. Use it properly and it looks after you.</div>"
   },
   {
    "name": "What's provided",
    "html": "\n      <h3>On camp, the gear is provided</h3>\n      <p>Unlike some cleaning work where you supply your own kit, on a contracted camp site <strong>WoodBClean provides all equipment and chemicals on site</strong>. You won't need to bring your own. Your job is to use it correctly, keep it clean, and report anything faulty.</p>\n      <h4>Your standard kit</h4>\n      <ul><li>Backpack vacuum (preferred over uprights — see next tab)</li><li>Flat microfibre mop and clean buckets</li><li>Colour-coded microfibre cloths (red, blue, yellow, green)</li><li>The Clean Like A Pro product range</li><li>Labelled spray bottles</li><li>PPE (gloves, and as required for the task)</li></ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">A dirty bucket tells a story</span>Arriving at a task with a dirty bucket or used cloths tells your supervisor everything about your standards. Clean gear, every shift. Your equipment is a reflection of you.</div>"
   },
   {
    "name": "Backpack vacuum",
    "html": "\n      <h3>Why we use a backpack vacuum</h3>\n      <p>WoodBClean uses backpack vacuums rather than uprights, and there's a real reason — it's about protecting <em>you</em>.</p>\n      <ul><li><strong>It distributes weight across your spine</strong>, reducing back strain over long shifts</li><li><strong>Better reach</strong> for ceilings, fans, vents, corners and awkward spaces in a donga</li><li><strong>Faster</strong> — you move more freely without dragging a unit behind you</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Fit it properly</span>Adjust the straps so the weight sits on your hips and shoulders evenly, like a hiking pack — not hanging off one shoulder. A badly fitted backpack vacuum causes the exact strain it's meant to prevent. Empty it and check filters regularly so it keeps its suction.</div>"
   },
   {
    "name": "Manual tasks & your body",
    "html": "\n      <h3>Protecting your body — the way the regulator expects</h3>\n      <p>Cleaning is repetitive physical work, and the biggest injury risk isn't one dramatic lift — it's the gradual wear from repetitive movement, awkward postures, and fatigue over a long roster. These injuries are called <strong>musculoskeletal disorders (MSDs)</strong>, and they're the most common serious workplace injury in Australia.</p>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Important — and audit-relevant</span>Australian WHS regulators are clear that simply teaching \"bend your knees, straight back\" is <em>not</em> enough on its own to keep you safe or to meet the law. What actually protects you is understanding what makes a task hazardous, and removing or reducing that hazard — not just lifting \"correctly.\"</div>\n      <h4>What makes a manual task hazardous</h4>\n      <p>Watch for these risk factors — they're what actually cause injury:</p>\n      <ul>\n        <li><strong>Repetitive or sustained force</strong> — scrubbing, wringing, doing the same movement room after room</li>\n        <li><strong>High or sudden force</strong> — a heavy wet-linen bag, a full bucket, a load that shifts</li>\n        <li><strong>Awkward or sustained posture</strong> — bending into a shower, reaching to high surfaces, twisting</li>\n        <li><strong>Long duration</strong> — the same task for hours without a break</li>\n        <li><strong>Fatigue</strong> — tired muscles late in a shift are far more injury-prone</li>\n      </ul>${REF:manualTasks}"
   },
   {
    "name": "Reducing the risk",
    "html": "\n      <h3>Control the hazard, don't just push through it</h3>\n      <p>The regulator wants you to <strong>reduce the risk</strong>, in this order, rather than rely on willpower and \"good technique\":</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Eliminate it</div><p>Can the task be avoided? Use a trolley or cart instead of carrying. Split a heavy linen bag into two lighter ones. Bring the vacuum to the work rather than stretching.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Use aids and better equipment</div><p>The backpack vacuum, wheeled trolleys, lighter buckets, long-handled tools — WoodBClean provides these specifically to take load off your body. Use them.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Change how the work is done</div><p>Rotate tasks so you're not doing the same movement all shift. Take micro-breaks. Don't leave all the heavy work to the end of shift when you're tired.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Then, good movement habits</div><p>Keep loads close, face what you're lifting (don't twist), use your legs, and get help or split the load when something's heavy. This matters — but it's the last line, not the first.</p></div></div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Speak up about a hazardous task</span>If a task is regularly hurting you — a bin that's always too heavy, a reach that always strains your shoulder — that's a hazard to <em>report</em>, not to tough out. WoodBClean can change the task, the equipment, or the process. Reporting it is how the risk actually gets removed for you and everyone after you.</div>"
   },
   {
    "name": "Mop & microfibre",
    "html": "\n      <h3>Mopping and microfibre — the science</h3>\n      <h4>Flat microfibre mop</h4>\n      <p>A flat microfibre mop is the professional standard: it picks up more, uses less water, and is gentler on floors than a string mop. Check the head is clean before every use — a dirty mop head just spreads grime around.</p>\n      <h4>Why microfibre works</h4>\n      <p>Microfibre cloths have millions of tiny fibres that physically grab and hold dirt, dust and bacteria rather than just pushing them around like cotton does. That's why they clean better with less chemical — the cloth is doing mechanical work. Use them slightly damp for most surfaces, and fold into quarters so you have eight clean faces per cloth.</p>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Wash after every use</span>Microfibre only works when it's clean — a clogged cloth stops grabbing dirt. Never arrive at a task with used cloths. On camp, they go through the laundry system between uses.</div>"
   },
   {
    "name": "Colour coding",
    "html": "\n      <h3>Colour-coded cloths — the rule that stops outbreaks</h3>\n      <p>You met this in Core Cleaning Principles — it's worth reinforcing here because it's the most important equipment rule you have:</p>\n      <div class=\"symgrid\">\n        <div class=\"symcard\"><div class=\"sy\">🔴</div><div class=\"sn\">Red</div><div class=\"sd\">Toilets & sanitary areas only</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🔵</div><div class=\"sn\">Blue</div><div class=\"sd\">General surfaces</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🟡</div><div class=\"sn\">Yellow</div><div class=\"sd\">Kitchen & food areas</div></div>\n        <div class=\"symcard\"><div class=\"sy\">🟢</div><div class=\"sn\">Green</div><div class=\"sd\">Where used, per site standard</div></div>\n      </div>\n      <p>Keep at least a few of each colour on your trolley so you never run out mid-task and get tempted to cross colours. Never let a cloth from one zone touch another.</p>"
   },
   {
    "name": "Dilution & bottles",
    "html": "\n      <h3>Products, dilution and labelling</h3>\n      <p>You'll use the Clean Like A Pro range across camp. Two rules that go with the chemical safety you learned in Module 4:</p>\n      <ul><li><strong>Correct dilution, every time</strong> — measure it, don't eyeball it. Over-concentrated product wastes money, damages surfaces, and leaves residue that attracts dirt faster.</li><li><strong>Labelled bottles, always</strong> — every spray bottle clearly labelled with what's in it. An unlabelled bottle is a hazard to everyone and must never be used.</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Have the right product for the job</span>Turning up to a mould problem without mould product, or a kitchen degrease without degreaser, means the job doesn't get done to standard. Know what each product is for and make sure you've got the full range on your trolley.</div>"
   },
   {
    "name": "Faults & reporting",
    "html": "\n      <h3>When equipment faults</h3>\n      <p>Broken or failing equipment is a safety and quality issue — never work around it or improvise with something unsuitable.</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Stop using it</div><p>A faulty vacuum, a frayed cord, a broken trolley — stop. Don't push a failing tool.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Report it immediately</div><p>Tell your supervisor so it can be repaired or replaced.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Never improvise</div><p>Don't substitute unsuitable gear or a damaged tool — that's how injuries and poor cleans happen.</p></div></div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Electrical safety</span>A frayed cord or damaged plug on a remote site is a serious electrical hazard. Tag it out of use and report it — never use damaged electrical equipment.</div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "Your backpack vacuum's suction has dropped right off midway through your dongas, and there's a frayed patch on the power cord you hadn't noticed before. You're behind and it still turns on. Do you keep using it to finish?",
    "answer": "No — stop using it immediately. The dropped suction means it's not actually cleaning properly (so those rooms won't meet standard), and a frayed cord is a genuine electrical hazard, especially on a remote site. Report both to your supervisor and get a replacement or repair. Pushing a failing, damaged electrical tool to save time risks an electric shock or fire and produces sub-standard rooms you'd have to redo anyway. Being behind is never a reason to use unsafe equipment — flag it and let your supervisor sort the timing."
   },
   {

 {
  "id": 9,
  "cat": "Core Skills",
  "title": "Floors & Surfaces",
  "sub": "Surface care",
  "lead": "A camp has many different floor and surface types, and each needs the right treatment. Use the wrong method or product and you can damage a surface or leave it looking worse than when you started. This module makes you confident on every surface you'll meet.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>The wrong method can wreck a surface</h3>\n      <p>Floors and surfaces are the biggest visible areas you clean — they're what makes a room look finished or not. But they're also where the wrong product or technique does real damage: a harsh chemical on a sealed floor, too much water on timber-look vinyl, an abrasive pad on a polished surface. Knowing your surfaces protects both the finish and WoodBClean from a damage claim.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Getting surfaces right is what makes your clean look genuinely professional — streak-free, no residue, no damage. It's also what keeps you out of trouble: matching method to surface means you never leave a mark you have to explain.</div>"
   },
   {
    "name": "Know your surface",
    "html": "\n      <h3>Identify before you clean</h3>\n      <p>The golden rule: <strong>identify the surface, then match the method and product.</strong> When you're not sure, check the product compatibility guidance or ask — don't guess on an unknown surface.</p>\n      <p>Common camp surfaces you'll meet:</p>\n      <ul><li><strong>Vinyl / vinyl plank</strong> — most donga and corridor floors</li><li><strong>Tile & grout</strong> — ablutions, wet areas, kitchens</li><li><strong>Sealed concrete</strong> — back-of-house, plant areas, some walkways</li><li><strong>Stainless steel</strong> — kitchen benches and equipment</li><li><strong>Laminate & melamine</strong> — desks, shelving, joinery</li><li><strong>Glass & mirror</strong> — windows, shower screens, mirrors</li></ul>"
   },
   {
    "name": "Hard floors",
    "html": "\n      <h3>Vinyl, tile & sealed concrete</h3>\n      <h4>Vinyl / vinyl plank</h4>\n      <p>The workhorse floor of a camp. Vacuum first, then damp-mop with correctly diluted product — <strong>damp, not soaking</strong>. Too much water seeps into seams and edges and lifts the vinyl over time. Flat microfibre mop, wrung out well.</p>\n      <h4>Tile & grout</h4>\n      <p>Vacuum or sweep first. Mop the tile; for grout lines, a grout brush and dwell time on the product does the work — grout is porous and holds dirt, so it needs the product to sit. Common in wet areas where mould also forms (see the Mould module).</p>\n      <h4>Sealed concrete</h4>\n      <p>Durable but the seal can be damaged by harsh or acidic product. Use neutral pH cleaner, damp mop, and clear spills promptly so they don't stain.</p>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Water is the hidden enemy</span>On almost every hard floor, too much water is the damage risk — seams, edges and grout all suffer. Damp-mop, wring well, and never leave standing water. It also dries faster, which means fewer slip hazards.</div>"
   },
   {
    "name": "Other surfaces",
    "html": "\n      <h3>Benches, glass & stainless</h3>\n      <h4>Stainless steel (kitchen)</h4>\n      <p>Wipe with the grain, not against it. Use the right product — never abrasive pads that scratch. Buff dry to avoid streaks and water spots. Fingerprints and smears show badly on stainless, so finish is everything.</p>\n      <h4>Laminate & melamine (desks, joinery)</h4>\n      <p>Damp microfibre, mild product. Avoid excess water at edges and joins where the board can swell.</p>\n      <h4>Glass & mirror</h4>\n      <p>Clean, then buff dry with a clean dry microfibre for a streak-free finish. Check at an angle to catch streaks you'd otherwise miss. A streaky mirror makes a spotless room look dirty.</p>"
   },
   {
    "name": "Slip & safety",
    "html": "\n      <h3>Wet floors are a hazard</h3>\n      <p>Every wet floor is a slip risk — for workers, for your team, and for you.</p>\n      <ul><li>Always set out <strong>wet-floor signs</strong> before you start mopping an area others use</li><li>Work in a way that leaves a dry path where possible</li><li>Damp-mop (not soaking) so floors dry faster</li><li>Clear any standing water immediately</li></ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">A slip is a reportable incident</span>Someone slipping on a floor you left wet without a sign is an injury and an incident report against WoodBClean. The sign takes five seconds. Always use it.</div>"
   },
   {
    "name": "Final check",
    "html": "\n      <h3>Check floors and surfaces properly</h3>\n      <p>Floors are always cleaned <strong>last</strong> (remember the top-to-bottom rule), and checked carefully before you sign off:</p>\n      <ul><li>Check <strong>floors at a low angle</strong> — dust, smears and missed spots show up when you look across the surface, not straight down</li><li>Check <strong>glass and mirrors at an angle</strong> for streaks</li><li>Make sure nothing is left wet or slippery</li><li>Photograph completed areas per the site standard before leaving</li></ul>"
   },

    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You're cleaning a donga with vinyl plank flooring and it's got some stubborn marks. You figure a good soak with plenty of water and product will lift them faster. Is that the right approach?",
    "answer": "No — flooding vinyl plank with water is exactly what damages it over time, seeping into the seams and edges and eventually lifting the planks, which becomes a costly damage claim. Stubborn marks come off with the right product, proper dwell time, and some agitation with a cloth or pad suited to vinyl — not with volume of water. Damp-mop, wrung out well. If a mark genuinely won't lift, it may be a scuff or damage to report rather than dirt. Match method to surface, always."

 {
  "id": 10,
  "cat": "Camp Operations",
  "title": "How to Clean a Donga",
  "sub": "The heart of the job",
  "lead": "A donga is a worker's ensuite room, and turning it over is the most common task you'll do on camp — sometimes 20 to 30 in a shift. This module teaches you to do it fast AND to standard, every time, the WoodBClean way.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Picture the worker</h3>\n      <p>A miner finishes a 12-hour shift underground. They're covered in dust, exhausted, and all they want is a clean room and a hot shower. <strong>That room is your work.</strong></p>\n      <p>Here's what's actually riding on how well you turn it over:</p>\n      <h4>For the worker</h4>\n      <p>A clean, fresh room is how they rest and recover so they can work safely the next day. A bad turnover — hair in the drain, a missed toilet, no toilet paper — is exactly what they remember and complain about.</p>\n      <h4>For WoodBClean</h4>\n      <p>Room quality is the number one thing the client audits. It is the difference between keeping this contract and losing it.</p>\n      <h4>For you</h4>\n      <p>When you can turn over a donga fast and to standard, you become the person the supervisor trusts and the one who gets the good shifts. This skill <em>is</em> your value on camp.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">Check yourself</span>Before you read on — from memory, who are the THREE people affected by how well you clean a donga? (The worker, WoodBClean, and you.) Keeping all three in mind is what separates a cleaner from a professional.</div>"
   },
   {
    "name": "What is a donga",
    "html": "\n      <h3>You already know most of this</h3>\n      <p>A donga is a single accommodation unit — a compact bedroom with a built-in ensuite (shower, toilet, basin) where a worker sleeps between shifts. If you've ever seen a hotel room turned over, you already know the shape of the job: strip, clean, remake, restock.</p>\n      <p>But a donga has <strong>three big differences</strong> from a hotel room, and they change how you work:</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Speed</div><p>A hotel gives you 30–45 minutes a room. On camp you have a tight window while the worker is on shift, and dozens of rooms to get through. Rhythm is everything.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">The flip schedule</div><p>Day-shift workers are out during the day, so you clean their rooms in the day. Night-shift workers are out at night. You are always cleaning the rooms of people who are currently at work.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">The standard never drops</div><p>Room 1 and room 30 get identical quality, no matter how tired you are. That consistency is the whole job.</p></div></div>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Not a bond clean</span>A donga turnover is a fast, consistent, high-standard <em>service</em> — not a deep bond clean. You're not scrubbing a house back to new. You're resetting a room to a perfect standard, quickly, the same way every time.</div>"
   },
   {
    "name": "The 8 steps",
    "html": "\n      <h3>Every room, same order</h3>\n      <p>Follow these in order, every single room, until your hands do it without thinking. The order isn't random — each step sets up the next.</p><div class=\"diagram-wrap\">${DIAG:dongaFlow}<div class=\"diagram-cap\">The 8-step turnover — same order, every room</div></div>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Enter &amp; ventilate</div><p>Knock first — every time, even if you're sure it's empty. A worker on a different roster could be asleep. Prop the door, open the window if there is one, and do a 5-second scan for anything broken or anything the worker left out that you need to be careful around.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Strip the bed</div><p>Pull all used linen and bag it straight into your laundry bag — never pile it on the floor, that re-contaminates. Look at the mattress as you strip: stains, damage, or bedbug signs get photographed and reported <em>before</em> you go further. Catching a bedbug in one room stops it spreading through the whole camp.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Bin &amp; surfaces — top to bottom</div><p>Empty the bin, fresh liner. Then wipe every surface from high to low: shelves, desk, window sill, light switches, door handles, remote. Use your <strong>BLUE</strong> cloth for all of this. Why top-to-bottom? Dust falls down — do it the other way and you re-dirty what you just cleaned.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">The ensuite — the make-or-break</div><p>Spray the toilet and shower with product <strong>first</strong>, then leave them to dwell while you do the basin and mirror. Dwell time is when the chemical actually kills bacteria — spraying and instantly wiping does almost nothing. Basin, tapware, mirror: BLUE cloth, streak-free. Then back to the toilet with a <strong>RED</strong> cloth only — under the rim, base, hinges. Shower: clear all hair from the drain, scrub, treat mould, squeegee the glass.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Make the bed</div><p>Fresh linen, tight and neat, corners done properly. A well-made bed is the first thing the worker sees — it signals the whole room was done with care.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">6</div><div class=\"step-b\"><div class=\"st\">Restock</div><p>Toilet paper, soap, fresh towels, amenities to the camp standard. Check you're not leaving them short — a worker coming off shift to no toilet paper is a guaranteed complaint.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">7</div><div class=\"step-b\"><div class=\"st\">Floor — always last</div><p>Vacuum the whole floor first, THEN mop. Work from the far corner toward the door so you never walk on what you've mopped — back yourself out of the room.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">8</div><div class=\"step-b\"><div class=\"st\">Final check &amp; sign off</div><p>Stand in the doorway and look at the room the way the worker will when they walk in. Anything you'd notice? Fix it now. Then record the room complete. Door shut = done.</p></div></div>"
   },
   {
    "name": "The ensuite up close",
    "html": "\n      <h3>Where the job is won or lost</h3>\n      <p>The ensuite is what workers notice most and what audits check hardest. If a room fails, it's almost always here. Three things get it right every time:</p>\n      <h4>🚽 The toilet</h4>\n      <p>It is not clean until <strong>under the rim</strong> is clean. Get product under the rim, let it dwell, then scrub with the angled brush. Wipe the base, the hinges, and the flush button — the touch points people forget. <strong>RED cloth only.</strong></p>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Why red cloth ONLY</span>A cloth that touched the toilet and then touches the basin spreads E. coli. That is exactly how a gastro outbreak starts on a camp — and one outbreak can put dozens of workers out and threaten the contract. Never cross your cloth colours.</div>\n      <h4>🚿 The shower</h4>\n      <p>Hair in the drain is the single most common complaint on any camp. Clear it every time, gloved. Then scrub walls and floor, treat any mould the moment you see it (don't leave it for \"next time\"), and squeegee the glass.</p>\n      <h4>🪞 The mirror &amp; basin</h4>\n      <p>Wipe, then buff dry with a clean dry cloth. A streaky mirror makes a spotless room look dirty — it's the detail that undoes all your other work.</p>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You're on room 22 of 28 and you're behind time. You open the ensuite and there's hair in the shower drain and the toilet needs a proper under-rim clean. If you do them properly, you'll run late. What do you do?",
    "answer": "You do them properly — every time. A late finish is a conversation with your supervisor. A gastro outbreak or a failed audit is a lost contract and workers getting sick. Speed comes from rhythm and dwell-time sequencing, never from skipping the ensuite. If you're genuinely going to run short, tell your supervisor before you fall behind — don't drop the standard to catch up."
   },
   {
    "name": "Maintenance flags",
    "html": "\n      <h3>You are WoodBClean's eyes in every room</h3>\n      <p>Your job isn't only cleaning — you're the person who sees inside every room, every day. If something's wrong, you report it. Don't just clean around a problem and hope.</p>\n      <h4>Report these every time</h4>\n      <ul>\n        <li><strong>A/C not working</strong> — a worker with no aircon after a 45°C shift is a genuine welfare issue</li>\n        <li><strong>Leaking tap or running toilet</strong> — water is precious and tightly managed on a remote site</li>\n        <li><strong>Broken fixtures, blown lights, damaged furniture</strong></li>\n        <li><strong>Mould coming back or water stains</strong> — often a sign of a leak behind the wall</li>\n        <li><strong>Anything that looks unsafe</strong></li>\n      </ul>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Don't clean around it</span>If you clean around a broken A/C and say nothing, the worker comes back to the same problem — and now it's your name on the room that was \"done.\" Photograph it, log it to your supervisor before you leave the room. Flagging maintenance IS part of the clean.</div>"
   },
   {
    "name": "Speed &amp; rhythm",
    "html": "\n      <h3>Fast the right way</h3>\n      <p>The best cleaners aren't rushing — they have a system so tight it looks unhurried but finishes first. Here's how to build yours:</p>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Set your trolley up identically every time</div><p>Everything in the same place, so your hand goes to it without looking.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Use dwell-time sequencing</div><p>Always spray the toilet and shower first, then work elsewhere while they sit. Come back to scrub once the product has done its job. This is the single biggest time-saver — and it makes the clean <em>better</em>, not worse.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Same order, every room</div><p>Repeat the 8 steps in the same sequence until your hands do it automatically. Consistency is what makes you fast.</p></div></div>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">The truth about speed</span>Never save time by skipping a step — the skipped step is exactly what gets noticed and complained about. Real speed is doing every step efficiently, not doing fewer steps.</div>"
   },
   {
    "type": "recall",
    "name": "Check yourself",
    "title": "Cover the screen and answer from memory",
    "items": [

      "q": "What's the very first thing you do when you enter a donga?",
      "a": "Knock — every time, even if you think it's empty."

      "q": "Why do you spray the toilet and shower first?",

  "lead": "Shared shower and toilet blocks are the highest-hygiene job on the whole camp. High traffic, many users, cleaned multiple times a day. This module shows you why they matter so much and exactly how to service them to standard.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>One block can affect the whole camp</h3>\n      <p>Unlike a donga, which one person uses, an ablution block is used by many workers all day. That changes everything. A poorly cleaned block doesn't affect one person — it can spread illness through dozens of workers in days.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's really at stake</span>On a remote site there's no quick hospital trip. A gastro outbreak from a badly cleaned block can knock out a chunk of the workforce, halt work, and threaten the contract. This is the job where your attention to detail matters most.</div>"
   },
   {
    "name": "Why highest hygiene",
    "html": "\n      <h3>Shared = highest risk</h3>\n      <p>Think about the maths. A donga has one user. An ablution block might have twenty or more. Every one of them touches the same taps, uses the same showers, the same toilets. If a surface isn't properly disinfected, it becomes a highway for bacteria and viruses between all those people.</p>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Outbreak risk</span>Disinfection here isn't optional or \"nice to have\" — it's the barrier between normal camp life and a gastro outbreak. Every surface, every service, properly disinfected. This is where the highest standard on camp applies.</div>"
   },
   {
    "name": "The routine",
    "html": "\n      <h3>Ablution block routine</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Signs & ventilate</div><p>Set wet-floor signs before you start (workers may still come in), and ventilate the space.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Toilets & urinals</div><p>RED cloths only. Disinfect every surface, inside and out — under the rim, the seat, the base, the flush button. Let product dwell.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Showers</div><p>Clear all hair from drains, scrub walls and floors, treat any mould, and check for slip hazards. Showers are a top complaint and a slip risk.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Basins & mirrors</div><p>BLUE cloths. Wipe and polish streak-free. Clean the taps — high-touch points.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Restock</div><p>Toilet paper, soap, paper towel. Running out between services is a guaranteed complaint.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">6</div><div class=\"step-b\"><div class=\"st\">Floors & log</div><p>Disinfect and mop last, working out toward the door. Then sign the check sheet on the door.</p></div></div>"
   },
   {
    "name": "Check sheets",
    "html": "\n      <h3>Sign every single service</h3>\n      <p>Every ablution block has a check sheet on the door. You sign it every time you service the block. This isn't bureaucracy — it does three real jobs:</p>\n      <ul><li><strong>Proves frequency</strong> — that the block is being cleaned as often as required (a health and ISO requirement)</li><li><strong>Protects you</strong> — it's your record that you did the job, at that time</li><li><strong>Coordinates the team</strong> — the next person can see when it was last done</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">The record IS the compliance</span>When an auditor or the client checks whether ablutions are serviced to standard, the check sheet is the evidence. No signature = no proof it happened = a compliance gap. Your signature is part of the quality system.</div>"

    "answer": "No — you clear it properly. A slow drain means standing water, which is a slip hazard and a breeding ground for bacteria and mould. 'Otherwise spotless' doesn't count if the one thing you skipped is the health risk. Glove up, clear it fully, and disinfect. Then sign the sheet honestly. The unpleasant two minutes is exactly the part of the job that protects the workforce — and it's what separates a WoodBClean clean from a 'looks fine' clean."

 {
  "id": 12,
  "cat": "Camp Operations",
  "title": "The Camp Kitchen & Food Safety",
  "sub": "Catering · HACCP",
  "lead": "The mess feeds the whole workforce — often 130+ people, three meals a day plus crib lunches. It runs to a strict food-safety standard because on a remote site, a food-poisoning outbreak could shut the whole operation down. This is serious, and this module makes you safe in it.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Food safety is life and death here</h3>\n      <p>In a restaurant, a food safety slip might make a few people unwell. On a remote camp feeding 130+ people from one kitchen, a slip can put a huge chunk of the workforce down at once — with no quick hospital nearby. Food safety on a camp isn't a formality. It's one of the most consequential things WoodBClean does.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Good food is also one of the biggest factors in whether workers are happy and stay — the research on remote camps is clear about it. When you keep the kitchen safe and the food good, you're directly protecting people's health AND the camp's morale.</div>"
   },
   {
    "name": "The mess",
    "html": "\n      <h3>The heart of the camp</h3>\n      <p>The camp kitchen — the \"mess\" — feeds everyone on site. Breakfast, lunch, dinner, plus packed \"crib\" lunches for workers to take on shift. After a hard shift, a good hot meal is one of the few real comforts, and its quality directly affects morale, wellbeing, and whether people stay on.</p>\n      <p>That makes the kitchen one of the most important operations WoodBClean runs — and one of the most tightly controlled, because of the food-safety stakes.</p>"
   },
   {
    "name": "HACCP basics",
    "html": "\n      <h3>What HACCP is and why it matters</h3>\n      <p><strong>HACCP (Hazard Analysis and Critical Control Points)</strong> is the food-safety system that keeps 130+ people from getting sick. It's not complicated in principle — it identifies the points where food can become dangerous and puts a control at each one.</p>\n      <h4>The critical controls</h4>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Temperature</div><p>Cold food stays below 5°C, hot food above 60°C. Record temperatures.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Separation</div><p>Raw and ready-to-eat food never cross — separate boards, surfaces, storage.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Hygiene</div><p>Handwashing, clean uniforms, and never working while sick.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Traceability</div><p>Label and date everything; first in, first out.</p></div></div>"
   },
   {
    "name": "The danger zone",
    "html": "\n      <h3>5°C to 60°C — the danger zone</h3><div class=\"diagram-wrap\">${DIAG:dangerZone}<div class=\"diagram-cap\">The temperature danger zone: 5°C–60°C</div></div>${REF:foodTemp}\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Where bacteria multiply fast</span>Between 5°C and 60°C, bacteria in food multiply rapidly. This is THE danger zone. Cold food must stay below 5°C. Hot food must stay above 60°C. Food sitting in between — on a bench, in a warmer that's not hot enough — is growing bacteria every minute.</p></div>\n      <p>This is why we record temperatures: not to fill in a form, but because a temperature log is the proof that food never sat in the danger zone. It's a HACCP requirement and it's the single most important food-safety control on camp.</p>"
   },
   {
    "name": "Kitchen cleaning",
    "html": "\n      <h3>Kitchen cleaning standard</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Clean as you go</div><p>Never let dirty gear pile up. Wipe surfaces between tasks — it's faster and safer than a big clean-up at the end.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Yellow zone only</div><p>YELLOW cloths for kitchen and food areas — never a cloth that's been used anywhere else. This is the colour code that stops bathroom bacteria reaching food.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Sanitise surfaces</div><p>Clean then sanitise prep surfaces, always between raw and ready-to-eat use. Cleaning removes dirt; sanitising kills bacteria — you need both.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Equipment daily</div><p>Ovens, cooktops, fryers, grills — degrease and clean daily, following the SDS for the degreaser.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Floors & drains</div><p>Degrease floors and clear drains — grease build-up is both a slip hazard and a pest attractant.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">6</div><div class=\"step-b\"><div class=\"st\">Cool room & storage</div><p>Keep clean, organised, labelled and dated. First in, first out — older stock used first.</p></div></div>"
   },
   {
    "name": "Never work sick",
    "html": "\n      <h3>If you're unwell, stay out</h3>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Report it — don't push through</span>A stomach bug passed from your hands into camp food could put the entire workforce down. If you're unwell — especially with any stomach or gut symptoms — you report it and you stay out of the kitchen and away from food. Never push through a sickness in a food role.</div>\n      <p>This is one of those places where \"toughing it out\" is exactly the wrong instinct. On a camp, one sick food handler can become a hundred sick workers. Reporting it is the responsible, professional thing — and it's expected.</p>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "During a busy meal service, a tray of cooked meat has been sitting out on the pass for over an hour because service ran long. It still looks and smells fine. The next crib order needs meat. Do you use it?",
    "answer": "No. 'Looks and smells fine' is exactly the trap — dangerous bacteria don't change how food looks or smells. Cooked meat sitting on the pass has almost certainly been in the 5–60°C danger zone for over an hour, long enough for bacteria to multiply to unsafe levels. It gets discarded, and fresh hot food is used. On a camp, serving that tray to save time could put dozens of workers down. When in doubt, temperature and time win over how it looks — every time."
   },

 {
  "id": 13,
  "cat": "Camp Operations",
  "title": "Mould Treatment",
  "sub": "Humid-area hygiene",
  "lead": "Camps in humid climates and high-moisture areas — showers, ablutions, laundries — grow mould, and mould is both a health hazard and a sign of a bigger problem. This module shows you how to treat it properly and when to escalate it.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Mould is a health issue, not just a look</h3>\n      <p>Mould isn't only unsightly — it releases spores that cause respiratory problems, allergies and asthma, especially serious for people living in close quarters on a camp. Wiping it away so it looks gone but treating it wrong means it comes straight back, often worse. Knowing how to actually treat it protects the health of everyone on site.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Mould in wet areas is one of the most common recurring issues you'll deal with. Get the method right and you fix it properly and protect your own lungs while you do. Get it wrong and you're fighting the same patch every week.</div>"
   },
   {
    "name": "Where it grows",
    "html": "\n      <h3>Know where to look</h3>\n      <p>Mould needs moisture, warmth and poor airflow — exactly what wet areas on a camp provide. Check these every service:</p>\n      <ul><li><strong>Shower walls, floors, grout and seals</strong> — the number-one spot</li><li><strong>Around drains and in corners</strong> where water sits</li><li><strong>Ceilings and vents</strong> in bathrooms with poor extraction</li><li><strong>Window seals and sills</strong> where condensation forms</li><li><strong>Behind/under fixtures</strong> and in the laundry</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Catch it early</span>A small spot treated now is five minutes. Left for weeks, it spreads into grout and silicone and becomes a maintenance job. Treating early every service is far easier than a big remediation later.</div>"
   },
   {
    "name": "How to treat it",
    "html": "\n      <h3>Treating mould properly</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">PPE first</div><p>Gloves and, for anything more than a small spot, a mask and eye protection — you don't want to breathe spores or splash product. Ventilate the area.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Use the right product</div><p>Use the designated mould treatment product from the Clean Like A Pro range. Never mix it with anything else (remember Module 4 — never mix chemicals).</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Apply and let it dwell</div><p>Apply to the affected area and give it proper dwell time — mould treatment needs time to actually kill the mould at the root, not just bleach the surface colour.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Agitate and remove</div><p>Scrub the area to lift the mould, then rinse/wipe away. A grout brush gets into grout lines and silicone.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">5</div><div class=\"step-b\"><div class=\"st\">Dry the area</div><p>Leave it as dry as possible — mould needs moisture, so a dry surface slows regrowth.</p></div></div>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Colour gone ≠ mould gone</span>Just bleaching mould so the black colour disappears doesn't kill the root — it grows back fast. Proper product, proper dwell, proper agitation is what actually treats it. And never mix a mould product with other chemicals.</div>"
   },
   {
    "name": "When to escalate",
    "html": "\n      <h3>When it's bigger than a clean</h3>\n      <p>Sometimes mould is a symptom of a maintenance problem, not just a cleaning job. Report and escalate — don't just keep treating the surface — when you see:</p>\n      <ul><li>Mould that <strong>keeps coming back</strong> in the same spot despite proper treatment</li><li><strong>Large areas</strong> of mould, or mould spreading fast</li><li>Mould with a <strong>leak, water stain or damp patch</strong> behind it (a plumbing or sealing problem)</li><li>Mould in a <strong>ceiling or wall cavity</strong> — likely ventilation or a leak</li><li>Any mould making a resident unwell</li></ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">You're the early-warning system</span>Recurring mould almost always means moisture is getting in somewhere — a failed seal, a leak, poor extraction. Reporting it means the real problem gets fixed. Treating the surface forever without reporting just hides a growing maintenance issue.</div>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "An ablution block shower has black mould in the grout that you treated last week, and it's back again already. You could just bleach it quickly so it looks clean for now. What's the better move?",
    "answer": "Treat it properly AND report it — because mould returning within a week in the same spot is a signal that moisture is getting in somewhere it shouldn't (a failed silicone seal, a slow leak, or poor ventilation). A quick bleach hides the colour but the root's still there and it'll be back again. Do a proper treatment (right product, dwell, agitate, dry), then report the recurring pattern to your supervisor so the underlying moisture problem gets investigated and fixed. You're the early-warning system for maintenance issues the surface clean can't solve."
   },
   {
    "type": "recall",
    "name": "Check yourself",
    "title": "Cover the screen and answer from memory",
    "items": [
     {
      "q": "Why is mould a health issue, not just an appearance one?",
      "a": "It releases spores that cause respiratory problems, allergies and asthma — serious in close camp living."
     },
     {
      "q": "What does mould need to grow?",
      "a": "Moisture, warmth and poor airflow — which wet areas provide."
     },
     {
      "q": "Why isn't bleaching the colour away enough?",
      "a": "It doesn't kill the root, so it grows straight back — you need proper product, dwell and agitation."
     },
     {
      "q": "What PPE do you use for mould treatment?",
      "a": "Gloves always, plus mask and eye protection for anything more than a small spot, and ventilate."
     },
     {
      "q": "When should you escalate mould rather than just re-treat it?",
      "a": "When it keeps returning, is large/spreading, or has a leak/damp behind it — it's a maintenance issue."
     }
    ]

 {
  "id": 14,
  "cat": "Camp Operations",
  "title": "Laundry, Waste & Environmental Care",
  "sub": "Operations · ISO 14001",
  "lead": "Beyond dongas and the mess, a camp needs laundry, waste management and environmental care — each with its own standard, and all of it under environmental rules because a remote camp sits in a sensitive location.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>The jobs that keep everything else working</h3>\n      <p>Laundry, waste and environmental care are easy to treat as afterthoughts — but they're the systems that keep the whole camp hygienic, legal and running. Get laundry wrong and you undo every room clean. Get waste wrong and you attract pests and breach environmental rules. Get environmental care wrong and you can threaten the whole operation's licence to be there.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>These are the jobs where small daily choices add up to big consequences. Doing them right is quiet, unglamorous, and exactly the kind of thing that marks out a professional from someone just going through the motions.</div>"
   },
   {
    "name": "Laundry",
    "html": "\n      <h3>Camp laundry</h3>\n      <p>You'll wash, dry and fold linen and towels to a schedule that keeps up with room turnovers. The single most important rule:</p>\n      <div class=\"callout warn\"><span class=\"ci\">⚠️</span><span class=\"ct\">Clean and dirty never mix</span>Keep clean and dirty linen strictly separated at all times — separate areas, separate trolleys, separate handling. If clean linen touches dirty, or shares a trolley, you've cross-contaminated it and undone the hygiene of every room it goes into. This is the one rule that matters most in laundry.</div>\n      <ul><li>Bagged dirty linen goes straight to the dirty side — never set down in a clean area</li><li>Wash at the correct temperature for hygiene</li><li>Fold and store clean linen only in clean, covered areas</li></ul>"
   },
   {
    "name": "Waste",
    "html": "\n      <h3>Waste segregation</h3>\n      <p>Segregate waste correctly and follow the site's system exactly. A camp typically separates:</p>\n      <ul><li><strong>General waste</strong></li><li><strong>Recycling</strong></li><li><strong>Food / organic waste</strong> — must be managed tightly to avoid pests</li><li><strong>Hazardous waste</strong> — per strict site rules</li></ul>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Why segregation matters here</span>On a remote site, waste can't just be carted off daily like in a city. It's stored and managed on site, so getting the streams right prevents pests, contamination and environmental breaches. Putting the wrong thing in the wrong bin has bigger consequences here than at home.</div>"
   },
   {
    "name": "Environmental care",
    "html": "\n      <h3>A sensitive environment — and our responsibility in it</h3>\n      <p>A remote camp sits in a sensitive natural environment, governed by the Environmental Protection Act and the site's own environmental controls. How we handle waste, chemicals, water and energy is part of our <strong>ISO 14001-aligned</strong> environmental management (the international environmental standard our client expects us to work to).</p>\n      <h4>Why WoodBClean takes this seriously</h4>\n      <p>It's not just compliance. Conventional cleaning chemicals are petrochemical-based — they leave residue, run into waterways, and sit in the air where people live and sleep. On a camp, that affects hundreds of workers and the country the camp sits on. Our choice of Australian-made, safer Clean Like A Pro products is a real part of reducing that impact.</p>\n      <h4>What environmental care looks like in your day</h4>\n      <ul>\n        <li><strong>Right dilution</strong> — using only as much chemical as the job needs, never more</li>\n        <li><strong>No spills to ground or drains</strong> — chemicals never go where they can reach soil or waterways</li>\n        <li><strong>Correct waste streams</strong> — general, recycling, organic and hazardous kept properly separated</li>\n        <li><strong>Water conservation</strong> — not wasting a limited, managed resource; reporting leaks</li>\n        <li><strong>Energy</strong> — lights and equipment off when not in use; full laundry loads rather than half</li>\n      </ul>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">Small choices, real impact</span>None of these is dramatic on its own. Together, across a whole workforce every single day, they're what keeps WoodBClean and our client environmentally compliant — and what protects the environment the camp depends on. Over a 16-year contract, your daily choices genuinely add up.</div>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">Why clients require it</span>Eco-conscious operation is increasingly required by government and resource-sector contracts, not just preferred. Working to a real environmental standard is part of what wins and keeps contracts like this one — and part of what makes you valuable.</div>"
   },
   {
    "name": "Water",
    "html": "\n      <h3>Water is precious here</h3>\n      <p>On a remote site, water is a limited, carefully managed resource — often trucked in or drawn from a controlled supply, with wastewater tightly regulated. Don't waste it.</p>\n      <ul><li>Don't leave taps running while you work</li><li>Report leaks and running toilets immediately — both for conservation and because a leak can signal a bigger problem</li><li>Use the right amount of water for the job, not more</li></ul>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "You're doing laundry and you're behind. There's a small pile of clean folded towels on the bench, and you need that bench space, so you're tempted to just rest the next bag of dirty linen next to them for a moment while you sort things out. Is that okay?",
    "answer": "No — even 'for a moment' breaks the one rule that matters most in laundry. Dirty linen carries bacteria from bathrooms and beds; the moment it shares space with clean towels, those towels are contaminated and can't go into a fresh room. Being behind is never a reason to cross clean and dirty. Move the clean towels to the clean side first, or find other space for the dirty bag. Keeping the two strictly separated is non-negotiable, busy or not."
   },

 {
  "id": 15,
  "cat": "People & Standards",
  "title": "Living Remote & Your Wellbeing",
  "sub": "Wellbeing · Conduct",
  "lead": "Remote camp life is demanding — long rosters, away from home, living where you work. Looking after yourself and each other keeps the camp a good place to be, and it's a genuine safety issue, not just a soft one.",
  "tabs": [
   {
    "name": "Why this matters",
    "html": "\n      <h3>Your wellbeing IS a safety issue</h3>\n      <p>It's easy to think of wellbeing as separate from \"real\" safety like chemicals and machinery. It isn't. The research on remote and FIFO work is clear: tired, isolated, struggling workers have more accidents and more injuries. Looking after your mental and physical wellbeing is part of keeping yourself and others safe.</p>\n      <div class=\"callout why\"><span class=\"ci\">💡</span><span class=\"ct\">What's in it for you</span>Camp rosters are hard on people. Knowing how to look after yourself — and spot when a mate is struggling — is what gets you through your swings well, not just survived. This module is genuinely for you.</div>"
   },
   {
    "name": "The reality",
    "html": "\n      <h3>Camp life is intense — that's normal</h3>\n      <p>Living where you work, on a long roster, away from family and friends, is genuinely demanding. The research (including the WA Health FIFO study) found that remote workers experience noticeably higher rates of psychological distress, isolation, and relationship strain than the general population. If you find it hard sometimes, that's not weakness — it's a normal response to a hard situation.</p>\n      <div class=\"callout info\"><span class=\"ci\">ℹ️</span><span class=\"ct\">The FIFO Code of Practice</span>There's a formal Code of Practice for how remote camps should support worker mental health and wellbeing — it exists because this matters and because the industry has learned it the hard way. WoodBClean takes it seriously, because looking after our people is both right and smart.</div>"
   },
   {
    "name": "Looking after yourself",
    "html": "\n      <h3>Practical wellbeing on a roster</h3>\n      <div class=\"step\"><div class=\"step-n\">1</div><div class=\"step-b\"><div class=\"st\">Manage fatigue</div><p>Rest properly between shifts. Tiredness is a genuine safety risk — it slows reactions and clouds judgement. Sleep is part of the job.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">2</div><div class=\"step-b\"><div class=\"st\">Stay connected</div><p>Keep in touch with home during your off time. Isolation is one of the biggest pressures of camp life — a regular call home helps more than you'd think.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">3</div><div class=\"step-b\"><div class=\"st\">Use the facilities</div><p>Gym, rec areas, good food — they're there for a reason. Movement and routine protect your head as much as your body.</p></div></div>\n      <div class=\"step\"><div class=\"step-n\">4</div><div class=\"step-b\"><div class=\"st\">Use the supports</div><p>EAP (Employee Assistance Program) and wellbeing services are confidential and free. Using them is a sign of good sense, not weakness.</p></div></div>"
   },
   {
    "name": "Looking after each other",
    "html": "\n      <h3>Watch out for your mates</h3>\n      <div class=\"callout key\"><span class=\"ci\">✓</span><span class=\"ct\">This is part of the job</span>In a closed community, noticing when someone's struggling — going quiet, withdrawing, not eating, drinking more — and checking in on them isn't being nosy. It's part of how a camp keeps its people safe. A quiet \"you alright, mate?\" has genuinely saved lives on remote sites.</div>\n      <p>You don't have to fix anything or be a counsellor. Just notice, check in, and if you're worried, tell a supervisor so the right support can reach them.</p>"
   },
   {
    "name": "Conduct",
    "html": "\n      <h3>Respect in a shared home</h3>\n      <p>A camp is hundreds of people living in close quarters, working all hours. That only works if everyone respects the shared space:</p>\n      <ul><li>Respect fellow workers, cultural differences and shared spaces</li><li>Zero tolerance for harassment, bullying or violence</li><li>Keep noise and behaviour considerate — someone is always sleeping for the next shift</li><li>Represent WoodBClean well, on shift and off</li></ul>"
   },
   {
    "type": "scenario",
    "name": "Real scenario",
    "scenario": "A workmate who's usually chatty has gone quiet over the last week. They've stopped coming to the mess for dinner, and you saw them sitting alone looking flat. It's not really your business, and you don't want to intrude. What do you do?",
    "answer": "You check in — a simple, genuine 'hey, haven't seen you at dinner, you doing okay?' Withdrawing, not eating, and going flat are exactly the signs the research tells us to watch for on remote sites. You don't need to fix anything or push — just let them know someone noticed and cares. If they open up about really struggling, or you stay worried, quietly let a supervisor know so proper support can reach them. On a camp, looking out for each other isn't intruding — it's part of keeping everyone safe."
   },
   {
    "type": "recall",
    "name": "Check yourself",
    "title": "Cover the screen and answer from memory",
    "items": [
     {
      "q": "Why is managing fatigue a safety issue, not just a comfort issue?",
      "a": "Tiredness slows reactions and clouds judgement, causing more accidents and injuries."
     },
     {
      "q": "Is finding camp life hard a sign of weakness?",
      "a": "No — it's a normal response to a genuinely demanding situation."

let managerData = null;
const RECERT_MONTHS = 12; // annual re-certification

async function loadManagerData(){
  // Pull all camp-role staff and their progress + certificates
  const staff = await supa.from('profiles').select('id,full_name,email,role,total_xp,created_at').eq('role','camp');
  const prog = await supa.from('progress').select('user_id,week_number,completed,completed_at');
  const certs = await supa.from('certificates').select('user_id,cert_number,cert_title,role_at_issue,signature_data,created_at');
  const staffRows = (staff.data||[]).map(s=>{
    const myProg = (prog.data||[]).filter(p=>p.user_id===s.id && p.completed);
    const modsDone = myProg.filter(p=>p.week_number>=1 && p.week_number<=MODULES.length).length;
    const finalRow = myProg.find(p=>p.week_number===99);
    const cert = (certs.data||[]).find(c=>c.user_id===s.id);
    // Determine re-cert status
    let recert=null;
    if(cert && cert.created_at){
      const issued=new Date(cert.created_at);
      const expiry=new Date(issued); expiry.setMonth(expiry.getMonth()+RECERT_MONTHS);
      const now=new Date();
      const daysLeft=Math.round((expiry-now)/(1000*60*60*24));
      recert={issued,expiry,daysLeft,status: daysLeft<0?'overdue':(daysLeft<30?'due-soon':'current')};
    }
    // completion timing for integrity
    const times = myProg.filter(p=>p.completed_at).map(p=>new Date(p.completed_at)).sort((a,b)=>a-b);
    let fastFlag=false;
    if(times.length>=MODULES.length){
      const span=(times[times.length-1]-times[0])/(1000*60); // minutes across all completions
      if(span < 25) fastFlag=true; // completed everything in under 25 min = suspicious
    }
    return {
      id:s.id, name:s.full_name||'(no name)', email:s.email||'', joined:s.created_at,
      modsDone, certified: modsDone===MODULES.length && !!finalRow, cert, recert, fastFlag,
      status: modsDone===0?'Not started':(modsDone<MODULES.length?'In progress':(finalRow?'Certified':'Modules done — assessment pending'))
    };
  });
  return staffRows;
}

async function showManager(view){
  currentView='manager';
  buildSidebar();
  closeSidebarMobile();
  const inner=document.getElementById('mainInner');
  inner.innerHTML='<div class="mod-header"><div class="crumb">Manager · Owner view</div><h2>Manager Dashboard</h2><div class="lead">Live view of all camp staff training. Data updates as staff complete modules.</div></div><div style="padding:40px;text-align:center;color:var(--mid)">Loading staff data…</div>';
  try{
    managerData = await loadManagerData();
  }catch(e){
    inner.querySelector('div[style]').innerHTML='<div class="callout warn"><span class="ci">⚠️</span><span class="ct">Couldn\'t load</span>Could not load staff data. '+(e.message||'')+'</div>';
    return;
  }
  renderManager(view||'overview');
}

function toggleMode(){
  signupMode=!signupMode;

  document.getElementById('authBtn').textContent=signupMode?'Create Account':'Log In';
  document.querySelector('.sp-hint').innerHTML=signupMode

    : 'First time here? <a href="#" onclick="toggleMode();return false">Create your account</a><span id="authMsg"></span>';

function msg(t){const m=document.getElementById('authMsg');if(m)m.textContent=t;}
async function doAuth(){
  const email=document.getElementById('spEmail').value.trim();
  const pass=document.getElementById('spPass').value;
  if(!email||!pass){msg('Enter your email and password.');return;}
  document.getElementById('authBtn').disabled=true;
  try{
    if(signupMode){
      const name=document.getElementById('spName').value.trim();
      if(!name){msg('Enter your full name.');document.getElementById('authBtn').disabled=false;return;}
      const res=await supa.auth.signUp({email,password:pass});
      if(res.error){msg(res.error.message);document.getElementById('authBtn').disabled=false;return;}
      if(res.data.user){
        await supa.from('profiles').upsert({id:res.data.user.id,full_name:name,email,role:'camp',total_xp:0,xp_level:1});
        currentUser=res.data.user;window.userName=name;launchApp();
      } else {msg('Check your email to confirm, then log in.');document.getElementById('authBtn').disabled=false;}
    } else {
      const res=await supa.auth.signInWithPassword({email,password:pass});
      if(res.error){msg(res.error.message);document.getElementById('authBtn').disabled=false;return;}
      currentUser=res.data.user;
      const prof=await supa.from('profiles').select('full_name,total_xp').eq('id',currentUser.id).single();
      window.userName=prof.data?prof.data.full_name:email;
      xp=prof.data&&prof.data.total_xp?prof.data.total_xp:0;
      await loadProgress();launchApp();
    }
  }catch(e){msg('Something went wrong. Try again.');document.getElementById('authBtn').disabled=false;}
}

  MODULES.forEach(m=>{
    const done=completed.has(m.id);
    html+='<div class="dash-modcard'+(done?' done':'')+'" onclick="showModule('+m.id+')"><div class="dm-num">'+(done?'✓':m.id)+'</div><div class="dm-info"><div class="t">'+m.title+'</div><div class="s">'+m.cat+' · '+m.sub+'</div></div><div class="dm-status '+(done?'done':'todo')+'">'+(done?'Complete':'To do')+'</div></div>';
  });
  html+='</div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);
  attachCertListener();
}

// ===== MODULE VIEW =====
function showModule(id){
  currentView=id;
  buildSidebar();
  closeSidebarMobile();
  const m=MODULES.find(x=>x.id===id);
  let html='<div class="mod-header"><div class="crumb">Module '+m.id+' · '+m.cat+'</div><h2>'+m.title+'</h2><div class="lead">'+m.lead+'</div></div>';
  // tabs
  html+='<div class="tabbar">';
  m.tabs.forEach((t,i)=>{
    const special=(t.type==='reflect'||t.type==='checklist'||t.type==='quiz');
    html+='<div class="tab'+(i===0?' active':'')+(special?' special':'')+'" onclick="switchTab(this,'+id+','+i+')">'+t.name+'</div>';
  });
  html+='</div>';
  // panes
  m.tabs.forEach((t,i)=>{
    html+='<div class="tabpane'+(i===0?' active':'')+'" data-pane="'+id+'-'+i+'">'+renderPane(t,m,i)+'</div>';
  });
  // complete bar
  const done=completed.has(id);
  const quizKey=id;
  html+='<div class="complete-bar"><div class="complete-note">'+(done?'✓ You\'ve completed this module.':'Work through the tabs and pass the quiz to complete this module.')+'</div>';
  html+='<div style="display:flex;gap:10px">';
  html+='<button class="btn-complete'+(done?' done':'')+'" id="completeBtn" '+(done||passedQuiz.has(quizKey)?'':'disabled')+' onclick="completeModule('+id+')">'+(done?'✓ Completed':'Mark complete')+'</button>';
  const next=MODULES.find(x=>x.id===id+1);
  if(next)html+='<button class="btn-next" onclick="showModule('+(id+1)+')">Next →</button>';
  html+='</div></div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);
}

function renderPane(t,m,i){
  if(t.type==='reflect'){
    return '<h3>Your reflection</h3><p>'+t.prompt+'</p><div class="reflect"><label>Take a moment to write your thoughts — this is for your own learning.</label><textarea placeholder="Type your reflection here..."></textarea></div>';
  }
  if(t.type==='checklist'){
    let h='<h3>Before you move on</h3><p>Tick each item to confirm your understanding:</p>';
    t.items.forEach((it,ci)=>{h+='<label class="checkitem" onclick="toggleCheck(this)"><input type="checkbox"><span>'+it+'</span></label>';});
    return h;
  }
  if(t.type==='quiz'){
    let h='<h3>Knowledge check</h3><div class="quiz"><div class="quiz-q">'+t.q+'</div>';
    t.opts.forEach((o,oi)=>{h+='<label class="quiz-opt" onclick="answerQuiz(this,'+oi+','+t.correct+','+m.id+')">'+o+'</label>';});
    h+='</div>';
    return h;
  }
  if(t.type==='scenario'){
    return '<h3>Real scenario</h3><div class="scenario"><div class="scenario-q">'+t.scenario+'</div>'
      +'<button class="scenario-btn" onclick="revealAnswer(this)">Reveal what a professional does →</button>'
      +'<div class="scenario-a" style="display:none">'+t.answer+'</div></div>';
  }
  if(t.type==='recall'){
    let h='<h3>'+(t.title||'Check yourself')+'</h3><p>Cover the answers and see how many you can get from memory — this is what locks the learning in.</p><div class="recall">';
    t.items.forEach((it,ci)=>{
      h+='<div class="recall-item"><div class="recall-q">'+it.q+'</div>'
        +'<button class="recall-btn" onclick="revealAnswer(this)">Show answer</button>'
        +'<div class="recall-a" style="display:none">'+it.a+'</div></div>';
    });
    h+='</div>';
    return h;
  }
  return resolveVisuals(t.html);
}

function switchTab(el,id,i){
  const inner=document.getElementById('mainInner');
  inner.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  inner.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('active'));
  inner.querySelector('[data-pane="'+id+'-'+i+'"]').classList.add('active');
}
function toggleCheck(el){
  const cb=el.querySelector('input');
  cb.checked=!cb.checked;
  el.classList.toggle('checked',cb.checked);
}
function revealAnswer(btn){
  const ans=btn.nextElementSibling;
  if(!ans)return;
  const showing=ans.style.display!=='none';
  ans.style.display=showing?'none':'block';
  btn.classList.toggle('revealed',!showing);
}
function answerQuiz(el,chosen,correct,modId){
  const opts=el.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.classList.remove('correct','wrong'));
  if(chosen===correct){
    el.classList.add('correct');
    passedQuiz.add(modId);
    const btn=document.getElementById('completeBtn');
    if(btn&&!completed.has(modId))btn.disabled=false;
  } else {
    el.classList.add('wrong');
    opts[correct].classList.add('correct');
  }
}

async function completeModule(id){
  if(completed.has(id)){return;}
  completed.add(id);
  xp+=100;
  document.getElementById('xpNum').textContent=xp;
  if(currentUser&&!window.isOwnerMode){
    try{
      await supa.from('progress').upsert({user_id:currentUser.id,week_number:id,completed:true,completed_at:new Date().toISOString()});
      await supa.from('profiles').update({total_xp:xp}).eq('id',currentUser.id);
    }catch(e){console.warn('save failed',e);}
  }
  // refresh module view to show completed state
  showModule(id);
}


// ===== FINAL ASSESSMENT =====
let finalAnswers = {};
function showFinal(){
  if(completed.size!==MODULES.length){ showDashboard(); return; }
  currentView='final';
  buildSidebar();
  closeSidebarMobile();
  finalAnswers={};
  let html='<div class="mod-header"><div class="crumb">Assessment</div><h2>'+FINAL_ASSESSMENT.title+'</h2><div class="lead">'+FINAL_ASSESSMENT.intro+'</div></div>';
  html+='<div id="finalQs">';
  FINAL_ASSESSMENT.questions.forEach((q,qi)=>{
    html+='<div class="quiz" style="margin-bottom:12px" data-fq="'+qi+'"><div class="quiz-q">'+(qi+1)+'. '+q.q+'</div>';
    q.opts.forEach((o,oi)=>{
      html+='<label class="quiz-opt" onclick="pickFinal('+qi+','+oi+',this)">'+o+'</label>';
    });
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="complete-bar"><div class="complete-note">Answer all '+FINAL_ASSESSMENT.questions.length+' questions, then submit. You need '+FINAL_ASSESSMENT.passMark+' correct to pass.</div><button class="btn-complete" id="submitFinal" onclick="submitFinal()">Submit assessment</button></div>';
  html+='<div id="finalResult"></div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);
}
function pickFinal(qi,oi,el){
  finalAnswers[qi]=oi;
  const box=el.closest('.quiz');
  box.querySelectorAll('.quiz-opt').forEach(o=>o.style.outline='');
  el.style.outline='2px solid var(--navy)';
  el.style.outlineOffset='1px';
}
async function submitFinal(){
  const total=FINAL_ASSESSMENT.questions.length;
  if(Object.keys(finalAnswers).length<total){
    document.getElementById('finalResult').innerHTML='<div class="callout warn" style="margin-top:12px"><span class="ci">⚠️</span><span class="ct">Not finished</span>Please answer all '+total+' questions before submitting.</div>';
    document.getElementById('finalResult').scrollIntoView({behavior:'smooth'});
    return;
  }
  let score=0;
  FINAL_ASSESSMENT.questions.forEach((q,qi)=>{
    const box=document.querySelector('[data-fq="'+qi+'"]');
    const opts=box.querySelectorAll('.quiz-opt');
    opts.forEach((o,oi)=>{
      o.style.outline='';
      if(oi===q.correct) o.classList.add('correct');
      else if(finalAnswers[qi]===oi) o.classList.add('wrong');
    });
    if(finalAnswers[qi]===q.correct) score++;
  });
  finalScore=score;
  const passed=score>=FINAL_ASSESSMENT.passMark;
  finalPassed=passed;
  let res='';
  if(passed){
    res='<div class="callout key" style="margin-top:14px"><span class="ci">✓</span><span class="ct">Passed — '+score+' / '+total+'</span>Outstanding. You\'ve passed the final assessment and completed the full WoodBClean Remote Camp Training. Head to your dashboard to generate your completion certificate.</div><button class="btn-next" style="margin-top:6px" onclick="showDashboard()">Go to my certificate →</button>';
    if(currentUser && !window.isOwnerMode){
      try{
        await supa.from('progress').upsert({user_id:currentUser.id,week_number:99,completed:true,completed_at:new Date().toISOString()});
      }catch(e){console.warn('final save',e);}
    }
  } else {
    res='<div class="callout warn" style="margin-top:14px"><span class="ci">⚠️</span><span class="ct">'+score+' / '+total+' — not quite there</span>You need '+FINAL_ASSESSMENT.passMark+' to pass. The questions you missed are marked above — go back and revisit those modules, then try the assessment again. This is part of learning, not a failure.</div><button class="btn-next" style="margin-top:6px" onclick="showFinal()">Try again →</button>';
  }
  document.getElementById('finalResult').innerHTML=res;
  document.getElementById('submitFinal').disabled=true;
  buildSidebar();
  document.getElementById('finalResult').scrollIntoView({behavior:'smooth'});
}

// ===== CERTIFICATE =====
let certSaved=false;
let generatedCertNum=null;
function renderCertificate(){
  return '<div class="cert-block"><div class="cc">✓</div><h3>Camp-Ready Certified</h3><p>You\'ve completed every module and passed every check. Enter your full name exactly as it should appear on your certificate, then generate it.</p><input class="cert-name" id="certName" placeholder="Your full name" value="'+(window.userName&&!window.isOwnerMode?window.userName:'')+'"><div style="margin-top:14px"><button class="btn-next" style="background:var(--gold)" onclick="generateCert()">Generate my certificate</button></div></div><div id="certDocWrap" style="margin-top:22px"></div>';
}
async function generateCert(){
  const el=document.getElementById('certName');
  const name=(el.value||'').trim();
  if(!name){ el.style.borderColor='var(--gold)'; el.focus(); return; }
  if(!generatedCertNum) generatedCertNum=makeCertNumber();
  const dates=recertDates();
  document.getElementById('certDocWrap').innerHTML=renderFormalCertificate(name,generatedCertNum,dates);
  document.getElementById('certDocWrap').scrollIntoView({behavior:'smooth'});
  if(!certSaved&&currentUser&&!window.isOwnerMode&&completed.size===MODULES.length&&finalPassed){
    certSaved=true;
    try{await supa.from('certificates').insert({user_id:currentUser.id,cert_type:'camp_full',cert_title:'Remote Camp Training — Camp-Ready Certified',cert_number:generatedCertNum,role_at_issue:'camp',signature_data:name});}catch(e){console.warn('cert save',e);}
  }
}
function attachCertListener(){ /* formal cert now generated on button click via generateCert() */ }

// ===== MOBILE SIDEBAR =====
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sbOverlay').classList.toggle('show');
}
function closeSidebarMobile(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('show');
}

// ===== INIT =====
document.getElementById('spPass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
document.addEventListener('DOMContentLoaded',async()=>{
  if(checkOwner())return;
  const s=await supa.auth.getSession();
  if(s.data&&s.data.session){
    currentUser=s.data.session.user;
    const prof=await supa.from('profiles').select('full_name,total_xp').eq('id',currentUser.id).single();
    window.userName=prof.data?prof.data.full_name:currentUser.email;
    xp=prof.data&&prof.data.total_xp?prof.data.total_xp:0;
    await loadProgress();launchApp();
  }
});
