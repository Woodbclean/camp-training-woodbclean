<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>WoodBClean — Remote Camp Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0f1628;--navy-mid:#1a2540;--navy-soft:#25314f;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#9a812f;
  --paper:#f7f6f2;--card:#fff;--cream:#efece4;--text:#1a1a2e;--mid:#4a4a6a;--light:#8a8aa2;--faint:#b8b8c8;
  --line:rgba(15,22,40,.1);--line2:rgba(15,22,40,.05);--success:#1b8a54;--sbg:#e3f6ec;--warn:#9a6a12;--wbg:#fbf1d9;
  --danger:#a32d2d;--dbg:#fbe9e9;--info:#1d5a8a;--ibg:#e5f0f9;
  --sidebar-w:288px;--r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--paper);color:var(--text);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.serif{font-family:'DM Serif Display',serif}
#splash{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;transition:opacity .6s,visibility .6s;padding:20px}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.sp-logo{width:104px;height:104px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:glow 2.6s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(201,168,76,.4),0 0 0 14px rgba(201,168,76,.08)}50%{box-shadow:0 0 0 2px rgba(201,168,76,.7),0 0 0 24px rgba(201,168,76,.14)}}
.sp-logo span{font-family:'DM Serif Display',serif;font-size:50px;color:var(--navy)}
#splash h1{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px;text-align:center}
#splash .sp-sub{color:rgba(255,255,255,.42);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:30px;text-align:center}
.sp-fields{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;margin-bottom:16px}
.sp-input{padding:13px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:inherit;width:100%;outline:none;transition:border-color .2s}
.sp-input::placeholder{color:rgba(255,255,255,.42)}
.sp-input:focus{border-color:rgba(201,168,76,.6)}
.sp-btn{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;max-width:320px;transition:background .2s}
.sp-btn:hover{background:var(--gold-light)}
.sp-btn:disabled{opacity:.6;cursor:wait}
.sp-hint{color:rgba(255,255,255,.4);font-size:12.5px;margin-top:18px;text-align:center;max-width:340px;line-height:1.6}
.sp-hint a{color:var(--gold-light);text-decoration:none;font-weight:600}
#authMsg{color:#e8a0a0;display:block;margin-top:8px;min-height:16px}
#app{display:none;min-height:100vh}
#app.show{display:block}
.topbar{background:var(--navy);color:#fff;height:60px;display:flex;align-items:center;padding:0 22px;position:sticky;top:0;z-index:200;gap:14px}
.tb-logo{width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-logo span{font-family:'DM Serif Display',serif;font-size:19px;color:var(--navy)}
.tb-title{flex:1}
.tb-title h1{font-family:'DM Serif Display',serif;font-size:16px;letter-spacing:.02em;line-height:1.1}
.tb-title .sub{font-size:10.5px;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase}
.tb-user{display:flex;align-items:center;gap:12px;font-size:13px}
.tb-xp{text-align:right}
.tb-xp .n{font-size:16px;font-weight:700;color:var(--gold);line-height:1}
.tb-xp .l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy-soft);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--gold-light)}
.tb-logout{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.tb-logout:hover{background:rgba(255,255,255,.08)}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:var(--sidebar-w);background:var(--navy-mid);border-right:1px solid rgba(255,255,255,.06);flex-shrink:0;overflow-y:auto;position:sticky;top:60px;height:calc(100vh - 60px)}
.sb-section{padding:16px 14px 8px;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 16px;margin:1px 8px;border-radius:10px;cursor:pointer;transition:background .15s;color:rgba(255,255,255,.7)}
.sb-item:hover{background:rgba(255,255,255,.05)}
.sb-item.active{background:rgba(201,168,76,.14);color:#fff}
.sb-item.active .sb-ico{background:var(--gold);color:var(--navy)}
.sb-ico{width:30px;height:30px;border-radius:8px;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:rgba(255,255,255,.6);font-family:'DM Serif Display',serif}
.sb-item.done .sb-ico{background:var(--success);color:#fff}
.sb-txt{flex:1;min-width:0}
.sb-txt .t{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-txt .s{font-size:10.5px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-check{font-size:14px;color:var(--success)}
.main{flex:1;min-width:0;overflow-x:hidden}
.main-inner{max-width:820px;margin:0 auto;padding:28px 32px 60px}
.dash-hero{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border-radius:var(--r);padding:28px 30px;margin-bottom:22px}
.dash-hero h2{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:6px}
.dash-hero p{color:rgba(255,255,255,.75);font-size:14.5px;max-width:560px;line-height:1.6}
.dash-progwrap{margin-top:20px}
.dash-progbar{height:8px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden}
.dash-progfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));width:0%;transition:width .6s;border-radius:5px}
.dash-progmeta{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:rgba(255,255,255,.6)}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.dash-stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.dash-stat .n{font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy);line-height:1}
.dash-stat .l{font-size:11.5px;color:var(--mid);text-transform:uppercase;letter-spacing:.04em;margin-top:5px}
.dash-stat.gold .n{color:var(--gold-dim)}
.dash-sectionlabel{font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy);margin:24px 0 12px}
.dash-modlist{display:flex;flex-direction:column;gap:8px}
.dash-modcard{background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s}
.dash-modcard:hover{border-color:var(--gold);transform:translateX(2px)}
.dash-modcard .dm-num{width:36px;height:36px;border-radius:9px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;flex-shrink:0}
.dash-modcard.done .dm-num{background:var(--success)}
.dash-modcard .dm-info{flex:1;min-width:0}
.dash-modcard .dm-info .t{font-size:14px;font-weight:600}
.dash-modcard .dm-info .s{font-size:12px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-modcard .dm-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.dm-status.done{background:var(--sbg);color:var(--success)}
.dm-status.todo{background:var(--cream);color:var(--mid)}
.mod-view{display:none}
.mod-view.active{display:block}
.mod-header .crumb{font-size:11.5px;font-weight:600;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.mod-header h2{font-family:'DM Serif Display',serif;font-size:27px;color:var(--navy);line-height:1.15;margin-bottom:8px}
.mod-header .lead{font-size:15px;color:var(--mid);line-height:1.6;max-width:620px}
.tabbar{display:flex;gap:4px;flex-wrap:wrap;margin:22px 0 20px;border-bottom:1px solid var(--line)}
.tab{padding:9px 15px;font-size:13px;font-weight:500;cursor:pointer;color:var(--mid);border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.15s;border-radius:6px 6px 0 0}
.tab:hover{color:var(--navy);background:var(--cream)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.tab.special{color:var(--gold-dim)}
.tabpane{display:none;animation:fade .25s}
.tabpane.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.tabpane h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy);margin:20px 0 10px;line-height:1.2}
.tabpane h3:first-child{margin-top:4px}
.tabpane h4{font-size:14px;font-weight:600;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.tabpane p{font-size:14.5px;color:var(--text);margin-bottom:12px;line-height:1.65}
.tabpane ul,.tabpane ol{margin:0 0 14px 22px}
.tabpane li{font-size:14.5px;margin-bottom:7px;line-height:1.55}
.tabpane strong{color:var(--navy);font-weight:600}
.quote{border-left:3px solid var(--gold);padding:6px 0 6px 18px;margin:16px 0;font-style:italic;color:var(--mid);font-size:15px;line-height:1.6}
.quote .who{display:block;font-style:normal;font-size:12.5px;color:var(--gold-dim);font-weight:600;margin-top:6px}
.callout{border-radius:var(--rs);padding:14px 16px 14px 48px;margin:16px 0;font-size:13.5px;line-height:1.6;position:relative}
.callout .ci{position:absolute;left:14px;top:14px;font-size:20px}
.callout .ct{font-weight:700;display:block;margin-bottom:3px}
.callout.why{background:var(--wbg);color:#6b4d12}.callout.why .ct{color:var(--warn)}
.callout.key{background:var(--sbg);color:#125a37}.callout.key .ct{color:var(--success)}
.callout.warn{background:var(--dbg);color:#6e1d1d}.callout.warn .ct{color:var(--danger)}
.callout.info{background:var(--ibg);color:#123f5e}.callout.info .ct{color:var(--info)}
.step{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.step-b{flex:1;padding-top:2px}
.step-b .st{font-weight:600;color:var(--navy);font-size:14.5px;margin-bottom:2px}
.step-b p{margin-bottom:0;font-size:14px}
.symgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.symcard{background:var(--card);border:1px solid var(--line);border-radius:var(--rs);padding:14px;text-align:center}
.symcard .sy{font-size:30px;margin-bottom:6px}
.symcard .sn{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px}
.symcard .sd{font-size:11.5px;color:var(--mid);line-height:1.4}
.vidref{background:var(--navy);color:#fff;border-radius:var(--rs);padding:14px 16px;margin:16px 0;display:flex;align-items:center;gap:14px}
.vidref .vi{width:44px;height:44px;border-radius:10px;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.vidref .vt{flex:1}
.vidref .vt .vtt{font-weight:600;font-size:14px}
.vidref .vt .vts{font-size:12px;color:rgba(255,255,255,.6)}
.reflect{background:var(--cream);border-radius:var(--rs);padding:16px;margin-top:12px}
.reflect label{display:block;font-size:13.5px;font-weight:600;color:var(--navy);margin-bottom:8px}
.reflect textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-family:inherit;font-size:14px;resize:vertical;min-height:80px;outline:none}
.reflect textarea:focus{border-color:var(--gold)}
.checkitem{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
.checkitem input{margin-top:2px;width:17px;height:17px;accent-color:var(--success);flex-shrink:0}
.checkitem span{font-size:14px;line-height:1.5}
.checkitem.checked span{color:var(--mid);text-decoration:line-through}
.quiz{background:var(--cream);border-radius:var(--rs);padding:18px;margin-top:8px}
.quiz-q{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:13px}
.quiz-opt{display:block;padding:12px 15px;background:var(--card);border:1.5px solid var(--line);border-radius:9px;margin-bottom:9px;font-size:14px;cursor:pointer;transition:.12s}
.quiz-opt:hover{border-color:var(--navy)}
.quiz-opt.correct{border-color:var(--success);background:var(--sbg)}
.quiz-opt.wrong{border-color:var(--danger);background:var(--dbg)}
.complete-bar{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.complete-note{font-size:12.5px;color:var(--mid);flex:1;min-width:200px}
.btn-complete{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:13px 26px;font-size:14.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.btn-complete:hover:not(:disabled){background:var(--navy-mid)}
.btn-complete:disabled{background:var(--faint);cursor:not-allowed}
.btn-complete.done{background:var(--success)}
.btn-next{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:13px 22px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-next:hover{background:var(--gold-light)}
.cert-block{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border-radius:var(--r);padding:30px;text-align:center;margin-top:20px}
.cert-block .cc{width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}
.cert-block h3{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.cert-block p{color:rgba(255,255,255,.72);font-size:13.5px;max-width:440px;margin:0 auto 14px}
.cert-block input{border:none;border-radius:9px;padding:12px 15px;font-size:15px;text-align:center;width:100%;max-width:300px;font-family:inherit}
.cert-out{margin-top:14px;font-size:13px;color:var(--gold-light);line-height:1.5}
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px}
@media(max-width:840px){.menu-toggle{display:block}.sidebar{position:fixed;left:0;top:60px;z-index:150;transform:translateX(-100%);transition:transform .25s;box-shadow:4px 0 24px rgba(0,0,0,.2)}.sidebar.open{transform:translateX(0)}.main-inner{padding:20px 18px 50px}.dash-stats{grid-template-columns:1fr}.dash-hero h2{font-size:22px}.mod-header h2{font-size:22px}}
.sb-overlay{display:none;position:fixed;inset:0;top:60px;background:rgba(0,0,0,.4);z-index:140}
.sb-overlay.show{display:block}
@media(min-width:841px){.sb-overlay{display:none!important}}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo"><span>B</span></div>
  <h1>Remote Camp Training</h1>
  <div class="sp-sub">WoodBClean · Mining Camp Operations</div>
  <div class="sp-fields">
    <input class="sp-input" id="spName" placeholder="Your full name" style="display:none">
    <input class="sp-input" id="spEmail" type="email" placeholder="Email">
    <input class="sp-input" id="spPass" type="password" placeholder="Password">
  </div>
  <button class="sp-btn" id="authBtn" onclick="doAuth()">Log In</button>
  <div class="sp-hint">First time here? <a href="#" onclick="toggleMode();return false">Create your account</a><span id="authMsg"></span></div>
</div>
<div id="app">
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="tb-logo"><span>B</span></div>
    <div class="tb-title"><h1>Remote Camp Training</h1><div class="sub">Mining Camp Operations</div></div>
    <div class="tb-user">
      <div class="tb-xp"><div class="n" id="xpNum">0</div><div class="l">XP</div></div>
      <div class="tb-avatar" id="avatar">B</div>
      <button class="tb-logout" onclick="doLogout()">Log out</button>
    </div>
  </div>
  <div class="layout">
    <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main"><div class="main-inner" id="mainInner"></div></div>
  </div>
</div>
<script>
const MODULES = [
{
  id:1, cat:"Foundations", title:"Welcome & Who We Are", sub:"Our story",
  lead:"The story behind why WoodBClean exists, what we stand for, and what it means to represent this business on a remote site from day one.",
  tabs:[
    {name:"Our story", html:`
      <h3>How WoodBClean started</h3>
      <p>Bonnie Wood built this business from her name — and from a genuine frustration with the way cleaning was being done. She was meeting every kind of client a cleaning business could dream of, hearing the same complaints over and over: cleaners who showed up late, did half the job, or didn't show at all. People cleaning fast because it was quick cash, leaving clients with a mess to deal with themselves.</p>
      <p>Bonnie knew she could do it differently. So she did. <strong>"WoodBClean — because it would be clean if you got WoodBClean."</strong> That's not just a tagline. That's a promise. Every job we take on, every door we walk through, we're making that promise to someone.</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">Why this matters</span>On a remote camp, that promise is to hundreds of workers who live where we clean. They come off a 12-hour shift trusting that their room is clean and their food is safe. That trust is the whole job.</div>
      <div class="quote">The very most important element to being a cleaner at WoodBClean is common sense. See something that needs fixing? Fix it. Don't walk past a problem because it wasn't on the list.<span class="who">— Bonnie</span></div>`},
    {name:"Values & standards", html:`
      <h3>What we stand for</h3>
      <p>We are not a volume business. We don't win by doing more jobs than anyone else. We win by being the operation clients trust, refer, and renew. On a camp, that reputation is built by you — every room, every meal, every shift.</p>
      <h4>Our core values</h4>
      <ul><li><strong>Standards never drop</strong> — no matter how tight the turnaround</li><li><strong>Common sense first</strong> — see a problem, fix it or report it</li><li><strong>Respect</strong> — for the workers who live here, for each other, for the site</li><li><strong>Honesty</strong> — we record what we do and we do what we record</li></ul>
      <div class="callout key"><span class="ci">✓</span><span class="ct">The WoodBClean difference</span>Other operators throw people in and hope. We train you, support you, and give you a path. That's why we can be the best camp operation on site — because our people are trained, not just hired.</div>`},
    {name:"Our clients", html:`
      <h3>Who we're serving on site</h3>
      <p>On this contract, WoodBClean runs the cleaning and catering for a remote mining camp operated in partnership with CGC (Closure Group Civil). We service the whole camp population — the miners, machinery operators and civil crews who live on site while they work.</p>
      <p>They are not our employees, but they are the people we look after every day. A clean donga and a good meal are the biggest things within our control that keep that workforce healthy, rested and safe.</p>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">CGC holds ISO accreditation</span>Because our client is ISO-accredited, the way we work — our records, our standards, our safety — reflects on their accreditation. Doing things properly isn't just our reputation, it protects theirs too.</div>`},
    {name:"On-site conduct", html:`
      <h3>Representing WoodBClean on site</h3>
      <p>On a camp you're never "off duty" in the way you are at a normal job — you live where you work, alongside the people you serve. How you conduct yourself matters around the clock.</p>
      <ul><li>Professional, respectful, reliable — every shift</li><li>Follow all site rules and WoodBClean policies</li><li>No gossip, no drama — professionalism is everything in a closed community</li><li>Represent the business well even in the mess, the gym, the rec room</li></ul>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Zero tolerance</span>Harassment, bullying, violence, or turning up unfit for work (drugs/alcohol) means instant removal from site. A camp is a shared home for hundreds of people — everyone's safety depends on everyone's conduct.</div>`},
    {name:"Key handling", html:`
      <h3>Access, keys & security</h3>
      <p>You'll hold access to workers' rooms and camp facilities. That access is a serious trust.</p>
      <ul><li>Never share your access, keys or swipe with anyone</li><li>Never enter a room for any reason other than the scheduled service</li><li>Report lost keys or access cards immediately</li><li>Respect residents' privacy and belongings absolutely</li></ul>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Residents' belongings</span>Workers leave personal items in their rooms. Never touch, move, or go through anything that isn't part of the clean. If you find something concerning, report it — don't handle it yourself.</div>`},
    {name:"Non-solicitation", html:`
      <h3>Non-solicitation — and why it protects you</h3>
      <p>While working with WoodBClean, you don't approach WoodBClean's clients to set up private work, and you don't take WoodBClean work "on the side."</p>
      <div class="callout why"><span class="ci">💡</span><span class="ct">Why this protects you too</span>If you built your own client base from WoodBClean clients and something went wrong on a job — a chemical damage claim, an injury — you'd have none of WoodBClean's insurance backing you. Operating through WoodBClean means you are protected.</div>`},
    {name:"Common sense", html:`
      <h3>The most important skill</h3>
      <p>Bonnie says it plainly: the most important element of being a WoodBClean cleaner is common sense. A checklist can't cover everything. A camp throws up situations no procedure predicted.</p>
      <ul><li>See something that needs fixing? Fix it, or report it.</li><li>Don't walk past a problem because it wasn't on the list.</li><li>If something feels wrong or unsafe, stop and ask.</li><li>Think about the person who'll come back to that room.</li></ul>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"In your own words, what does the WoodBClean promise — 'it would be clean if you got WoodBClean' — mean for how you'll work on the camp?"},
    {type:"checklist", name:"Checklist", items:["I understand the WoodBClean story and promise","I know our core values and standards","I understand who we serve on this camp","I understand on-site conduct expectations","I understand key handling and security","I understand non-solicitation and how it protects me"]},
    {type:"quiz", name:"Quiz", q:"What does Bonnie say is the most important skill for a WoodBClean cleaner?", opts:["Speed","Common sense — see a problem, fix it or report it","Having your own equipment"], correct:1}
  ]
},
{
  id:2, cat:"Foundations", title:"Your Role & Responsibilities", sub:"Employment",
  lead:"What your engagement with WoodBClean means in practice — pay, entitlements, obligations, and your rights at work on a remote site.",
  tabs:[
    {name:"My role", html:`
      <h3>Employee or subcontractor</h3>
      <p>You're engaged by WoodBClean either as an <strong>employee</strong> or a <strong>subcontractor</strong>. The difference is in how you're paid and what legal protections apply — not in the standard of work expected.</p>
      <p>As an <strong>employee</strong>, you're covered by the Fair Work Act 2009, the National Employment Standards, and WHS law. WoodBClean pays your wages, provides PPE, and covers you under workers compensation.</p>
      <div class="callout key"><span class="ci">✓</span><span class="ct">Same standard, both roles</span>Whether employee or subcontractor, WoodBClean expects the same quality, professionalism and care. You represent WoodBClean on every shift.</div>`},
    {name:"Wages & entitlements", html:`
      <h3>How you're paid on a camp</h3>
      <p>Remote camp work is paid above the award, reflecting the demands of the roster and the location. Your engagement letter sets out your exact rate, roster and entitlements.</p>
      <ul><li>Above-award pay reflecting remote conditions</li><li>Penalty rates for weekend, night and public holiday work</li><li>Remote/district allowance per your agreement</li><li>Superannuation 12% and, for employees, leave entitlements</li></ul>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">Trained, not just hired</span>WoodBClean pays fairly and invests in training and progression. We'd rather pay a bit more for people who are set up to succeed than run a revolving door.</div>`},
    {name:"Tickets & tickets", html:`
      <h3>Certifications you must hold</h3>
      <p>Every worker on a mine site must hold current tickets, checked and recorded before you deploy:</p>
      <ul><li><strong>White Card</strong> (CPCWHS1001) — construction induction</li><li><strong>Standard 11 Mining Induction</strong> — required for most Queensland mining sites</li><li><strong>Current First Aid</strong> (and CPR)</li><li><strong>Manual Handling</strong> — safe lifting technique</li><li><strong>Pre-employment medical</strong> including drug & alcohol screening</li><li><strong>Police check</strong></li></ul>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">No ticket, no site</span>Missing or expired tickets mean you can't be deployed. Keep them current and give WoodBClean copies before mobilisation.</div>`},
    {name:"Your rights", html:`
      <h3>Your rights at work</h3>
      <p>WoodBClean has obligations to you: a safe workplace, correct pay, PPE, insurance cover (for employees), and freedom from bullying, harassment and discrimination.</p>
      <ul><li>The right to a safe work environment</li><li>The right to stop work if something is unsafe</li><li>The right to raise concerns without retaliation</li><li>Protection under the Fair Work Act and WHS law</li></ul>`},
    {name:"Bullying & respect", html:`
      <h3>A respectful workplace</h3>
      <p>Camp life is a closed community. WoodBClean has zero tolerance for bullying, harassment or discrimination — from anyone, toward anyone.</p>
      <ul><li>Treat everyone with respect — workmates, residents, site staff</li><li>Report bullying or harassment to your supervisor or Bonnie</li><li>Respect cultural differences and shared spaces</li></ul>`},
    {name:"Privacy", html:`
      <h3>Client & resident privacy</h3>
      <p>You'll see residents' rooms and belongings and may handle client information. All of it is confidential under the Privacy Act and WoodBClean policy.</p>
      <ul><li>Never photograph residents' personal belongings except to flag a genuine issue to Bonnie</li><li>Never share anything about residents or the site on social media</li><li>Keep all client and site information confidential</li></ul>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"What tickets do you currently hold, and which do you still need before you can be deployed to site?"},
    {type:"checklist", name:"Checklist", items:["I know whether I'm an employee or subcontractor","I understand my pay and entitlements","I know which tickets I must hold (White Card, Standard 11, First Aid, Manual Handling)","I understand my rights at work","I understand the respect and anti-bullying policy","I understand privacy obligations"]},
    {type:"quiz", name:"Quiz", q:"Which induction is required for most Queensland mining sites?", opts:["A basic online course","Standard 11 Mining Induction","No induction is needed"], correct:1}
  ]
},
{
  id:3, cat:"Safety & Compliance", title:"Site Induction & Working Under the Mine's Rules", sub:"WHS · ISO 45001",
  lead:"The mine's principal contractor is legally responsible for everyone on site — including you. You work inside their safety system, not your own.",
  tabs:[
    {name:"The mine's system", html:`
      <h3>You work under the mine's rules</h3>
      <p>Under the WHS Act and the WHS (Mines) Regulations, the mine operator and principal contractor hold duty of care over everyone on site. WoodBClean integrates into <strong>their</strong> safety management system — we don't run our own in isolation.</p>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">No induction, no access</span>You cannot start any work — even cleaning a donga — until you've completed the site-specific induction. No exceptions.</div>`},
    {name:"PHMPs", html:`
      <h3>Principal Hazard Management Plans</h3>
      <p>A mine site has <strong>Principal Hazard Management Plans (PHMPs)</strong> — formal controls for the biggest risks on site (heavy vehicles, dust, hazardous materials, etc). You must know the ones that apply to your work area and follow them.</p>
      <ul><li>Know which PHMPs affect your zone</li><li>Never enter a plant or restricted area unless inducted and authorised</li><li>Follow all site signage and hazard controls</li></ul>`},
    {name:"Emergency procedures", html:`
      <h3>If something goes wrong</h3>
      <p>Learn these on day one, before you need them:</p>
      <ul><li>Emergency alarms and what each means</li><li>Muster points and evacuation routes</li><li>How to raise the alarm and who to call</li><li>Where the medical facility and first aid points are</li></ul>
      <div class="callout key"><span class="ci">✓</span><span class="ct">Know it cold</span>In an emergency there's no time to read a manual. Walk your muster route on your first day so it's automatic.</div>`},
    {name:"JSAs & SWMS", html:`
      <h3>Job Safety Analysis & Safe Work Method Statements</h3>
      <p>Before a new or higher-risk task, WoodBClean prepares a <strong>JSA</strong> or <strong>SWMS</strong> — a simple document that identifies the hazards and the controls. Read it, understand it, sign it, follow it.</p>
      <ul><li>Never start a new task without knowing its JSA/SWMS</li><li>If conditions change, stop and reassess</li><li>Your input improves them — speak up if a control isn't working</li></ul>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"What are the three things you'll make sure you know on your first day on site, before you start work?"},
    {type:"checklist", name:"Checklist", items:["I understand I work under the mine's safety system","I know I can't start work until site induction is complete","I understand what PHMPs are and to follow them","I know to learn emergency procedures and muster points day one","I understand JSAs/SWMS and to follow them"]},
    {type:"quiz", name:"Quiz", q:"When can you start work on site?", opts:["Straight away","Only after completing the site-specific induction","After your first meal"], correct:1}
  ]
},
{
  id:4, cat:"Safety & Compliance", title:"Chemical Safety", sub:"WHS · Chemicals",
  lead:"Every product we use is a chemical. Understanding hazards, SDS documents, the Clean Like A Pro range, and what never to mix is a legal requirement and your first line of personal protection.",
  tabs:[
    {name:"Hazard symbols", html:`
      <h3>The 9 GHS hazard symbols — know every one</h3>
      <div class="symgrid">
        <div class="symcard"><div class="sy">🔥</div><div class="sn">Flammable</div><div class="sd">Keep away from heat, sparks, open flames</div></div>
        <div class="symcard"><div class="sy">💀</div><div class="sn">Toxic</div><div class="sd">Serious harm if swallowed, inhaled or absorbed</div></div>
        <div class="symcard"><div class="sy">❗</div><div class="sn">Harmful / Irritant</div><div class="sd">Skin/eye irritation, respiratory issues</div></div>
        <div class="symcard"><div class="sy">🧪</div><div class="sn">Corrosive</div><div class="sd">Burns skin and eyes — rinse immediately</div></div>
        <div class="symcard"><div class="sy">🌿</div><div class="sn">Environmental</div><div class="sd">Harmful to waterways and marine life</div></div>
        <div class="symcard"><div class="sy">🫁</div><div class="sn">Health hazard</div><div class="sd">Respiratory or long-term health effects</div></div>
        <div class="symcard"><div class="sy">💥</div><div class="sn">Explosive</div><div class="sd">Risk of explosion under certain conditions</div></div>
        <div class="symcard"><div class="sy">⭕</div><div class="sn">Oxidising</div><div class="sd">May intensify fire — keep from flammables</div></div>
        <div class="symcard"><div class="sy">⛽</div><div class="sn">Compressed gas</div><div class="sd">Gas under pressure — risk if heated</div></div>
      </div>`},
    {name:"SDS sheets", html:`
      <h3>Safety Data Sheets</h3>
      <p>Every chemical has a <strong>Safety Data Sheet (SDS)</strong> telling you its hazards, safe handling, PPE, and what to do in a spill or exposure.</p>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">Read before first use</span>Read the SDS for every product before you use it for the first time. All Clean Like A Pro SDS documents: cleanlikeapro.com.au/pages/sds</div>`},
    {name:"Our products", html:`
      <h3>Why organic and Australian-made</h3>
      <p>WoodBClean uses the <strong>Clean Like A Pro</strong> range — Australian-owned, Australian-made, created by professional cleaners. Conventional products are petrochemical-based: they leave residue, go into waterways, and sit in the air where people live.</p>
      <p>On a camp, hundreds of people breathe that air and use those surfaces every day. Safe products are part of looking after them — and part of our environmental compliance.</p>`},
    {name:"Dilution", html:`
      <h3>Correct dilution</h3>
      <p>More is not better. Over-concentrated product wastes money, can damage surfaces, and leaves residue. Follow the dilution rate for every product exactly.</p>
      <ul><li>Use the correct measure — don't eyeball it</li><li>Label diluted bottles clearly</li><li>Mix fresh as needed</li></ul>`},
    {name:"Never mix", html:`
      <h3>Never mix chemicals</h3>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">This can kill</span>Mixing chemicals — especially anything with bleach and anything with ammonia or acid — can create toxic gas. Never mix products. Never decant into an unlabelled bottle. An unlabelled chemical is a hazard to everyone on camp.</div>`},
    {name:"Spill response", html:`
      <h3>If you cause a spill</h3>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Contain it</div><p>Stop it spreading — especially away from drains and ground.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Report it</div><p>Tell your supervisor immediately.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Clean up per the SDS</div><p>Use the method and PPE the SDS specifies.</p></div></div>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Never into drains</span>Never pour or wash chemicals into drains or onto the ground — it breaches environmental compliance on a sensitive remote site.</div>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"Name two chemicals you must never mix, and explain what you'd do if you found an unlabelled bottle of chemical on site."},
    {type:"checklist", name:"Checklist", items:["I can recognise the GHS hazard symbols","I know to read the SDS before first use","I understand why we use Clean Like A Pro products","I understand correct dilution","I will never mix chemicals or use unlabelled bottles","I know the spill response steps"]},
    {type:"quiz", name:"Quiz", q:"Can you mix cleaning chemicals to make them work better?", opts:["Yes","No — never mix chemicals; it can create toxic gas","Only the kitchen ones"], correct:1}
  ]
},
{
  id:5, cat:"Core Skills", title:"Core Cleaning Principles", sub:"Universal rules",
  lead:"The universal rules that apply to every WoodBClean job regardless of clean type. Master these and everything else becomes easier.",
  tabs:[
    {name:"The 5 rules", html:`
      <h3>The 5 rules for every WoodBClean job</h3>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Read the environment first</div><p>Walk the space. Note anything broken, unusual or needing flagging before you start.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Vacuum first — always</div><p>Before any product or wet cloth, vacuum. Wet cleaning first spreads debris and undoes your work.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Top to bottom, back to front</div><p>Ceilings/high surfaces first, floors last. Start at the back of the room, work toward the door — never walk on what you've cleaned.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">Door shut = room complete</div><p>Closed door means done to standard. Open door means work in progress. Don't re-enter a finished room.</p></div></div>
      <div class="step"><div class="step-n">5</div><div class="step-b"><div class="st">Photos before you leave</div><p>Record completed work per the site's system — your timestamped record and your protection.</p></div></div>`},
    {name:"Room sequence", html:`
      <h3>Why sequence matters</h3>
      <p>Gravity means debris falls down. If you clean floors first, you'll redo them. Working back-to-front means you never re-contaminate or walk over cleaned areas. Sequence is what makes you fast <em>and</em> thorough.</p>`},
    {name:"Colour coding", html:`
      <h3>Colour-coded cloths — non-negotiable</h3>
      <p>The colour system stops cross-contamination between dirty and clean areas:</p>
      <ul><li><strong>Red</strong> — toilets and sanitary areas</li><li><strong>Blue</strong> — general surfaces</li><li><strong>Yellow</strong> — kitchen and food areas</li><li><strong>Green</strong> — where used, per site standard</li></ul>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Never cross them</span>A cloth that touched a toilet must never touch a basin or a bench. Crossing colours transfers bacteria like E. coli. On a camp, that can start an outbreak.</div>`},
    {name:"Dwell time", html:`
      <h3>Let products work</h3>
      <p>Disinfectants and cleaners need <strong>dwell time</strong> — time on the surface to actually kill bacteria. Spraying and instantly wiping doesn't disinfect. Apply, leave it the time the label says, then wipe.</p>`},
    {name:"Photo documentation", html:`
      <h3>Photograph to flag and to prove</h3>
      <p>On arrival, photograph only if you find something to flag — pre-existing damage, personal items, mould, unusual conditions. Send to your supervisor before starting.</p>
      <p>On completion, photograph the finished work per the site's system before you leave — not from your car, not later. The timestamp is your completion record and your protection if any dispute arises.</p>`},
    {name:"11 fail points", html:`
      <h3>The common fail points</h3>
      <p>Where quality most often slips — check yourself against these:</p>
      <ul><li>Skipping the vacuum-first rule</li><li>Cleaning floors before high surfaces</li><li>Crossing cloth colours</li><li>Not letting product dwell</li><li>Missing skirtings, sills, switches, handles</li><li>Poor bathroom detail (grout, drains, under the rim)</li><li>Streaky mirrors and glass</li><li>Not restocking amenities</li><li>Leaving hair in drains</li><li>Cleaning around a problem instead of reporting it</li><li>Leaving before photos are done</li></ul>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"Which of the 5 universal rules do you think you'll have to be most disciplined about on a fast camp turnover, and why?"},
    {type:"checklist", name:"Checklist", items:["I know the 5 universal rules","I understand top-to-bottom, back-to-front","I understand the colour-coded cloth system","I understand dwell time","I understand photo documentation","I know the common fail points to avoid"]},
    {type:"quiz", name:"Quiz", q:"What must you always do before any wet cleaning?", opts:["Mop the floor","Vacuum the whole area first","Open all the windows"], correct:1}
  ]
},
{
  id:6, cat:"Camp Operations", title:"How to Clean a Donga", sub:"The heart of the job",
  lead:"A donga is a worker's ensuite room. Turning it over fast, to a consistent high standard, on a schedule tied to shift changes — this is the core of camp cleaning.",
  tabs:[
    {name:"What is a donga", html:`
      <h3>The donga explained</h3>
      <p>A donga is a single accommodation unit — a compact bedroom with a built-in ensuite (shower, toilet, basin) where a worker sleeps between shifts. On a camp you'll turn over dozens per shift on a flip schedule: the day team services night-shift rooms while those workers are out, and vice versa.</p>
      <div class="callout info"><span class="ci">ℹ️</span><span class="ct">Not a bond clean</span>A donga turnover is a fast, consistent, high-standard service done identically every time — not a deep bond clean. Speed and consistency are everything, because the window is tight and the worker needs a fresh room to come back to.</div>`},
    {name:"The 8-step turnover", html:`
      <h3>Every room, same order</h3>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Enter & ventilate</div><p>Knock first even if you think it's empty. Open the door/window. Check for anything broken or needing maintenance.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Strip the bed</div><p>Remove and bag used linen. Check the mattress; report stains or damage.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Bin & surfaces</div><p>Empty the bin. Wipe all surfaces top to bottom — desk, shelves, sills, switches, handles.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">The ensuite</div><p>Shower, toilet, basin, mirror. Red cloth for toilet, blue for general. Chemical, dwell, scrub, rinse, dry. This is where standards are won or lost.</p></div></div>
      <div class="step"><div class="step-n">5</div><div class="step-b"><div class="st">Make the bed</div><p>Fresh linen, neat corners, presented well.</p></div></div>
      <div class="step"><div class="step-n">6</div><div class="step-b"><div class="st">Restock</div><p>Toilet paper, soap, towels, amenities to the camp standard.</p></div></div>
      <div class="step"><div class="step-n">7</div><div class="step-b"><div class="st">Floor</div><p>Vacuum then mop — last, working toward the door.</p></div></div>
      <div class="step"><div class="step-n">8</div><div class="step-b"><div class="st">Final check & sign off</div><p>Walk the room with the client's eye. Record it complete. Door shut = done.</p></div></div>`},
    {name:"The ensuite detail", html:`
      <h3>Where standards are won or lost</h3>
      <p>The bathroom is what residents notice most. Detail matters:</p>
      <ul><li>Under the toilet rim, base and hinges — red cloth only</li><li>Shower: remove hair from the drain, scrub walls and floor, treat any mould</li><li>Basin, mirror, tapware — blue cloth, polished streak-free</li><li>Check for slip hazards before you leave</li></ul>
      <div class="callout key"><span class="ci">✓</span><span class="ct">The dwell trick</span>Apply toilet and shower product first, do the rest of the ensuite while it dwells, then come back and scrub. Faster and more effective.</div>`},
    {name:"Maintenance flags", html:`
      <h3>Don't clean around a problem</h3>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Report and record</span>Faulty A/C, leaking tap, broken fixture, mould — report and record it, don't just clean around it. A worker coming off a 12-hour shift to a room with no air-con is a welfare issue. Flagging maintenance is part of the job.</div>`},
    {name:"Speed & rhythm", html:`
      <h3>Fast without dropping standard</h3>
      <p>The best camp cleaners have a rhythm — same order, same movements, every room. That's what lets you fly through your rooms while the standard stays identical from the first to the last.</p>
      <ul><li>Set up your trolley the same way every time</li><li>Apply dwell-time products first, come back to them</li><li>Never skip a step to save time — the missed step is what gets noticed</li></ul>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"Walk through the 8-step turnover from memory. Which step do you think is most important to the resident, and which is easiest to rush?"},
    {type:"checklist", name:"Checklist", items:["I understand what a donga is and the flip schedule","I know the 8-step turnover in order","I understand the ensuite detail standard","I will report maintenance issues, not clean around them","I understand building a fast, consistent rhythm"]},
    {type:"quiz", name:"Quiz", q:"In the donga turnover, when do you do the floor?", opts:["First","Last, working toward the door","Before the bed"], correct:1}
  ]
},
{
  id:7, cat:"Camp Operations", title:"Ablution Blocks & Shared Facilities", sub:"Hygiene",
  lead:"Shared shower and toilet facilities are high-traffic and demand the highest hygiene standard on the whole camp — cleaned multiple times a day.",
  tabs:[
    {name:"Why highest hygiene", html:`
      <h3>Shared = highest risk</h3>
      <p>Ablution blocks are used by many workers, so poor cleaning spreads illness fast. One badly cleaned block can put dozens of workers out — a serious problem on a remote site.</p>
      <div class="callout warn"><span class="ci">⚠️</span><span class="ct">Outbreak risk</span>Disinfection here isn't optional — it's how you protect the whole camp from a gastro outbreak that could affect the operation.</div>`},
    {name:"The routine", html:`
      <h3>Ablution block routine</h3>
      <div class="step"><div class="step-n">1</div><div class="step-b"><div class="st">Signs & ventilate</div><p>Set wet-floor signs, ventilate.</p></div></div>
      <div class="step"><div class="step-n">2</div><div class="step-b"><div class="st">Toilets & urinals</div><p>Red cloths only. Disinfect every surface, inside and out.</p></div></div>
      <div class="step"><div class="step-n">3</div><div class="step-b"><div class="st">Showers</div><p>Clear drains of hair, scrub walls and floors, treat mould, check slip hazards.</p></div></div>
      <div class="step"><div class="step-n">4</div><div class="step-b"><div class="st">Basins & mirrors</div><p>Blue cloths, wipe and polish.</p></div></div>
      <div class="step"><div class="step-n">5</div><div class="step-b"><div class="st">Restock</div><p>Toilet paper, soap, paper towel.</p></div></div>
      <div class="step"><div class="step-n">6</div><div class="step-b"><div class="st">Floors & log</div><p>Disinfect and mop last. Sign the check sheet on the door.</p></div></div>`},
    {name:"Check sheets", html:`
      <h3>Sign every time</h3>
      <p>Sign the check sheet on the door every service. It proves the block is cleaned to the required frequency — a health and ISO requirement, and your record that the job was done.</p>`},
    {type:"reflect", name:"✏️ Reflections", prompt:"Why is signing the ablution check sheet important — for the camp, and for you personally?"},
    {type:"checklist", name:"Checklist", items:["I understand why ablution blocks are the highest-hygiene job","I know the ablution routine in order","I will use red cloths for toilets only","I will sign the check sheet every service"]},
    {type:"quiz", name:"Quiz", q:"Why are shared ablution blocks the highest-hygiene job on camp?", opts:["They're the biggest","They're shared and high-traffic, so poor cleaning spreads illness fast","They have the most mirrors"], correct:1}
  ]
},
{
  id:8, cat:"Camp Operations", title:"The Camp Kitchen & Food Safety", sub:"Catering · HACCP",
  lead:"The mess feeds the whole workforce — often 130+ people, three meals a day plus crib lunches. It runs to a strict HACCP food-safety standard because an outbreak could shut the camp down.",
  tabs:[
    {name:"The mess", html:`
      <h3>The heart of the camp</h3>
      <p>The camp kitchen (the mess) feeds everyone on site. Good food is one of the biggest factors in worker wellbeing and retention — the research is clear that camp food quality directly affects morale and safety. That makes the kitchen one of the most important things WoodBClean runs.</p>`},

let completed = new Set();
let xp = 0;
let currentUser = null;
let signupMode = false;
let currentView = 'dashboard';

const SUPA_URL='https://ohzwmratsgolvlqmvbim.supabase.co';

// ===== AUTH =====
function toggleMode(){
  signupMode=!signupMode;
  document.getElementById('spName').style.display=signupMode?'block':'none';
  document.getElementById('authBtn').textContent=signupMode?'Create Account':'Log In';
  document.querySelector('.sp-hint').innerHTML=signupMode
    ? 'Already have an account? <a href="#" onclick="toggleMode();return false">Log in</a><span id="authMsg"></span>'
    : 'First time here? <a href="#" onclick="toggleMode();return false">Create your account</a><span id="authMsg"></span>';
}
function msg(t){const m=document.getElementById('authMsg');if(m)m.textContent=t;}
async function doAuth(){
  const email=document.getElementById('spEmail').value.trim();
  const pass=document.getElementById('spPass').value;
  if(!email||!pass){msg('Enter your email and password.');return;}
  document.getElementById('authBtn').disabled=true;
  try{
    if(signupMode){
      const name=document.getElementById('spName').value.trim();
      if(!name){msg('Enter your full name.');document.getElementById('authBtn').disabled=false;return;}
      const res=await supa.auth.signUp({email,password:pass});
      if(res.error){msg(res.error.message);document.getElementById('authBtn').disabled=false;return;}
      if(res.data.user){
        await supa.from('profiles').upsert({id:res.data.user.id,full_name:name,email,role:'camp',total_xp:0,xp_level:1});
        currentUser=res.data.user;window.userName=name;launchApp();
      } else {msg('Check your email to confirm, then log in.');document.getElementById('authBtn').disabled=false;}
    } else {
      const res=await supa.auth.signInWithPassword({email,password:pass});
      if(res.error){msg(res.error.message);document.getElementById('authBtn').disabled=false;return;}
      currentUser=res.data.user;
      const prof=await supa.from('profiles').select('full_name,total_xp').eq('id',currentUser.id).single();
      window.userName=prof.data?prof.data.full_name:email;
      xp=prof.data&&prof.data.total_xp?prof.data.total_xp:0;
      await loadProgress();launchApp();
    }
  }catch(e){msg('Something went wrong. Try again.');document.getElementById('authBtn').disabled=false;}
}
async function loadProgress(){
  if(!currentUser)return;
  const res=await supa.from('progress').select('week_number,completed').eq('user_id',currentUser.id);
  if(res.data)res.data.forEach(r=>{if(r.completed)completed.add(r.week_number);});
}
async function doLogout(){ try{await supa.auth.signOut();}catch(e){} location.reload(); }

// ===== OWNER MODE =====
function checkOwner(){
  const p=new URLSearchParams(location.search);
  if(p.get('owner')==='BWClean'){window.isOwnerMode=true;window.userName='Bonnie (Owner Preview)';launchApp();return true;}
  return false;
}

// ===== LAUNCH =====
function launchApp(){
  document.getElementById('splash').classList.add('gone');
  document.getElementById('app').classList.add('show');
  const initial=(window.userName||'B').trim().charAt(0).toUpperCase();
  document.getElementById('avatar').textContent=initial;
  document.getElementById('xpNum').textContent=xp;
  buildSidebar();
  showDashboard();
}

// ===== SIDEBAR =====
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  let html='<div class="sb-item sb-dashitem'+(currentView==='dashboard'?' active':'')+'" onclick="showDashboard()"><div class="sb-ico">⌂</div><div class="sb-txt"><div class="t">Dashboard</div><div class="s">Your progress</div></div></div>';
  let cat='';
  MODULES.forEach(m=>{
    if(m.cat!==cat){cat=m.cat;html+='<div class="sb-section">'+cat+'</div>';}
    const done=completed.has(m.id);
    html+='<div class="sb-item'+(done?' done':'')+(currentView===m.id?' active':'')+'" onclick="showModule('+m.id+')"><div class="sb-ico">'+(done?'✓':m.id)+'</div><div class="sb-txt"><div class="t">'+m.title+'</div><div class="s">'+m.sub+'</div></div>'+(done?'<span class="sb-check">✓</span>':'')+'</div>';
  });
  sb.innerHTML=html;
}

// ===== DASHBOARD =====
function showDashboard(){
  currentView='dashboard';
  buildSidebar();
  closeSidebarMobile();
  const pct=Math.round(completed.size/MODULES.length*100);
  const name=(window.userName||'there').split(' ')[0];
  let html='<div class="dash-hero"><h2>Welcome back, '+name+'</h2><p>This program prepares you to work safely and to standard on a remote mining camp. Complete every module and pass each check to be cleared for site deployment.</p>'
    +'<div class="dash-progwrap"><div class="dash-progbar"><div class="dash-progfill" style="width:'+pct+'%"></div></div><div class="dash-progmeta"><span>'+completed.size+' of '+MODULES.length+' modules complete</span><span>'+pct+'%</span></div></div></div>';
  html+='<div class="dash-stats">'
    +'<div class="dash-stat"><div class="n">'+completed.size+'/'+MODULES.length+'</div><div class="l">Modules done</div></div>'
    +'<div class="dash-stat gold"><div class="n">'+xp+'</div><div class="l">XP earned</div></div>'
    +'<div class="dash-stat"><div class="n">'+(pct===100?'✓':pct+'%')+'</div><div class="l">'+(pct===100?'Camp ready':'Progress')+'</div></div></div>';

  if(pct===100){
    html+=renderCertificate();
  }

  html+='<div class="dash-sectionlabel">Your modules</div><div class="dash-modlist">';
  MODULES.forEach(m=>{
    const done=completed.has(m.id);
    html+='<div class="dash-modcard'+(done?' done':'')+'" onclick="showModule('+m.id+')"><div class="dm-num">'+(done?'✓':m.id)+'</div><div class="dm-info"><div class="t">'+m.title+'</div><div class="s">'+m.cat+' · '+m.sub+'</div></div><div class="dm-status '+(done?'done':'todo')+'">'+(done?'Complete':'To do')+'</div></div>';
  });
  html+='</div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);
  attachCertListener();
}

// ===== MODULE VIEW =====
function showModule(id){
  currentView=id;
  buildSidebar();
  closeSidebarMobile();
  const m=MODULES.find(x=>x.id===id);
  let html='<div class="mod-header"><div class="crumb">Module '+m.id+' · '+m.cat+'</div><h2>'+m.title+'</h2><div class="lead">'+m.lead+'</div></div>';
  // tabs
  html+='<div class="tabbar">';
  m.tabs.forEach((t,i)=>{
    const special=(t.type==='reflect'||t.type==='checklist'||t.type==='quiz');
    html+='<div class="tab'+(i===0?' active':'')+(special?' special':'')+'" onclick="switchTab(this,'+id+','+i+')">'+t.name+'</div>';
  });
  html+='</div>';
  // panes
  m.tabs.forEach((t,i)=>{
    html+='<div class="tabpane'+(i===0?' active':'')+'" data-pane="'+id+'-'+i+'">'+renderPane(t,m,i)+'</div>';
  });
  // complete bar
  const done=completed.has(id);
  const quizKey=id;
  html+='<div class="complete-bar"><div class="complete-note">'+(done?'✓ You\'ve completed this module.':'Work through the tabs and pass the quiz to complete this module.')+'</div>';
  html+='<div style="display:flex;gap:10px">';
  html+='<button class="btn-complete'+(done?' done':'')+'" id="completeBtn" '+(done||passedQuiz.has(quizKey)?'':'disabled')+' onclick="completeModule('+id+')">'+(done?'✓ Completed':'Mark complete')+'</button>';
  const next=MODULES.find(x=>x.id===id+1);
  if(next)html+='<button class="btn-next" onclick="showModule('+(id+1)+')">Next →</button>';
  html+='</div></div>';
  document.getElementById('mainInner').innerHTML=html;
  window.scrollTo(0,0);
}

function renderPane(t,m,i){
  if(t.type==='reflect'){
    return '<h3>Your reflection</h3><p>'+t.prompt+'</p><div class="reflect"><label>Take a moment to write your thoughts — this is for your own learning.</label><textarea placeholder="Type your reflection here..."></textarea></div>';
  }
  if(t.type==='checklist'){
    let h='<h3>Before you move on</h3><p>Tick each item to confirm your understanding:</p>';
    t.items.forEach((it,ci)=>{h+='<label class="checkitem" onclick="toggleCheck(this)"><input type="checkbox"><span>'+it+'</span></label>';});
    return h;
  }
  if(t.type==='quiz'){
    let h='<h3>Knowledge check</h3><div class="quiz"><div class="quiz-q">'+t.q+'</div>';
    t.opts.forEach((o,oi)=>{h+='<label class="quiz-opt" onclick="answerQuiz(this,'+oi+','+t.correct+','+m.id+')">'+o+'</label>';});
    h+='</div>';
    return h;
  }
  return t.html;
}

function switchTab(el,id,i){
  const inner=document.getElementById('mainInner');
  inner.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  inner.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('active'));
  inner.querySelector('[data-pane="'+id+'-'+i+'"]').classList.add('active');
}
function toggleCheck(el){
  const cb=el.querySelector('input');
  cb.checked=!cb.checked;
  el.classList.toggle('checked',cb.checked);
}
function answerQuiz(el,chosen,correct,modId){
  const opts=el.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.classList.remove('correct','wrong'));
  if(chosen===correct){
    el.classList.add('correct');
    passedQuiz.add(modId);
    const btn=document.getElementById('completeBtn');
    if(btn&&!completed.has(modId))btn.disabled=false;
  } else {
    el.classList.add('wrong');
    opts[correct].classList.add('correct');
  }
}

async function completeModule(id){
  if(completed.has(id)){return;}
  completed.add(id);
  xp+=100;
  document.getElementById('xpNum').textContent=xp;
  if(currentUser&&!window.isOwnerMode){
    try{
      await supa.from('progress').upsert({user_id:currentUser.id,week_number:id,completed:true,completed_at:new Date().toISOString()});
      await supa.from('profiles').update({total_xp:xp}).eq('id',currentUser.id);
    }catch(e){console.warn('save failed',e);}
  }
  // refresh module view to show completed state
  showModule(id);
}

// ===== CERTIFICATE =====
function renderCertificate(){
  return '<div class="cert-block"><div class="cc">✓</div><h3>Camp-Ready Certified</h3><p>You\'ve completed every module and passed every check. Enter your name to generate your completion record — this confirms you\'re cleared to deploy to site.</p><input class="cert-name" id="certName" placeholder="Your full name" value="'+(window.userName&&!window.isOwnerMode?window.userName:'')+'"><div class="cert-out" id="certOut"></div></div>';
}
let certSaved=false;
function attachCertListener(){
  const el=document.getElementById('certName');
  if(!el)return;
  const render=async()=>{
    const v=el.value.trim();
    document.getElementById('certOut').textContent=v?(v+' — WoodBClean Remote Camp Training complete — all '+MODULES.length+' modules — '+new Date().toLocaleDateString('en-AU')+'. Cleared for site deployment.'):'';
    if(v&&!certSaved&&currentUser&&!window.isOwnerMode&&completed.size===MODULES.length){
      certSaved=true;
      const certNum='CAMP-'+Date.now().toString(36).toUpperCase();
      try{await supa.from('certificates').insert({user_id:currentUser.id,cert_type:'camp_full',cert_title:'Remote Camp Training — Camp-Ready Certified',cert_number:certNum,role_at_issue:'camp',signature_data:v});}catch(e){console.warn('cert save',e);}
    }
  };
  el.addEventListener('input',render);
  if(el.value.trim())render();
}

  if(s.data&&s.data.session){
    currentUser=s.data.session.user;
    const prof=await supa.from('profiles').select('full_name,total_xp').eq('id',currentUser.id).single();
    window.userName=prof.data?prof.data.full_name:currentUser.email;
    xp=prof.data&&prof.data.total_xp?prof.data.total_xp:0;
    await loadProgress();launchApp();
  }
});

</script>
